name: TCMB Rates

# TCMB Efektif Satis (BanknoteSelling) kurlarini gunluk ceker ve repo koklerine
# tcmb-rates.json olarak yazar. PoCHub uygulamasi bunu ayni-origin'den okur (sifir CORS).

on:
  schedule:
    - cron: '0 13 * * 1-5'   # her is gunu 13:00 UTC (~16:00 TR) — TCMB yayinindan sonra
  workflow_dispatch:          # Actions sekmesinden elle calistirma

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch TCMB XML and write tcmb-rates.json
        run: |
          set -e
          curl -s --fail https://www.tcmb.gov.tr/kurlar/today.xml -o today.xml \
            || curl -s --fail https://tcmb1.tcmb.gov.tr/kurlar/today.xml -o today.xml
          node -e '
            const fs = require("fs");
            const xml = fs.readFileSync("today.xml", "latin1"); // TCMB XML ISO-8859-9
            function bs(code){
              const re = new RegExp("<Currency[^>]*(?:Kod|CurrencyCode)=\"" + code + "\"[\\s\\S]*?<BanknoteSelling>([0-9.,]+)</BanknoteSelling>");
              const m = xml.match(re);
              return m ? parseFloat(m[1].replace(",", ".")) : 0;
            }
            const dm = xml.match(/Tarih="([^"]+)"/);
            const out = { usd: bs("USD"), eur: bs("EUR"), date: dm ? dm[1] : "", fetchedAt: new Date().toISOString() };
            if (!(out.usd > 0 && out.eur > 0)) { console.error("parse failed", out); process.exit(1); }
            fs.writeFileSync("tcmb-rates.json", JSON.stringify(out, null, 2));
            console.log("OK", out);
          '
          rm -f today.xml

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tcmb-rates.json
          git diff --staged --quiet || git commit -m "chore: update TCMB rates"
          git push
