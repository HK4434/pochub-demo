<!DOCTYPE html>
<!-- PoCHub Test Login | Sadece geliştirme/test için -->
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoCHub — Test Girişi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07080d;color:#e9ecf3;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:480px}
.logo{text-align:center;font-size:22px;font-weight:700;margin-bottom:6px}.logo b{color:#3b7cff}
.sub{text-align:center;font-size:12.5px;color:#5a6278;margin-bottom:28px}
.warn{background:rgba(240,164,41,.1);border:1px solid rgba(240,164,41,.25);border-radius:8px;padding:11px 14px;font-size:12.5px;color:#f0a429;margin-bottom:20px;text-align:center}
.card{background:#0f1117;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;margin-bottom:12px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#5a6278;font-weight:700;margin-bottom:14px}
.user-btn{display:flex;align-items:center;gap:12px;width:100%;background:#1c1f2a;border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:13px 16px;cursor:pointer;color:#e9ecf3;font:inherit;margin-bottom:8px;transition:.1s;text-align:left}
.user-btn:hover{border-color:#3b7cff;background:rgba(59,124,255,.08)}
.user-btn:last-child{margin-bottom:0}
.user-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.user-name{font-size:13.5px;font-weight:700;margin-bottom:2px}
.user-email{font-size:11.5px;color:#7c87a0}
.user-role{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;margin-left:auto;flex-shrink:0}
.status{background:#0f1117;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px;font-size:12.5px;color:#7c87a0;min-height:60px}
.status-line{padding:4px 0;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.spinner{width:14px;height:14px;border:2px solid rgba(59,124,255,.3);border-top-color:#3b7cff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.go-btn{display:block;width:100%;background:#3b7cff;color:#fff;border:none;border-radius:9px;padding:13px;font:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:12px;transition:background .1s}
.go-btn:hover{background:#2460e0}
.go-btn:disabled{background:#2a2d3a;color:#5a6278;cursor:not-allowed}
.divider{text-align:center;font-size:11.5px;color:#5a6278;margin:16px 0}
.back-btn{display:block;text-align:center;color:#5a6278;font-size:12.5px;text-decoration:none;margin-top:16px}
.back-btn:hover{color:#7c87a0}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">Poc<b>Hub</b>.co</div>
  <div class="sub">Test & Geliştirme Girişi</div>
  <div class="warn">⚠ Bu sayfa sadece test amaçlıdır. Production ortamında kullanmayın.</div>

  <div class="card">
    <div class="card-title">Müşteri</div>
    <button class="user-btn" data-role="customer" data-vtype="" data-email="test.musteri@testpochub.com" data-name="Test Müşteri" data-company="Test Teknoloji A.Ş." data-phone="+90 212 555 0001" data-address="Maslak, İstanbul">
      <div class="user-icon" style="background:rgba(34,208,120,.12)">👤</div>
      <div>
        <div class="user-name">Test Müşteri</div>
        <div class="user-email">test.musteri@testpochub.com</div>
      </div>
      <span class="user-role" style="background:rgba(34,208,120,.12);color:#22d078">Müşteri</span>
    </button>
  </div>

  <div class="card">
    <div class="card-title">Vendor</div>
    <button class="user-btn" data-role="vendor" data-vtype="ureticid" data-email="test.ureticid@testpochub.com" data-name="Test Üretici" data-company="NetArmor Test A.Ş." data-phone="+90 312 555 0002" data-address="Ankara Teknokent">
      <div class="user-icon" style="background:rgba(59,124,255,.12)">🏭</div>
      <div>
        <div class="user-name">Test Üretici</div>
        <div class="user-email">test.ureticid@testpochub.com</div>
      </div>
      <span class="user-role" style="background:rgba(59,124,255,.12);color:#7db4ff">Üretici</span>
    </button>
    <button class="user-btn" data-role="vendor" data-vtype="distributor" data-email="test.distributor@testpochub.com" data-name="Test Distribütör" data-company="Fortinet TR Test" data-phone="+90 216 555 0003" data-address="Levent, İstanbul">
      <div class="user-icon" style="background:rgba(139,92,246,.12)">🔄</div>
      <div>
        <div class="user-name">Test Distribütör</div>
        <div class="user-email">test.distributor@testpochub.com</div>
      </div>
      <span class="user-role" style="background:rgba(139,92,246,.12);color:#c4a8ff">Distribütör</span>
    </button>
    <button class="user-btn" data-role="vendor" data-vtype="integrator" data-email="test.integrator@testpochub.com" data-name="Test Entegratör" data-company="Sistem Entegrasyon Test Ltd." data-phone="+90 232 555 0004" data-address="Alsancak, İzmir">
      <div class="user-icon" style="background:rgba(240,164,41,.12)">⚙️</div>
      <div>
        <div class="user-name">Test Entegratör</div>
        <div class="user-email">test.integrator@testpochub.com</div>
      </div>
      <span class="user-role" style="background:rgba(240,164,41,.12);color:#f0a429">Entegratör</span>
    </button>
  </div>

  <div id="status" class="status" style="display:none"></div>
  <button class="go-btn" id="go-btn" style="display:none" disabled>pochub.co'ya Git →</button>

  <a href="https://pochub.co" class="back-btn">← pochub.co'ya dön</a>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCZ76Ga8DCGAUy33kb0Jk-wEDTHsOzRWDk",
  authDomain: "pochub-co.firebaseapp.com",
  projectId: "pochub-co",
  storageBucket: "pochub-co.firebasestorage.app",
  messagingSenderId: "970891427053",
  appId: "1:970891427053:web:30a98a281e9fe2260c20e4"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const TEST_PASS = 'PoCHub_Test_2026!';

const statusEl = document.getElementById('status');
const goBtn = document.getElementById('go-btn');

function log(msg, type='info') {
  const colors = { info:'#7c87a0', ok:'#22d078', err:'#ff7070', loading:'#3b7cff' };
  const icons = { info:'ℹ', ok:'✓', err:'✗', loading:'spinner' };
  
  const line = document.createElement('div');
  line.className = 'status-line';
  
  if (type === 'loading') {
    line.innerHTML = `<div class="spinner"></div><span style="color:${colors[type]}">${msg}</span>`;
  } else {
    line.innerHTML = `<div class="dot" style="background:${colors[type]}"></div><span style="color:${colors[type]}">${msg}</span>`;
  }
  statusEl.appendChild(line);
  statusEl.scrollTop = statusEl.scrollHeight;
}

function clearLog() {
  statusEl.innerHTML = '';
}

document.querySelectorAll('.user-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    // Diğer butonları devre dışı bırak
    document.querySelectorAll('.user-btn').forEach(b => b.disabled = true);
    
    statusEl.style.display = 'block';
    goBtn.style.display = 'none';
    clearLog();

    const email = btn.dataset.email;
    const role = btn.dataset.role;
    const vtype = btn.dataset.vtype;
    const name = btn.dataset.name;
    const company = btn.dataset.company;
    const phone = btn.dataset.phone;
    const address = btn.dataset.address;

    log(`${name} olarak giriş yapılıyor...`, 'loading');

    try {
      let uid;

      // Önce giriş yapmayı dene
      try {
        const cred = await signInWithEmailAndPassword(auth, email, TEST_PASS);
        uid = cred.user.uid;
        log(`Mevcut hesaba giriş yapıldı`, 'ok');
      } catch(loginErr) {
        // Hesap yoksa oluştur
        if (loginErr.code === 'auth/user-not-found' || loginErr.code === 'auth/invalid-credential') {
          log('Hesap bulunamadı, oluşturuluyor...', 'loading');
          const cred = await createUserWithEmailAndPassword(auth, email, TEST_PASS);
          uid = cred.user.uid;
          log('Hesap oluşturuldu', 'ok');
        } else {
          throw loginErr;
        }
      }

      // Firestore profili kontrol et / oluştur
      log('Profil kontrol ediliyor...', 'loading');
      const profileSnap = await getDoc(doc(db, 'users', uid));
      
      if (!profileSnap.exists()) {
        log('Profil oluşturuluyor...', 'loading');
        await setDoc(doc(db, 'users', uid), {
          email, displayName: name, company, phone, address,
          role, vendorType: vtype || '',
          emailVerified: true, // Test kullanıcıları doğrulanmış kabul edilir
          taxNo: 'TEST001',
          createdAt: serverTimestamp()
        });
        log('Profil oluşturuldu', 'ok');
      } else {
        log('Profil mevcut', 'ok');
        // emailVerified flag'ini güncelle (test için)
        await setDoc(doc(db, 'users', uid), { emailVerified: true }, { merge: true });
      }

      log(`✓ ${name} olarak giriş başarılı!`, 'ok');
      log(`Rol: ${role}${vtype?' ('+vtype+')':''}`, 'info');
      
      // Token'ı localStorage'a kaydet (pochub.co aynı Firebase projesini kullanıyor)
      goBtn.style.display = 'block';
      goBtn.disabled = false;
      goBtn.addEventListener('click', () => {
        window.location.href = 'https://pochub.co';
      });

    } catch(err) {
      log(`Hata: ${err.message}`, 'err');
      document.querySelectorAll('.user-btn').forEach(b => b.disabled = false);
    }
  });
});
</script>
</body>
</html>
