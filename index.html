async function vendInvites(m) {
  const snap = await getDocs(query(collection(db,'poc_invites'), where('vendorId','==',CUR_USER.uid)));
  var invites = snap.docs.map(d=>({...d.data(),id:d.id}));
  invites.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  var statusLabels = {
    pending:'Bekliyor', accepted:'Kabul Edildi',
    declined:'Reddedildi', expired:'Süresi Doldu'
  };
  var statusColors = {
    pending:'#f0a429', accepted:'#22d078',
    declined:'#ff7070', expired:'#5a6278'
  };

  m.innerHTML =
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">' +
    '<div><h2 style="font-size:18px;font-weight:700">Davetlerim</h2>' +
    '<div style="font-size:12.5px;color:#7c87a0;margin-top:2px">Müşterilere PoC daveti gönderin. Kabul edilince talep otomatik oluşur.</div></div>' +
    '<button class="btn-p btn-sm" id="send-invite-btn">+ Davet Gönder</button>' +
    '</div>' +
    '<div style="background:rgba(59,124,255,.08);border:1px solid rgba(59,124,255,.2);border-radius:8px;padding:11px 14px;font-size:12.5px;color:#7db4ff;margin-bottom:14px">' +
    'ℹ Müşteri e-posta adresini girin. Platforma kayıtlıysa anında bildirim alır. Kayıtlı değilse kayıt daveti maili gönderilir. Kabul ettiğinde PoC talebi otomatik oluşur.' +
    '</div>' +
    (invites.length ?
      '<table><thead><tr><th>Müşteri E-posta</th><th>Ürün</th><th>Mesaj</th><th>Durum</th><th>Tarih</th><th>İşlem</th></tr></thead><tbody>' +
      invites.map(function(inv) {
        var sc = statusColors[inv.status]||'#7c87a0';
        var sl = statusLabels[inv.status]||inv.status;
        return '<tr>' +
          '<td><div style="font-weight:600">'+(inv.customerEmail||'—')+'</div>' +
          '<div style="font-size:11.5px;color:#7c87a0">'+(inv.customerName||'')+'</div></td>' +
          '<td style="color:#7c87a0">'+(inv.productName||'—')+'</td>' +
          '<td style="color:#7c87a0;font-size:12px;max-width:150px;overflow:hidden;text-overflow:ellipsis">'+(inv.message||'—')+'</td>' +
          '<td><span class="bdg" style="background:'+sc+'22;color:'+sc+'">'+sl+'</span></td>' +
          '<td style="color:#7c87a0;font-size:12px">'+fmt(inv.createdAt)+'</td>' +
          '<td>' +
          (inv.status==='pending' ?
            '<button class="btn-red btn-sm inv-cancel" data-id="'+inv.id+'">İptal</button>' :
            inv.status==='accepted' ?
            '<button class="btn-g btn-sm inv-view-poc" data-pocid="'+(inv.pocRequestId||'')+'" style="font-size:11px">PoC Gör</button>' : '—') +
          '</td></tr>';
      }).join('') + '</tbody></table>' :
      '<div class="empty"><div class="empty-icon">📨</div>Henüz davet göndermediniz.<br><small style="color:#5a6278">Müşteri e-postası ile hemen davet başlatın.</small></div>'
    );

  m.querySelector('#send-invite-btn')?.addEventListener('click', () => openSendInviteModal());
  m.querySelectorAll('.inv-cancel').forEach(function(b) {
    b.addEventListener('click', async function() {
      if (!confirm('Bu daveti iptal etmek istiyor musunuz?')) return;
      await updateDoc(doc(db,'poc_invites',b.dataset.id), {status:'declined', cancelledAt:serverTimestamp()});
      showToast('Davet iptal edildi.');
      vendInvites(m);
    });
  });
  m.querySelectorAll('.inv-view-poc').forEach(function(b) {
    b.addEventListener('click', async function() {
      if (!b.dataset.pocid) return;
      var pocDoc = await getDoc(doc(db,'poc_requests',b.dataset.pocid));
      if (pocDoc.exists()) openPocTimeline({...pocDoc.data(), id:b.dataset.pocid});
    });
  });
}

async function openSendInviteModal() {
  // Vendor'ın ürünlerini + portföyünü çek
  var [ownSnap, portSnap] = await Promise.all([
    getDocs(query(collection(db,'products'), where('vendorId','==',CUR_USER.uid), where('status','==','active'))),
    getDocs(query(collection(db,'vendor_products'), where('vendorId','==',CUR_USER.uid), where('status','==','active'))),
  ]);
  var products = [
    ...ownSnap.docs.map(d=>({...d.data(),id:d.id,_src:'own'})),
    ...portSnap.docs.map(d=>({...d.data(),id:d.id,_src:'port',name:d.data().productName})),
  ];

  var modal = document.createElement('div');
  modal.className = 'modal-bg on';
  modal.innerHTML =
    '<div class="modal" style="max-width:500px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">' +
    '<h3 style="font-size:15px;font-weight:700">PoC Daveti Gönder</h3>' +
    '<button id="inv-close" style="background:none;border:none;color:#7c87a0;cursor:pointer;font-size:18px">×</button>' +
    '</div>' +

    '<label class="lbl">Müşteri E-posta Adresi *</label>' +
    '<input class="inp" id="inv-email" type="email" placeholder="musteri@firma.com">' +
    '<div id="inv-user-check" style="font-size:12px;margin:4px 0 8px;height:16px"></div>' +

    '<label class="lbl">Müşteri Adı / Şirket</label>' +
    '<input class="inp" id="inv-name" placeholder="Ali Yılmaz / ABC Teknoloji">' +

    '<label class="lbl">İlgili Ürün *</label>' +
    '<select class="inp" id="inv-product">' +
    '<option value="">Ürün seçin...</option>' +
    products.map(function(p) {
      var src = p._src==='port'?' (Portföy)':'';
      return '<option value="'+p.id+'" data-name="'+(p.name||p.productName||'')+'" data-cat="'+(p.category||p.productCategory||'')+'">'+( p.name||p.productName||'—')+src+'</option>';
    }).join('') +
    '</select>' +

    '<label class="lbl">Davet Mesajı *</label>' +
    '<textarea class="inp" id="inv-msg" rows="4" style="resize:none" placeholder="Merhaba, sizi ürünümüzü ücretsiz test etmeye davet ediyoruz..."></textarea>' +

    '<label class="lbl">PoC Konumu</label>' +
    '<select class="inp" id="inv-loc">' +
    '<option value="online">Online</option>' +
    '<option value="customer">Müşteri Lokasyonu</option>' +
    '<option value="vendor">Vendor Lokasyonu</option>' +
    '<option value="hybrid">Hibrit</option>' +
    '</select>' +

    '<div id="inv-err" style="margin-top:8px"></div>' +
    '<button class="btn-p" id="inv-submit" style="width:100%;padding:11px;font-size:14px;margin-top:14px">Daveti Gönder</button>' +
    '</div>';

  document.body.appendChild(modal);
  modal.querySelector('#inv-close').addEventListener('click', ()=>modal.remove());
  modal.addEventListener('click', e=>{if(e.target===modal)modal.remove();});

  // E-posta yazılınca kullanıcı kayıtlı mı kontrol et
  var checkTimer = null;
  modal.querySelector('#inv-email').addEventListener('input', function() {
    clearTimeout(checkTimer);
    var checkEl = modal.querySelector('#inv-user-check');
    var email = this.value.trim().toLowerCase();
    if (!email || !email.includes('@')) { checkEl.innerHTML=''; return; }
    checkEl.innerHTML = '<span style="color:#5a6278">Kontrol ediliyor...</span>';
    checkTimer = setTimeout(async function() {
      try {
        var usersSnap = await getDocs(query(collection(db,'users'), where('email','==',email)));
        if (!usersSnap.empty) {
          var u = usersSnap.docs[0].data();
          if (u.role === 'vendor' || u.role === 'admin' || u.role === 'moderator' || u.role === 'support') {
            checkEl.innerHTML = '<span style="color:#ff7070">✗ Bu kullanıcı müşteri değil ('+getRolePerm(u.role).label+'). Davet sadece müşterilere gönderilebilir.</span>';
            modal.querySelector('#inv-submit').disabled = true;
          } else {
            checkEl.innerHTML = '<span style="color:#22d078">✓ Kayıtlı müşteri — '+(u.displayName||u.company||u.email)+'</span>';
            if (u.displayName||u.company) modal.querySelector('#inv-name').value = u.displayName||u.company;
            modal.querySelector('#inv-submit').disabled = false;
          }
        } else {
          checkEl.innerHTML = '<span style="color:#f0a429">⚠ Kayıtlı değil — davet maili gönderilecek</span>';
          modal.querySelector('#inv-submit').disabled = false;
        }
      } catch(e) { checkEl.innerHTML=''; }
    }, 600);
  });

  modal.querySelector('#inv-submit').addEventListener('click', async function() {
    var email = modal.querySelector('#inv-email').value.trim().toLowerCase();
    var name  = modal.querySelector('#inv-name').value.trim();
    var prodSel = modal.querySelector('#inv-product');
    var prodId = prodSel.value;
    var prodOpt = prodSel.options[prodSel.selectedIndex];
    var prodName = prodOpt?.dataset?.name || prodOpt?.text || '';
    var prodCat  = prodOpt?.dataset?.cat  || '';
    var msg   = modal.querySelector('#inv-msg').value.trim();
    var loc   = modal.querySelector('#inv-loc').value;
    var errDiv = modal.querySelector('#inv-err');

    if (!email || !email.includes('@')) { errDiv.innerHTML='<div class="alert alert-err">Geçerli e-posta girin.</div>'; return; }
    if (!prodId) { errDiv.innerHTML='<div class="alert alert-err">Ürün seçin.</div>'; return; }
    if (!msg) { errDiv.innerHTML='<div class="alert alert-err">Mesaj zorunludur.</div>'; return; }
    if (email === CUR_USER.email) { errDiv.innerHTML='<div class="alert alert-err">Kendinize davet gönderemezsiniz.</div>'; return; }

    var btn = modal.querySelector('#inv-submit');
    btn.disabled=true; btn.textContent='Gönderiliyor...';

    try {
      // Daha önce bekleyen davet var mı?
      var existSnap = await getDocs(query(collection(db,'poc_invites'),
        where('vendorId','==',CUR_USER.uid),
        where('customerEmail','==',email),
        where('status','==','pending')
      ));
      if (!existSnap.empty) {
        errDiv.innerHTML='<div class="alert alert-err">Bu müşteriye zaten bekleyen bir davetiniz var.</div>';
        btn.disabled=false; btn.textContent='Daveti Gönder'; return;
      }

      // Kullanıcı kayıtlı mı?
      var usersSnap = await getDocs(query(collection(db,'users'), where('email','==',email)));
      var isRegistered = !usersSnap.empty;
      var customerId = isRegistered ? usersSnap.docs[0].id : null;

      // Davet kaydı oluştur
      var inviteRef = await addDoc(collection(db,'poc_invites'), {
        vendorId:    CUR_USER.uid,
        vendorName:  CUR_PROFILE?.displayName||CUR_USER.email,
        vendorEmail: CUR_USER.email,
        vendorType:  CUR_PROFILE?.vendorType||'',
        vendorCompany: CUR_PROFILE?.company||'',
        customerEmail: email,
        customerName:  name,
        customerId:    customerId,
        productId:     prodId,
        productName:   prodName,
        productCategory: prodCat,
        message:       msg,
        location:      loc,
        status:        'pending',
        isRegistered:  isRegistered,
        createdAt:     serverTimestamp(),
        expiresAt:     new Date(Date.now() + 30*24*60*60*1000), // 30 gün
      });

      // Mail gönder
      var mailSubject = isRegistered ?
        'Size PoC Daveti Var — PoCHub' :
        'PoCHub Platformuna Davet Edildiniz';

            var mailBody = isRegistered ? (CUR_PROFILE?.displayName||CUR_USER.email)+' size '+prodName+' icin PoC daveti gonderdi. '+msg : (CUR_PROFILE?.displayName||CUR_USER.email)+' sizi PoCHub platformuna davet etti. '+msg+' pochub.co';

      sendEmail(email, name||email, mailSubject, mailBody, '');

      // Kayıtlı kullanıcıysa Firestore bildirim de ekle
      if (customerId) {
        await addDoc(collection(db,'notifications'), {
          userId: customerId,
          type: 'poc_invite',
          title: 'Yeni PoC Daveti',
          body: (CUR_PROFILE?.displayName||CUR_USER.email)+' sizi "'+prodName+'" için PoC sürecine davet etti.',
          inviteId: inviteRef.id,
          vendorName: CUR_PROFILE?.displayName||CUR_USER.email,
          read: false,
          createdAt: serverTimestamp()
        });
      }

      modal.remove();
      showToast('Davet gönderildi! '+( isRegistered ? 'Kullanıcı bildirim aldı.' : 'Kayıt daveti maili gönderildi.'));
      CUR_VEND_TAB = 'invites';
      loadVendTab();
    } catch(e) {
      errDiv.innerHTML='<div class="alert alert-err">'+e.message+'</div>';
      btn.disabled=false; btn.textContent='Daveti Gönder';
    }
  });
}

        '<input type="checkbox" class="port-cb" data-id="'+p.id+'" '+(inP?'disabled':'')+(checked?' checked':'')+' style="width:16px;height:16px;flex-shrink:0;cursor:'+(inP?'not-allowed':'pointer')+'">' +
        '<div style="flex:1"><div style="font-size:13px;font-weight:600">'+p.name+(inP?' <span style="font-size:10px;color:#22d078">(Portföyünüzde)</span>':'')+'</div>' +
        '<div style="font-size:12px;color:#7c87a0">'+(p.vendorName||'—')+' · '+(p.category||'—')+' · '+cc(p.country||'TR')+'</div></div>' +
        (inP?'<span class="bdg" style="background:rgba(34,208,120,.12);color:#22d078">✓</span>':'') +
        '</label>';
    }).join('');
    modal.querySelectorAll('.port-cb:not([disabled])').forEach(function(cb){
      cb.addEventListener('change',function(){if(cb.checked)sel.add(cb.dataset.id);else sel.delete(cb.dataset.id);updateBar();});
    });
  }
  renderList(allProds);
  modal.querySelector('#port-search').addEventListener('input',function(){
    var q=this.value.toLowerCase();
    renderList(q?allProds.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.vendorName||'').toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q)):allProds);
  });
  modal.querySelector('#port-clear').addEventListener('click',function(){
    sel.clear();modal.querySelectorAll('.port-cb').forEach(cb=>{cb.checked=false;});updateBar();
  });
  modal.querySelector('#port-submit').addEventListener('click',async function(){
    if(!sel.size) return;
    var role=modal.querySelector('#port-role').value;
    var btn=modal.querySelector('#port-submit'); btn.disabled=true; btn.textContent='Ekleniyor...';
    try {
      var added=0, notified=new Set();
      for(var pid of sel){
        var prod=allProds.find(p=>p.id===pid); if(!prod) continue;
        await addDoc(collection(db,'vendor_products'),{
          vendorId:CUR_USER.uid, vendorName:CUR_PROFILE?.displayName||CUR_USER.email,
          vendorEmail:CUR_USER.email, vendorType:CUR_PROFILE?.vendorType||'',
          productId:prod.id, productName:prod.name, productCategory:prod.category||'',
          originalVendorId:prod.vendorId, originalVendorName:prod.vendorName||'',
          originalVendorEmail:prod.vendorEmail||'', role:role, status:'active',
          createdAt:serverTimestamp()
        });
        if(prod.vendorEmail&&prod.vendorEmail!==CUR_USER.email&&!notified.has(prod.vendorEmail)){
          notified.add(prod.vendorEmail);
          sendEmail(prod.vendorEmail,prod.vendorName||'','Ürününüz Portföye Eklendi — PoCHub',
            (CUR_PROFILE?.displayName||CUR_USER.email)+' ürününüzü portföyüne ekledi.','Ürün: '+prod.name+'\nRol: '+role);
        }
        added++;
      }
      modal.remove(); showToast(added+' ürün portföyünüze eklendi!');
      CUR_VEND_TAB='portfolio'; loadVendTab();
    } catch(e){
      modal.querySelector('#port-err').innerHTML='<div class="alert alert-err">'+e.message+'</div>';
      btn.disabled=false; btn.textContent=sel.size+' Ürünü Portföye Ekle';
    }
  });
}

async function admRoles(m) {
  const snap = await getDocs(collection(db,'users'));
  var all = snap.docs.map(d=>({...d.data(),id:d.id}));
  all.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  var ROLES = [{v:'customer',l:'Müşteri'},{v:'vendor',l:'Vendor'},{v:'support',l:'Destek'},{v:'moderator',l:'Moderatör'},{v:'admin',l:'Admin'}];
  var roleFilter='';
  function renderRows(users){
    var tbody=m.querySelector('#roles-tbody'),cnt=m.querySelector('#roles-cnt');
    if(cnt) cnt.textContent='('+users.length+')';
    if(!tbody) return;
    tbody.innerHTML=users.map(function(u){
      var rp=getRolePerm(u.role);
      var vt={ureticid:'Üretici',distributor:'Distribütör',integrator:'Entegratör'};
      var rl=u.role==='vendor'?(vt[u.vendorType]||'Vendor'):rp.label;
      return '<tr style="border-top:1px solid rgba(255,255,255,.06)">'+
        '<td style="padding:11px 14px"><div style="font-weight:600">'+(u.displayName||'—')+'</div><div style="font-size:11.5px;color:#7c87a0">'+u.email+'</div></td>'+
        '<td style="padding:11px 14px"><span class="bdg" style="background:'+rp.bg+';color:'+rp.color+'">'+rl+'</span></td>'+
        '<td style="padding:11px 14px;color:#7c87a0">'+(u.company||'—')+'</td>'+
        '<td style="padding:11px 14px">'+
        '<select class="inp rs-sel" data-uid="'+u.id+'" style="padding:5px 8px;font-size:12px;width:auto">'+
        ROLES.map(r=>'<option value="'+r.v+'"'+(u.role===r.v?' selected':'')+'>'+r.l+'</option>').join('')+
        '</select></td>'+
        '<td style="padding:11px 14px"><button class="btn-p btn-sm rs-save" data-uid="'+u.id+'" data-name="'+(u.displayName||u.email)+'">Kaydet</button></td>'+
        '</tr>';
    }).join('');
    m.querySelectorAll('.rs-save').forEach(function(btn){
      btn.addEventListener('click',async function(){
        if(btn.dataset.uid===CUR_USER?.uid){showToast('Kendi rolünüzü değiştiremezsiniz.','err');return;}
        var newRole=m.querySelector('.rs-sel[data-uid="'+btn.dataset.uid+'"]')?.value;
        if(!newRole) return;
        btn.disabled=true; btn.textContent='...';
        try{
          await updateDoc(doc(db,'users',btn.dataset.uid),{role:newRole});
          showToast(btn.dataset.name+' rolü güncellendi.');
          admRoles(m);
        }catch(e){showToast('Hata: '+e.message,'err');btn.disabled=false;btn.textContent='Kaydet';}
      });
    });
  }
  function applyFilter(){
    var q=(m.querySelector('#roles-s')?.value||'').toLowerCase();
    renderRows(all.filter(u=>(!roleFilter||u.role===roleFilter)&&(!q||(u.displayName||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q)||(u.company||'').toLowerCase().includes(q))));
  }
  m.innerHTML=
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'+
    '<h2 style="font-size:18px;font-weight:700">Rol Yönetimi <span id="roles-cnt" style="font-size:13px;color:#7c87a0;font-weight:400"></span></h2>'+
    '<input class="inp" id="roles-s" placeholder="Ad veya e-posta..." style="width:240px;font-size:12.5px"></div>'+
    '<div style="background:rgba(240,164,41,.08);border:1px solid rgba(240,164,41,.2);border-radius:8px;padding:10px 14px;font-size:12.5px;color:#f0a429;margin-bottom:12px">'+
    '⚠ Rol değişikliği anında geçerli olur. Kendi rolünüzü değiştiremezsiniz.</div>'+
    '<div style="display:flex;gap:8px;margin-bottom:12px">'+
    '<button class="btn-p btn-sm roles-rf" data-r="">Tümü</button>'+
    '<button class="btn-g btn-sm roles-rf" data-r="customer">Müşteri</button>'+
    '<button class="btn-g btn-sm roles-rf" data-r="vendor">Vendor</button>'+
    '<button class="btn-g btn-sm roles-rf" data-r="support">Destek</button>'+
    '<button class="btn-g btn-sm roles-rf" data-r="moderator">Moderatör</button>'+
    '<button class="btn-g btn-sm roles-rf" data-r="admin">Admin</button>'+
    '</div>'+
    '<table><thead><tr><th>Ad/E-posta</th><th>Mevcut</th><th>Şirket</th><th>Yeni Rol</th><th>İşlem</th></tr></thead><tbody id="roles-tbody"></tbody></table>';
  renderRows(all);
  m.querySelector('#roles-s').addEventListener('input',applyFilter);
  m.querySelectorAll('.roles-rf').forEach(function(b){
    b.addEventListener('click',function(){
      m.querySelectorAll('.roles-rf').forEach(x=>{x.className='btn-g btn-sm roles-rf';});
      b.className='btn-p btn-sm roles-rf'; roleFilter=b.dataset.r; applyFilter();
    });
  });
}


async function renderVendorCalendar(m) {
  // Tüm vendor verilerini çek
  var pocSnap = await getDocs(query(collection(db,'poc_requests'), where('vendorId','==',CUR_USER.uid)));
  var evSnap2 = await getDocs(query(collection(db,'public_events'), where('vendorId','==',CUR_USER.uid)));

  var pocItems = pocSnap.docs.map(function(d) { return {...d.data(), id:d.id, itemType:'private'}; });
  var evItems2 = evSnap2.docs.map(function(d) { return {...d.data(), id:d.id, itemType:'public'}; });
  var allItems = pocItems.concat(evItems2);
  allItems.sort(function(a,b) {
    var da = a.eventDate || a.createdAt;
    var db2 = b.eventDate || b.createdAt;
    return (da&&da.seconds?da.seconds:0) - (db2&&db2.seconds?db2.seconds:0);
  });

  var today = new Date();
  var calYear = today.getFullYear();
  var calMonth = today.getMonth();
  var calView = 'calendar'; // 'calendar' | 'list'
  var searchQuery = '';

  function getFiltered() {
    var q = searchQuery.toLowerCase();
    if (!q) return allItems;
    return allItems.filter(function(item) {
      return (item.title||'').toLowerCase().includes(q) ||
             (item.productName||'').toLowerCase().includes(q) ||
             (item.customerName||'').toLowerCase().includes(q);
    });
  }

  function renderContent() {
    var filtered = getFiltered();
    var contentEl = document.getElementById('vcal-content');
    if (!contentEl) return;

    if (calView === 'list') {
      renderListView(filtered, contentEl);
    } else {
      renderCalView(filtered, contentEl);
    }
  }

  function renderListView(items, container) {
    if (!items.length) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">📅</div>Kayıt bulunamadı.</div>';
      return;
    }
    var html = '<table style="width:100%;border-collapse:collapse;font-size:12.5px">' +
      '<thead><tr>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;color:#5a6278;font-size:10.5px;text-transform:uppercase">Başlık / Ürün</th>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;color:#5a6278;font-size:10.5px;text-transform:uppercase">Tür</th>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;color:#5a6278;font-size:10.5px;text-transform:uppercase">Müşteri</th>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;color:#5a6278;font-size:10.5px;text-transform:uppercase">Durum</th>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;color:#5a6278;font-size:10.5px;text-transform:uppercase">Tarih</th>' +
      '</tr></thead><tbody>';

    items.forEach(function(item) {
      var isPublic = item.itemType === 'public';
      var dateStr = item.eventDate ? fmt(item.eventDate) : item.createdAt ? fmt(item.createdAt) : '—';
      html += '<tr style="border-top:1px solid rgba(255,255,255,.06)">' +
        '<td style="padding:11px 14px"><div style="font-weight:600">' + (item.title||item.productName||'—') + '</div>' +
        (item.productName&&item.itemType==='private'?'<div style="font-size:11px;color:#5a6278">'+item.productName+'</div>':'') + '</td>' +
        '<td style="padding:11px 14px">' + (isPublic ?
          '<span class="bdg" style="background:rgba(34,208,120,.12);color:#22d078">Public</span>' :
          '<span class="bdg" style="background:rgba(59,124,255,.12);color:#7db4ff">Private</span>') + '</td>' +
        '<td style="padding:11px 14px;color:#7c87a0">' + (item.customerName||'—') + '</td>' +
        '<td style="padding:11px 14px">' + statusBadge(item.status) + '</td>' +
        '<td style="padding:11px 14px;color:#7c87a0;font-size:12px">' + dateStr + '</td>' +
        '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function renderCalView(items, container) {
    var MONTHS = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    var DAYS = ['Pt','Sa','Ça','Pe','Cu','Ct','Pz'];

    // O aya ait item'ları gün bazında grupla
    var dayMap = {};
    items.forEach(function(item) {
      var dateField = item.eventDate || item.createdAt;
      if (!dateField || !dateField.toDate) return;
      var d = dateField.toDate();
      if (d.getFullYear()===calYear && d.getMonth()===calMonth) {
        var day = d.getDate();
        if (!dayMap[day]) dayMap[day] = [];
        dayMap[day].push(item);
      }
    });

    var firstDay = new Date(calYear, calMonth, 1).getDay();
    var offset = firstDay===0 ? 6 : firstDay-1;
    var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

    var html = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px">';
    DAYS.forEach(function(d) {
      html += '<div style="text-align:center;font-size:10px;color:#5a6278;font-weight:700;padding:4px 0">' + d + '</div>';
    });
    for (var i=0;i<offset;i++) html += '<div></div>';
    for (var day=1;day<=daysInMonth;day++) {
      var isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===day;
      var dayItems = dayMap[day]||[];
      var hasPoc = dayItems.some(function(x){return x.itemType==='private';});
      var hasEv = dayItems.some(function(x){return x.itemType==='public';});
      var bg = isToday ? '#3b7cff' : (hasPoc||hasEv) ? 'rgba(59,124,255,.15)' : 'transparent';
      var border = isToday ? 'none' : (hasPoc||hasEv) ? '1px solid rgba(59,124,255,.3)' : '1px solid rgba(255,255,255,.06)';
      html += '<div class="vcal-day" data-day="' + day + '" style="min-height:52px;border-radius:6px;padding:4px;cursor:' + (dayItems.length?'pointer':'default') + ';background:' + bg + ';border:' + border + '">' +
        '<div style="font-size:11.5px;font-weight:' + (isToday||dayItems.length?'700':'400') + ';color:' + (isToday?'#fff':dayItems.length?'#e9ecf3':'#5a6278') + '">' + day + '</div>';
      if (hasPoc) html += '<div style="width:6px;height:6px;border-radius:50%;background:#7db4ff;margin-top:2px" title="Private PoC"></div>';
      if (hasEv) html += '<div style="width:6px;height:6px;border-radius:50%;background:#22d078;margin-top:2px" title="Public Etkinlik"></div>';
      html += '</div>';
    }
    html += '</div>';

    // Seçili gün detayı
    html += '<div id="vcal-day-detail"></div>';

    container.innerHTML = html;

    // Gün tıklama
    container.querySelectorAll('.vcal-day').forEach(function(dayEl) {
      dayEl.addEventListener('click', function() {
        var day = parseInt(dayEl.dataset.day);
        var dayItems = dayMap[day]||[];
        if (!dayItems.length) return;

        // Önceki seçimi temizle
        container.querySelectorAll('.vcal-day').forEach(function(d) {
          if (!d.classList.contains('today')) d.style.outline='none';
        });
        dayEl.style.outline='2px solid #3b7cff';

        var detailEl = document.getElementById('vcal-day-detail');
        if (!detailEl) return;
        var dHtml = '<div style="margin-top:4px">';
        dayItems.forEach(function(item) {
          var isPublic = item.itemType==='public';
          dHtml += '<div class="card" style="margin-bottom:8px;padding:12px;border-color:' + (isPublic?'rgba(34,208,120,.25)':'rgba(59,124,255,.25)') + '">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">' +
            '<span class="bdg" style="background:' + (isPublic?'rgba(34,208,120,.12)':'rgba(59,124,255,.12)') + ';color:' + (isPublic?'#22d078':'#7db4ff') + '">' + (isPublic?'Public Etkinlik':'Private PoC') + '</span>' +
            statusBadge(item.status) + '</div>' +
            '<div style="font-size:13px;font-weight:700">' + (item.title||item.productName||'—') + '</div>' +
            (item.customerName?'<div style="font-size:12px;color:#7c87a0;margin-top:3px">Müşteri: '+item.customerName+'</div>':'') +
            (item.productName&&isPublic?'<div style="font-size:12px;color:#7c87a0;margin-top:3px">Ürün: '+item.productName+'</div>':'') +
            '</div>';
        });
        dHtml += '</div>';
        detailEl.innerHTML = dHtml;
      });
    });
  }

  // Ana layout
  m.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">' +
    '<h2 style="font-size:18px;font-weight:700">PoC Takvimim</h2>' +
    '<div style="display:flex;gap:8px;align-items:center">' +
    '<input class="inp" id="vcal-search" placeholder="Ürün, müşteri veya başlık ara..." style="width:240px;font-size:12.5px">' +
    '<button id="vcal-toggle-list" class="btn-g btn-sm">📋 Liste</button>' +
    '<button id="vcal-toggle-cal" class="btn-p btn-sm">📅 Takvim</button>' +
    '</div>' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px" id="vcal-nav">' +
    '<button id="vcal-prev" style="background:none;border:none;color:#7c87a0;cursor:pointer;font-size:18px;padding:2px 8px">‹</button>' +
    '<span id="vcal-month-label" style="font-size:13px;font-weight:700;min-width:120px;text-align:center"></span>' +
    '<button id="vcal-next" style="background:none;border:none;color:#7c87a0;cursor:pointer;font-size:18px;padding:2px 8px">›</button>' +
    '</div>' +
    '<div id="vcal-legend" style="display:flex;gap:14px;margin-bottom:12px;font-size:12px;color:#7c87a0">' +
    '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#7db4ff;margin-right:4px"></span>Private PoC</span>' +
    '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#22d078;margin-right:4px"></span>Public Etkinlik</span>' +
    '</div>' +
    '<div id="vcal-content"></div>';

  var MONTHS_TR = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

  function updateMonthLabel() {
    var lbl = document.getElementById('vcal-month-label');
    if (lbl) lbl.textContent = MONTHS_TR[calMonth] + ' ' + calYear;
  }

  function setView(view) {
    calView = view;
    var navEl = document.getElementById('vcal-nav');
    var legEl = document.getElementById('vcal-legend');
    if (navEl) navEl.style.display = view==='calendar' ? 'flex' : 'none';
    if (legEl) legEl.style.display = view==='calendar' ? 'flex' : 'none';
    document.getElementById('vcal-toggle-cal').className = view==='calendar' ? 'btn-p btn-sm' : 'btn-g btn-sm';
    document.getElementById('vcal-toggle-list').className = view==='list' ? 'btn-p btn-sm' : 'btn-g btn-sm';
    updateMonthLabel();
    renderContent();
  }

  m.querySelector('#vcal-prev').addEventListener('click', function() {
    calMonth--; if(calMonth<0){calMonth=11;calYear--;}
    updateMonthLabel(); renderContent();
  });
  m.querySelector('#vcal-next').addEventListener('click', function() {
    calMonth++; if(calMonth>11){calMonth=0;calYear++;}
    updateMonthLabel(); renderContent();
  });
  m.querySelector('#vcal-toggle-list').addEventListener('click', function() { setView('list'); });
  m.querySelector('#vcal-toggle-cal').addEventListener('click', function() { setView('calendar'); });
  m.querySelector('#vcal-search').addEventListener('input', function() {
    searchQuery = this.value;
    renderContent();
  });

  setView('calendar');
}

  modal.querySelector('#close-eedit').addEventListener('click', function() { modal.remove(); });
  modal.addEventListener('click', function(e) { if(e.target===modal) modal.remove(); });

  function updateEeLocFields() {
    var fmt = modal.querySelector('#ee-fmt').value;
    modal.querySelector('#ee-loc-online').style.display = (fmt==='online'||fmt==='hybrid') ? 'block' : 'none';
    modal.querySelector('#ee-loc-onsite').style.display = (fmt==='onsite'||fmt==='hybrid') ? 'block' : 'none';
  }
  modal.querySelector('#ee-fmt').addEventListener('change', updateEeLocFields);
  updateEeLocFields();

  modal.querySelector('#ee-submit').addEventListener('click', async function() {
    var title = modal.querySelector('#ee-title').value.trim();
    var desc = modal.querySelector('#ee-desc').value.trim();
    if (!title || !desc) {
      modal.querySelector('#ee-err').innerHTML = '<div class="alert alert-err">Başlık ve açıklama zorunludur.</div>';
      return;
    }
    var btn = modal.querySelector('#ee-submit');
    btn.disabled=true; btn.textContent='Güncelleniyor...';
    try {
      var dateVal = modal.querySelector('#ee-date').value;
      var timeVal = modal.querySelector('#ee-time').value || '10:00';
      var fmt = modal.querySelector('#ee-fmt').value;
      var urlVal = modal.querySelector('#ee-url').value.trim();
      var addrVal = modal.querySelector('#ee-address').value.trim();
      var locStr = fmt==='online' ? urlVal : fmt==='onsite' ? addrVal : addrVal + ' | ' + urlVal;

      var updateData = {
        title: title, description: desc,
        capacity: parseInt(modal.querySelector('#ee-cap').value)||50,
        fee: parseFloat(modal.querySelector('#ee-fee').value)||0,
        format: fmt, location: locStr,
        onlineUrl: (fmt==='online'||fmt==='hybrid') ? urlVal : '',
        physicalAddress: (fmt==='onsite'||fmt==='hybrid') ? addrVal : '',
        updatedAt: serverTimestamp()
      };
      if (dateVal) {
        updateData.eventDate = Timestamp.fromDate(new Date(dateVal + 'T' + timeVal + ':00'));
      }
      await updateDoc(doc(db,'public_events',evId), updateData);
      modal.remove();
      showToast('Etkinlik güncellendi!');
      loadVendTab();
    } catch(e) {
      modal.querySelector('#ee-err').innerHTML = '<div class="alert alert-err">' + e.message + '</div>';
      btn.disabled=false; btn.textContent='Güncelle';
    }
  });
}

          (CUR_PROFILE?.displayName||CUR_USER.email)+' "'+prodName+'" ürününüzü etkinliğinde kullanıyor.',
          'Etkinlik: '+title+'\nTarih: '+dateVal+' '+timeVal+'\nDil: '+lang);

      btn.disabled=false;btn.textContent='Etkinliği Yayınla';
    }

}

async function loadAdmTab() {
  const m = el('adm-main');
  if (!m) return;
  m.innerHTML = '<div class="loading"><div class="spinner"></div>Yükleniyor...</div>';
  try {
    if (CUR_ADM_TAB === 'categories') { await admCategories(m); return; }
    if (CUR_ADM_TAB === 'users')      { await admUsers(m);      return; }
    if (CUR_ADM_TAB === 'roles')      { await admRoles(m);      return; }
    if (CUR_ADM_TAB === 'products')   { await admProducts(m);   return; }
    if (CUR_ADM_TAB === 'requests')   { await admRequests(m);   return; }
    if (CUR_ADM_TAB === 'events')     { await admEvents(m);     return; }
    if (CUR_ADM_TAB === 'offers')     { await admOffers(m);     return; }

    // DASHBOARD
    const [usersSnap, prodsSnap, pocSnap, evSnap, offSnap] = await Promise.all([
      getDocs(collection(db,'users')),
      getDocs(collection(db,'products')),
      getDocs(collection(db,'poc_requests')),
      getDocs(collection(db,'public_events')),
      getDocs(collection(db,'offers')),
    ]);
    const users  = usersSnap.docs.map(d=>d.data());
    const prods  = prodsSnap.docs.map(d=>d.data());
    const pocs   = pocSnap.docs.map(d=>d.data());
    const evs    = evSnap.docs.map(d=>d.data());
    const offers = offSnap.docs.map(d=>d.data());

    var html = '<h2 style="font-size:18px;font-weight:700;margin-bottom:18px">Platform Dashboard</h2>';
    html += '<div class="g4" style="margin-bottom:20px">';
    var stats = [
      {v:users.length, l:'Toplam Kullanıcı', c:'#e9ecf3'},
      {v:users.filter(function(u){return u.role==='customer';}).length, l:'Müşteri', c:'#22d078'},
      {v:users.filter(function(u){return u.role==='vendor';}).length, l:'Vendor', c:'#3b7cff'},
      {v:prods.filter(function(p){return p.status==='pending';}).length, l:'Onay Bekleyen Ürün', c:'#f0a429'},
      {v:pocs.filter(function(p){return p.status==='pending';}).length, l:'Bekleyen PoC', c:'#f0a429'},
      {v:pocs.filter(function(p){return p.status==='active';}).length, l:'Aktif PoC', c:'#22d078'},
      {v:evs.filter(function(e){return e.status==='published';}).length, l:'Aktif Etkinlik', c:'#3b7cff'},
      {v:offers.filter(function(o){return o.status==='accepted';}).length, l:'Kabul Edilen Teklif', c:'#22d078'},
    ];
    stats.forEach(function(s) {
      html += '<div class="stat-card"><div style="font-size:26px;font-weight:700;color:'+s.c+';font-family:monospace">'+s.v+'</div><div style="font-size:11px;color:#7c87a0;margin-top:3px">'+s.l+'</div></div>';
    });
    html += '</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
    html += '<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:10px">PoC Durum Dağılımı</div>';
    ['pending','active','completed','cancelled','rejected'].forEach(function(s) {
      html += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:12.5px"><span>'+statusBadge(s)+'</span><span style="font-family:monospace;font-weight:700">'+pocs.filter(function(p){return p.status===s;}).length+'</span></div>';
    });
    html += '</div><div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:10px">Vendor Tür Dağılımı</div>';
    [{k:'ureticid',l:'Üretici'},{k:'distributor',l:'Distribütör'},{k:'integrator',l:'Entegratör'}].forEach(function(t) {
      html += '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06);font-size:12.5px"><span style="color:#7c87a0">'+t.l+'</span><span style="font-family:monospace;font-weight:700">'+users.filter(function(u){return u.vendorType===t.k;}).length+'</span></div>';
    });
    html += '</div></div>';
    m.innerHTML = html;
  } catch(err) {
    m.innerHTML = '<div class="empty"><div class="empty-icon">⚠</div>Hata: '+err.message+'</div>';
    console.error('loadAdmTab:', err);
  }

async function admUsers(m) {
  const snap = await getDocs(collection(db,'users'));
  var all = snap.docs.map(d=>({...d.data(),id:d.id}));
  all.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  var vtypes={ureticid:'Üretici',distributor:'Distribütör',integrator:'Entegratör'};
  var roleBg={admin:'rgba(240,164,41,.12)',vendor:'rgba(59,124,255,.12)',customer:'rgba(34,208,120,.12)'};
  var roleCol={admin:'#f0a429',vendor:'#7db4ff',customer:'#22d078'};
  var roleFilter='';
  function renderRows(items) {
    var tbody=m.querySelector('#u-tbody');
    var cnt=m.querySelector('#u-cnt');
    if(cnt) cnt.textContent='('+items.length+')';
    if(!tbody) return;
    tbody.innerHTML=items.length?items.map(function(u){
      var rl=u.role==='vendor'?(vtypes[u.vendorType]||'Vendor'):u.role==='admin'?'Admin':'Müşteri';
      return '<tr><td><div style="font-weight:600">'+(u.displayName||'—')+'</div><div style="font-size:11.5px;color:#7c87a0">'+u.email+'</div></td>'+
        '<td><span class="bdg" style="background:'+(roleBg[u.role]||'#1c1f2a')+';color:'+(roleCol[u.role]||'#7c87a0')+'">'+rl+'</span></td>'+
        '<td style="color:#7c87a0">'+(u.company||'—')+'</td>'+
        '<td style="color:#7c87a0;font-size:12px">'+fmt(u.createdAt)+'</td>'+
        '<td style="white-space:nowrap">'+
          '<button class="btn-g btn-sm adm-user-edit" data-id="'+d.id+'" data-name="'+(u.displayName||'')+'" data-email="'+u.email+'" data-company="'+(u.company||'')+'" data-role="'+(u.role||'')+'" data-phone="'+(u.phone||'')+'" style="margin-right:4px">Düzenle</button>'+
          (u.role!=='admin'?'<button class="btn-red btn-sm adm-user-del" data-id="'+d.id+'" data-name="'+(u.displayName||u.email)+'">Sil</button>':'')+
        '</td>'+
        '</tr>';
    }).join(''):'<tr><td colspan="5" style="text-align:center;padding:24px;color:#5a6278">Sonuç bulunamadı.</td></tr>';
  }
  function applyFilter() {
    var q=(m.querySelector('#u-search')?.value||'').toLowerCase();
    var filtered=all.filter(function(u){
      return (!roleFilter||u.role===roleFilter)&&(!q||(u.displayName||'').toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q)||(u.company||'').toLowerCase().includes(q));
    });
    renderRows(filtered);
  }
  m.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'+
    '<h2 style="font-size:18px;font-weight:700">Kullanıcılar <span id="u-cnt" style="font-size:13px;color:#7c87a0;font-weight:400"></span></h2>'+
    '<input class="inp" id="u-search" placeholder="Ad, e-posta veya şirket..." style="width:250px;font-size:12.5px"></div>'+
    '<div style="display:flex;gap:8px;margin-bottom:12px">'+
    '<button class="btn-p btn-sm u-rf" data-r="">Tümü</button>'+
    '<button class="btn-g btn-sm u-rf" data-r="customer">Müşteri</button>'+
    '<button class="btn-g btn-sm u-rf" data-r="vendor">Vendor</button>'+
    '<button class="btn-g btn-sm u-rf" data-r="admin">Admin</button></div>'+
    '<table><thead><tr><th>Ad / E-posta</th><th>Rol</th><th>Şirket</th><th>Kayıt</th></tr></thead><tbody id="u-tbody"></tbody></table>';
  renderRows(all);
  m.querySelector('#u-search').addEventListener('input', applyFilter);
  m.querySelectorAll('.u-rf').forEach(function(b){b.addEventListener('click',function(){
    m.querySelectorAll('.u-rf').forEach(function(x){x.className='btn-g btn-sm u-rf';});
    b.className='btn-p btn-sm u-rf'; roleFilter=b.dataset.r; applyFilter();
  });});

  // Event delegation — renderRows her çalışınca listener'lar yeniden bağlanır
  m.querySelector('#u-tbody').addEventListener('click', async function(e) {
    var editBtn = e.target.closest('.adm-user-edit');
    var delBtn  = e.target.closest('.adm-user-del');
    if (editBtn) {
      openAdmUserEditModal(
        editBtn.dataset.id, editBtn.dataset.name, editBtn.dataset.email,
        editBtn.dataset.company, editBtn.dataset.role, editBtn.dataset.phone
      );
    }
    if (delBtn) {
      if (!confirm('"'+delBtn.dataset.name+'" kullanıcısını silmek istiyor musunuz? Bu işlem geri alınamaz.')) return;
      try {
        await deleteDoc(doc(db,'users',delBtn.dataset.id));
        showToast('Kullanıcı silindi.');
        all = all.filter(function(u){ return u.id !== delBtn.dataset.id; });
        applyFilter();
      } catch(e2) { showToast('Hata: '+e2.message,'err'); }
    }
  });
}

async function admCategories(m) {
  try {
    const snap = await getDocs(collection(db,'categories'));
    var cats = snap.docs.map(d => ({...d.data(), id:d.id}));
    cats.sort((a,b) => (a.order||0)-(b.order||0));

    function renderRows(items) {
      var tbody = m.querySelector('#cat-tbody');
      var cnt = m.querySelector('#cat-cnt');
      if (cnt) cnt.textContent = '(' + items.length + ')';
      if (!tbody) return;
      if (!items.length) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:24px;color:#5a6278">Sonuç bulunamadı.</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(function(cat) {
        return '<tr style="border-top:1px solid rgba(255,255,255,.06)">' +
          '<td style="padding:11px 14px;font-weight:700">' + cat.name + '</td>' +
          '<td style="padding:11px 14px;color:#7c87a0;font-family:monospace">' + (cat.order||0) + '</td>' +
          '<td style="padding:11px 14px;color:#7c87a0;font-size:12px">' + (cat.description||'—') + '</td>' +
          '<td style="padding:11px 14px;text-align:center;white-space:nowrap">' +
          '<button class="btn-g btn-sm edit-cat-btn" data-id="' + cat.id + '" data-name="' + cat.name + '" data-order="' + (cat.order||0) + '" data-desc="' + (cat.description||'') + '" style="margin-right:6px">Düzenle</button>' +
          '<button class="btn-red btn-sm del-cat-btn" data-id="' + cat.id + '" data-name="' + cat.name + '">Sil</button>' +
          '</td></tr>';
      }).join('');

      m.querySelectorAll('.edit-cat-btn').forEach(function(b) {
        b.addEventListener('click', function() {
          openCatModal({id:b.dataset.id, name:b.dataset.name, order:parseInt(b.dataset.order)||0, description:b.dataset.desc});
        });
      });
      m.querySelectorAll('.del-cat-btn').forEach(function(b) {
        b.addEventListener('click', async function() {
          if (!confirm('"' + b.dataset.name + '" kategorisini silmek istiyor musunuz?')) return;
          await deleteDoc(doc(db,'categories',b.dataset.id));
          showToast('Kategori silindi.');
          invalidateCatCache();
          loadAdmTab();
        });
      });
    }

    m.innerHTML =
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">' +
      '<h2 style="font-size:18px;font-weight:700">Kategori Yönetimi <span id="cat-cnt" style="font-size:13px;color:#7c87a0;font-weight:400"></span></h2>' +
      '<div style="display:flex;gap:8px;align-items:center">' +
      '<input class="inp" id="cat-search" placeholder="Kategori ara..." style="width:220px;font-size:12.5px">' +
      '<button class="btn-p btn-sm" id="add-cat-btn">+ Yeni Kategori</button>' +
      '</div></div>' +
      '<div style="background:#0f1117;border:1px solid rgba(255,255,255,.08);border-radius:10px;overflow:hidden">' +
      '<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;font-size:10.5px;text-transform:uppercase;color:#5a6278">Kategori Adı</th>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;font-size:10.5px;text-transform:uppercase;color:#5a6278">Sıra</th>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;font-size:10.5px;text-transform:uppercase;color:#5a6278">Açıklama</th>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:center;font-size:10.5px;text-transform:uppercase;color:#5a6278">İşlem</th>' +
      '</tr></thead><tbody id="cat-tbody"></tbody></table></div>';

    m.querySelector('#add-cat-btn').addEventListener('click', function() { openCatModal(null); });
    m.querySelector('#cat-search').addEventListener('input', function() {
      var q = this.value.toLowerCase();
      renderRows(q ? cats.filter(function(cat) {
        return cat.name.toLowerCase().includes(q) || (cat.description||'').toLowerCase().includes(q);
      }) : cats);
    });

    renderRows(cats);
  } catch(e) {
    m.innerHTML = '<div class="empty">Yükleme hatası: ' + e.message + '</div>';
  }
}

function openCatModal(existing) {
  const isEdit = !!existing;
  const modal = document.createElement('div');
  modal.className = 'modal-bg on';
  modal.innerHTML = `<div class="modal" style="max-width:420px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h3 style="font-size:15px;font-weight:700">${isEdit?'Kategori Düzenle':'Yeni Kategori'}</h3>
      <button style="background:none;border:none;color:#7c87a0;cursor:pointer;font-size:18px" id="close-cat-modal">×</button>
    </div>
    <label class="lbl">Kategori Adı *</label>
    <input class="inp" id="cat-name" value="${existing?.name||''}" placeholder="Örn: Firewall">
    <label class="lbl">Sıra (küçük = önce gösterilir)</label>
    <input class="inp" id="cat-order" type="number" value="${existing?.order||0}">
    <label class="lbl">Açıklama</label>
    <input class="inp" id="cat-desc" value="${existing?.description||''}" placeholder="Kısa açıklama (opsiyonel)">
    <div id="cat-err" style="margin-top:10px"></div>
    <button class="btn-p" id="cat-submit" style="width:100%;padding:11px;font-size:14px;margin-top:14px">${isEdit?'Güncelle':'Ekle'}</button>
  </div>`;
  document.body.appendChild(modal);
  modal.querySelector('#close-cat-modal').addEventListener('click', () => modal.remove());
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
  modal.querySelector('#cat-submit').addEventListener('click', async () => {
    const name = modal.querySelector('#cat-name').value.trim();
    if (!name) { modal.querySelector('#cat-err').innerHTML='<div class="alert alert-err">Kategori adı zorunludur.</div>'; return; }
    const btn = modal.querySelector('#cat-submit');
    btn.disabled=true; btn.textContent=isEdit?'Güncelleniyor...':'Ekleniyor...';
    try {
      const data = { name, order: parseInt(modal.querySelector('#cat-order').value)||0, description: modal.querySelector('#cat-desc').value, updatedAt: serverTimestamp() };
      if (isEdit) { await updateDoc(doc(db,'categories',existing.id), data); showToast('Kategori güncellendi!'); }
      else { data.createdAt = serverTimestamp(); await addDoc(collection(db,'categories'), data); showToast('Kategori eklendi!'); }
      invalidateCatCache();
      modal.remove(); loadAdmTab();
    } catch(e) {
      modal.querySelector('#cat-err').innerHTML=`<div class="alert alert-err">${e.message}</div>`;
      btn.disabled=false; btn.textContent=isEdit?'Güncelle':'Ekle';
    }
  });
}
