function renderEvProdList(prods, modal) {
  const list = modal ? modal.querySelector('#ev-prod-list') : document.getElementById('ev-prod-list');
  if (!list) return;
  if (!prods.length) {
    list.style.display = 'block';
    list.innerHTML = '<div style="padding:12px;color:#7c87a0;font-size:12.5px">Onaylı ürün bulunamadı. Önce ürün ekleyip admin onayı alın.</div>';
    return;
  }
  list.style.display = 'block';
  list.innerHTML = prods.map(p =>
    `<div class="ev-prod-opt" data-id="${p.id}" data-name="${(p.name||'').replace(/"/g,'')}" data-cat="${p.category||''}"
      style="padding:10px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:10px"
      onmouseover="this.style.background='rgba(59,124,255,.1)'"
      onmouseout="this.style.background=''">
      <div style="flex:1">
        <div style="font-size:13px;font-weight:600">${p.name}</div>
        <div style="font-size:11.5px;color:#7c87a0">${p.category||'—'} · ${p.country||''}</div>
      </div>
      <span style="font-size:10px;background:rgba(34,208,120,.1);color:#22d078;padding:2px 7px;border-radius:4px;font-weight:700">Onaylı</span>
    </div>`
  ).join('');
  list.querySelectorAll('.ev-prod-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      const searchEl = list.parentElement.querySelector('#ev-prod-search');
      const idEl = list.parentElement.querySelector('#ev-prod-id');
      const nameEl = list.parentElement.querySelector('#ev-prod-name-val');
      const catEl = list.parentElement.querySelector('#ev-prod-cat-val');
      if (searchEl) searchEl.value = opt.dataset.name;
      if (idEl) idEl.value = opt.dataset.id;
      if (nameEl) nameEl.value = opt.dataset.name;
      if (catEl) catEl.value = opt.dataset.cat;
      list.style.display = 'none';
    });
  });
}

let ACTIVE_CHAT_UNSUB = null;
let ACTIVE_CHAT_POC_ID = null;

function openChatModal(pocId, pocTitle, otherName) {
  // Önceki listener kapat
  if (ACTIVE_CHAT_UNSUB) { ACTIVE_CHAT_UNSUB(); ACTIVE_CHAT_UNSUB=null; }
  ACTIVE_CHAT_POC_ID = pocId;

  const modal = document.createElement('div');
  modal.className = 'modal-bg on';
  modal.id = 'chat-modal';
  modal.innerHTML = `<div class="modal" style="max-width:580px;padding:0;display:flex;flex-direction:column;height:80vh">
    <div style="padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <div>
        <div style="font-size:14px;font-weight:700">${pocTitle||'PoC Mesajlaşması'}</div>
        <div style="font-size:12px;color:#7c87a0">${otherName||''} ile</div>
      </div>
      <button id="close-chat" style="background:none;border:none;color:#7c87a0;cursor:pointer;font-size:20px">×</button>
    </div>
    <div id="chat-messages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px">
      <div class="loading"><div class="spinner"></div>Mesajlar yükleniyor...</div>
    </div>
    <div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px;flex-shrink:0">
      <input class="inp" id="chat-input" placeholder="Mesajınızı yazın... (Enter ile gönder)" style="flex:1">
      <button class="btn-p btn-sm" id="chat-send" style="flex-shrink:0">Gönder</button>
    </div>
  </div>`;
  document.body.appendChild(modal);

  modal.querySelector('#close-chat').addEventListener('click', () => {
    if (ACTIVE_CHAT_UNSUB) { ACTIVE_CHAT_UNSUB(); ACTIVE_CHAT_UNSUB=null; }
    modal.remove();
  });
  modal.addEventListener('click', e => {
    if (e.target===modal) {
      if (ACTIVE_CHAT_UNSUB) { ACTIVE_CHAT_UNSUB(); ACTIVE_CHAT_UNSUB=null; }
      modal.remove();
    }
  });

  // Realtime mesaj dinleyici
  const msgsEl = modal.querySelector('#chat-messages');
  const msgQuery = query(
    collection(db, 'poc_messages'),
    where('pocId','==',pocId),
    orderBy('createdAt','asc')
  );

  ACTIVE_CHAT_UNSUB = onSnapshot(msgQuery, snap => {
    if (snap.empty) {
      msgsEl.innerHTML = '<div class="empty" style="padding:32px">Henüz mesaj yok. İlk mesajı gönderin.</div>';
      return;
    }
    msgsEl.innerHTML = snap.docs.map(d => {
      const msg = d.data();
      const isMine = msg.senderId === CUR_USER?.uid;
      const time = msg.createdAt?.toDate ? msg.createdAt.toDate().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}) : '';
      return `<div style="display:flex;flex-direction:column;align-items:${isMine?'flex-end':'flex-start'}">
        <div class="msg-bubble ${isMine?'msg-mine':'msg-other'}">${msg.text}</div>
        <div class="msg-time" style="text-align:${isMine?'right':'left'}">${msg.senderName||''} · ${time}</div>
      </div>`;
    }).join('');
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }, err => {
    // orderBy index hatası — index olmadan dene
    ACTIVE_CHAT_UNSUB2(pocId, msgsEl);
  });

  // Mesaj gönder
  async function sendChatMsg() {
    const input = modal.querySelector('#chat-input');
    const text = input?.value?.trim();
    if (!text) return;
    input.value = '';
    try {
      await addDoc(collection(db,'poc_messages'), {
        pocId,
        senderId: CUR_USER.uid,
        senderName: CUR_PROFILE?.displayName || CUR_USER.email,
        senderRole: CUR_PROFILE?.role || '',
        text,
        createdAt: serverTimestamp()
      });
    } catch(e) {
      showToast('Mesaj gönderilemedi: '+e.message, 'err');
    }
  }

  modal.querySelector('#chat-send')?.addEventListener('click', sendChatMsg);
  modal.querySelector('#chat-input')?.addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendChatMsg(); }
  });
  setTimeout(() => modal.querySelector('#chat-input')?.focus(), 100);
}

// orderBy olmadan fallback
async function ACTIVE_CHAT_UNSUB2(pocId, msgsEl) {
  try {
    const snap = await getDocs(query(collection(db,'poc_messages'), where('pocId','==',pocId)));
    const msgs = snap.docs.map(d=>d.data()).sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
    if (!msgs.length) { msgsEl.innerHTML='<div class="empty" style="padding:32px">Henüz mesaj yok.</div>'; return; }
    msgsEl.innerHTML = msgs.map(msg => {
      const isMine = msg.senderId === CUR_USER?.uid;
      const time = msg.createdAt?.toDate ? msg.createdAt.toDate().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}) : '';
      return `<div style="display:flex;flex-direction:column;align-items:${isMine?'flex-end':'flex-start'}">
        <div class="msg-bubble ${isMine?'msg-mine':'msg-other'}">${msg.text}</div>
        <div class="msg-time">${msg.senderName||''} · ${time}</div>
      </div>`;
    }).join('');
    msgsEl.scrollTop = msgsEl.scrollHeight;
  } catch(e) { msgsEl.innerHTML='<div class="empty">Mesajlar yüklenemedi.</div>'; }
}

function filterCountryOpts(q, listId, valId) {
  const list = document.getElementById(listId);
  const val = document.getElementById(valId);
  if (!list) return;
  const filtered = ALL_COUNTRIES.filter(c =>
    c.name.toLowerCase().includes(q.toLowerCase()) ||
    c.code.toLowerCase().includes(q.toLowerCase())
  );
  if (!q || !filtered.length) { list.style.display='none'; return; }
  list.style.display = 'block';
  list.innerHTML = filtered.slice(0,15).map(c =>
    `<div class="country-opt" data-code="${c.code}" data-name="${c.name}"
      style="padding:8px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid rgba(255,255,255,.06)"
      onmouseover="this.style.background='rgba(59,124,255,.1)'"
      onmouseout="this.style.background=''"
    >${c.name} <span style="color:#5a6278;font-size:11px">${c.code}</span></div>`
  ).join('');
  list.querySelectorAll('.country-opt').forEach(opt => {
    opt.addEventListener('click', () => {
      const searchEl = list.previousElementSibling;
      if (searchEl) searchEl.value = opt.dataset.name + ' (' + opt.dataset.code + ')';
      if (val) val.value = opt.dataset.code;
      list.style.display = 'none';
    });
  });
}

document.addEventListener('click', e => {

/* ── BİLDİRİM SİSTEMİ ── */
let NOTIF_COUNT = 0;
let NOTIF_UNSUB = null;

function startNotifListener() {
  if (!CUR_USER || !CUR_PROFILE) return;
  if (NOTIF_UNSUB) NOTIF_UNSUB(); // önceki listener'ı kapat

  const role = CUR_PROFILE.role;
  let q;
  if (role === 'customer') {
    q = query(collection(db,'poc_requests'), where('customerId','==',CUR_USER.uid));
  } else if (role === 'vendor') {
    q = query(collection(db,'poc_requests'), where('vendorId','==',CUR_USER.uid), where('status','==','pending'));
  } else {
    // Admin — bekleyen ürün onayları
    q = query(collection(db,'products'), where('status','==','pending'));
  }

  NOTIF_UNSUB = onSnapshot(q, snap => {
    NOTIF_COUNT = snap.size;
    updateNotifBadge();
  });
}

function stopNotifListener() {
  if (NOTIF_UNSUB) { NOTIF_UNSUB(); NOTIF_UNSUB = null; }
  NOTIF_COUNT = 0;
}

function updateNotifBadge() {
  const badge = document.getElementById('notif-badge');
  if (badge) {
    badge.textContent = NOTIF_COUNT > 0 ? NOTIF_COUNT : '';
    badge.style.display = NOTIF_COUNT > 0 ? 'inline' : 'none';
  }
}

function closeModal() {

function renderAuthForm() {

  let html = '';
  if (AUTH_MODE === 'register') {
    html += `<label class="lbl">Ad Soyad *</label><input class="inp" id="a-name" placeholder="Ad Soyad"><br>`;

    html += `<label class="lbl">Şirket Adresi</label><textarea class="inp" id="a-address" rows="2" placeholder="Şirket adresi" style="resize:none"></textarea><br>`;
    html += `<label class="lbl">Vergi No / TC No</label><input class="inp" id="a-taxno" placeholder="Vergi kimlik numarası"><br>`;
    html += `<div style="background:rgba(59,124,255,.08);border:1px solid rgba(59,124,255,.2);border-radius:7px;padding:10px;font-size:12px;color:#7db4ff;margin-bottom:4px">ℹ Kayıt için kurumsal e-posta adresi zorunludur. (Gmail, Hotmail vb. kabul edilmez)</div>`;
  }
  html += `<label class="lbl">E-posta *</label><input class="inp" id="a-email" type="email" placeholder="ornek@sirket.com"><br>`;
  html += `<label class="lbl">Şifre *</label><input class="inp" id="a-pass" type="password" placeholder="En az 6 karakter"><br>`;
  html += `<button class="btn-p" id="a-submit" style="width:100%;padding:11px;font-size:14px;margin-top:16px">${AUTH_MODE==='login'?'Giriş Yap':'Kayıt Ol'}</button>`;
  html += `<div style="text-align:center;margin-top:12px;font-size:12.5px;color:#7c87a0">
    ${AUTH_MODE==='login'?'Hesabın yok mu?':'Zaten hesabın var mı?'}
    <button onclick="toggleAuthMode()" style="background:none;border:none;color:#3b7cff;cursor:pointer;font:inherit;font-size:12.5px">
      ${AUTH_MODE==='login'?'Kayıt Ol':'Giriş Yap'}
    </button>
  </div>`;

  el('auth-form').innerHTML = html;
  el('a-submit').addEventListener('click', handleAuth);
  [el('a-email'), el('a-pass')].forEach(inp => inp?.addEventListener('keydown', e => { if(e.key==='Enter') handleAuth(); }));
}

window.toggleAuthMode = function() {
  AUTH_MODE = AUTH_MODE==='login'?'register':'login';
  el('auth-err').innerHTML = '';
  renderAuthForm();
};

async function handleAuth() {
  const email = el('a-email')?.value?.trim();
  const pass = el('a-pass')?.value;
  const errDiv = el('auth-err');
  if (!email || !pass) { errDiv.innerHTML = '<div class="alert alert-err">E-posta ve şifre zorunludur.</div>'; return; }

  const btn = el('a-submit');
  btn.disabled = true;
  btn.textContent = 'Lütfen bekleyin...';
  errDiv.innerHTML = '';

  try {
    if (AUTH_MODE === 'login') {
      await signInWithEmailAndPassword(auth, email, pass);
      closeModal();
      // Role göre panele yönlendir
      const snap = await getDoc(doc(db, 'users', auth.currentUser.uid));
      const profile = snap.data();
      go(profile?.role === 'customer' ? 'customer' : profile?.role === 'vendor' ? 'vendor' : profile?.role === 'admin' ? 'admin' : 'home');
    } else {
      const name = el('a-name')?.value?.trim() || '';
      const company = el('a-company')?.value?.trim() || '';
      const phone = el('a-phone')?.value?.trim() || '';
      const address = el('a-address')?.value?.trim() || '';
      const taxno = el('a-taxno')?.value?.trim() || '';

      // Şirket e-postası kontrolü
      const freeProviders = ['gmail','hotmail','yahoo','outlook','icloud','yandex','protonmail','live','msn','me.com','googlemail'];
      const emailDomain = email.split('@')[1]?.toLowerCase()||'';
      const isFree = freeProviders.some(p => emailDomain.includes(p));
      if (isFree) {
        errDiv.innerHTML = `<div class="alert alert-err">Lütfen kurumsal e-posta adresinizi girin. (Gmail, Hotmail, Yahoo gibi ücretsiz e-posta adresleri kabul edilmemektedir.)</div>`;
        btn.disabled=false; btn.textContent='Kayıt Ol'; return;
      }
      if (!company) {
        errDiv.innerHTML = `<div class="alert alert-err">Şirket adı zorunludur.</div>`;
        btn.disabled=false; btn.textContent='Kayıt Ol'; return;
      }

      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, 'users', cred.user.uid), {
        email, displayName: name, company, phone, address, taxNo: taxno,
        role: AUTH_ROLE, vendorType: AUTH_VTYPE,
        emailVerified: false,
        createdAt: serverTimestamp()
      });

      // Firebase email doğrulama maili gönder
      await sendEmailVerification(cred.user);

      closeModal();
      showVerificationBanner();
      showToast('Doğrulama e-postası gönderildi. Lütfen e-postanızı kontrol edin.');
    }
  } catch(e) {
    const msgs = {
      'auth/user-not-found': 'Bu e-posta ile kayıtlı hesap bulunamadı.',
      'auth/wrong-password': 'Şifre hatalı.',
      'auth/email-already-in-use': 'Bu e-posta zaten kayıtlı. Giriş yapmayı deneyin.',
      'auth/weak-password': 'Şifre en az 6 karakter olmalıdır.',
      'auth/invalid-email': 'Geçersiz e-posta adresi.',
      'auth/invalid-credential': 'E-posta veya şifre hatalı.',
    };
    errDiv.innerHTML = `<div class="alert alert-err">${msgs[e.code]||e.message}</div>`;
    btn.disabled = false;
    btn.textContent = AUTH_MODE==='login'?'Giriş Yap':'Kayıt Ol';
  }
}

  el('cal-prev').addEventListener('click', () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(calYear,calMonth); });
  el('cal-next').addEventListener('click', () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(calYear,calMonth); });

  // Stats yükle
  try {
    const [evSnap, userSnap, pocSnap, prodSnap] = await Promise.all([
      getDocs(query(collection(db,'public_events'), where('status','==','published'))),
      getDocs(collection(db,'users')),
      getDocs(collection(db,'poc_requests')),
      getDocs(query(collection(db,'products'), where('status','==','active'))),
    ]);
    const vals = [evSnap.size, userSnap.size, pocSnap.size, prodSnap.size];
    el('home-stats')?.querySelectorAll('.stat-card div:first-child').forEach((x,i)=>x.textContent=vals[i]);
  } catch(e) { console.error('Stats hatası:', e); }

  // Tüm etkinlikleri çek — hem takvim hem liste için
  let allEvents = [];
  try {
    const snap = await getDocs(query(collection(db,'public_events'), where('status','==','published')));
    allEvents = snap.docs.map(d => ({...d.data(), id:d.id}));
    allEvents.sort((a,b) => (a.eventDate?.seconds||0) - (b.eventDate?.seconds||0));
  } catch(e) { console.error('Etkinlik yükleme hatası:', e); }

  // Kategori listesi
  const cats = [...new Set(allEvents.map(e=>e.category).filter(Boolean))];
  const catEl = el('home-cats');
  if (catEl) {
    catEl.innerHTML = cats.map(cat => {
      const count = allEvents.filter(e=>e.category===cat).length;
      return `<button class="home-cat-btn" data-cat="${cat}" style="display:flex;align-items:center;justify-content:space-between;width:100%;padding:7px 8px;border-radius:6px;border:none;font:inherit;font-size:12.5px;cursor:pointer;background:transparent;color:#7c87a0;margin-bottom:2px;transition:.1s">
        <span>${cat}</span><span style="font-size:10.5px;font-family:monospace;background:#1c1f2a;border-radius:4px;padding:1px 6px;color:#5a6278">${count}</span>
      </button>`;
    }).join('');
    catEl.querySelectorAll('.home-cat-btn').forEach(b => b.addEventListener('click', () => {
      go('events');
      // Events sayfasında kategori filtresi uygula
      setTimeout(() => { const el2 = el('ev-cat'); if(el2){el2.value=b.dataset.cat; loadEventsList();} }, 100);
    }));
  }

  // Takvim render
  async function renderCalendar(year, month) {
    const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    el('cal-title').textContent = months[month] + ' ' + year;
    const dows = ['Pt','Sa','Ça','Pe','Cu','Ct','Pz'];
    const firstDay = new Date(year, month, 1).getDay();
    const offset = firstDay === 0 ? 6 : firstDay - 1;
    const daysInMonth = new Date(year, month+1, 0).getDate();

    // O aya ait etkinlik günlerini bul
    const evDays = {};
    allEvents.forEach(e => {
      if (!e.eventDate?.toDate) return;
      const d = e.eventDate.toDate();
      if (d.getFullYear()===year && d.getMonth()===month) {
        const day = d.getDate();
        if (!evDays[day]) evDays[day] = [];
        evDays[day].push(e);
      }
    });

    const todayDate = new Date();
    let html = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">`;
    dows.forEach(d => html+=`<div style="font-size:9.5px;color:#5a6278;font-weight:700;padding:2px 0">${d}</div>`);
    // Boş hücreler
    for(let i=0;i<offset;i++) html+=`<div></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const isToday = todayDate.getFullYear()===year && todayDate.getMonth()===month && todayDate.getDate()===d;
      const hasEv = evDays[d] && evDays[d].length > 0;
      const evCount = evDays[d]?.length || 0;
      html+=`<button class="cal-day" data-day="${d}" data-year="${year}" data-month="${month}" title="${hasEv?evCount+' etkinlik':''}"
        style="font-size:11.5px;padding:4px 2px;border-radius:5px;border:${isToday?'2px solid #3b7cff':'none'};cursor:${hasEv?'pointer':'default'};
        background:${isToday?'#3b7cff':hasEv?'rgba(59,124,255,.18)':'transparent'};
        color:${isToday?'#fff':hasEv?'#3b7cff':'#7c87a0'};
        font-weight:${isToday||hasEv?'700':'400'};position:relative">
        ${d}${hasEv&&!isToday?`<div style="width:4px;height:4px;background:#3b7cff;border-radius:50%;margin:1px auto 0"></div>`:''}
      </button>`;
    }
    html+=`</div>`;
    el('cal-grid').innerHTML = html;

    // Takvim günlerine tıklama
    el('cal-grid').querySelectorAll('.cal-day').forEach(b => {
      b.addEventListener('click', () => {
        const day = parseInt(b.dataset.day);
        const dayEvs = evDays[day];
        if (!dayEvs || dayEvs.length===0) return;
        // O güne ait etkinlikleri listele
        renderHomeEventList(dayEvs, `${day} ${months[month]} ${year} Etkinlikleri`);
        // Aktif günü vurgula
        el('cal-grid').querySelectorAll('.cal-day').forEach(x => {
          if (parseInt(x.dataset.day) !== day) {
            x.style.background = evDays[parseInt(x.dataset.day)] ? 'rgba(59,124,255,.18)' : 'transparent';
          }
        });
        b.style.background = '#3b7cff';
        b.style.color = '#fff';
      });
    });

    // Seçili ayda etkinlik yoksa mesaj
    if (Object.keys(evDays).length === 0) {
      const titleEl = el('home-events-title');
      if (titleEl) titleEl.textContent = months[month]+' '+year+' — Etkinlik Yok';
    }
  }

  // Etkinlik listesini render
  function renderHomeEventList(events, title) {
    const titleEl = el('home-events-title');
    if (titleEl) titleEl.textContent = title || 'Etkinlikler';
    const listEl = el('home-events-list');
    if (!listEl) return;
    if (!events.length) {
      listEl.innerHTML = '<div class="empty">Bu tarihte etkinlik yok.</div>';
      return;
    }
    listEl.innerHTML = events.map(e => {
      const date = e.eventDate?.toDate ? e.eventDate.toDate().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) : '—';
      const spots = (e.capacity||0) - (e.registeredCount||0);
      return `<div class="card ev-item" data-id="${e.id}" style="margin-bottom:10px;cursor:pointer;display:grid;grid-template-columns:1fr auto;gap:14px;align-items:start;transition:border-color .1s;border:1px solid rgba(255,255,255,.08)">
        <div>
          <div style="display:flex;gap:6px;margin-bottom:7px;flex-wrap:wrap">
            <span class="bdg" style="background:#1c1f2a;color:#7c87a0">${e.category||'—'}</span>
            <span class="bdg" style="background:rgba(59,124,255,.12);color:#7db4ff">${e.format||'Online'}</span>
            <span class="bdg" style="background:${e.fee>0?'rgba(59,124,255,.12)':'rgba(34,208,120,.12)'};color:${e.fee>0?'#7db4ff':'#22d078'}">${e.fee>0?'₺'+e.fee:'Ücretsiz'}</span>
          </div>
          <div style="font-size:14px;font-weight:700;margin-bottom:4px">${e.title}</div>
          <div style="font-size:12px;color:#7c87a0;margin-bottom:3px">${e.vendorName||'—'} · ${e.productName||'—'}</div>
          <div style="font-size:12px;color:#5a6278">📅 ${date}${e.location?' · 📍 '+e.location:''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:12px;color:${spots<=0?'#ff7070':spots<=5?'#f0a429':'#22d078'};margin-bottom:8px;font-weight:600">${spots<=0?'Dolu':spots+' yer'}</div>
          <button class="btn-p btn-sm ev-detail-btn" data-id="${e.id}" style="margin-bottom:6px;white-space:nowrap">Detay →</button><br>
          <button class="btn-g btn-sm ev-reg-home" data-id="${e.id}" data-title="${(e.title||'').replace(/"/g,'')}" data-vendor-email="${e.vendorEmail||''}" data-vendor-name="${(e.vendorName||'').replace(/"/g,'')}">
            ${CUR_USER?'Kayıt Ol':'Giriş Yap & Kayıt'}
          </button>
        </div>
      </div>`;
    }).join('');

    // Detay butonu
    listEl.querySelectorAll('.ev-detail-btn').forEach(b => b.addEventListener('click', (ev) => {
      ev.stopPropagation();
      openEventDetail(b.dataset.id);
    }));
    listEl.querySelectorAll('.ev-item').forEach(item => item.addEventListener('click', () => {
      openEventDetail(item.dataset.id);
    }));
    listEl.querySelectorAll('.ev-reg-home').forEach(b => b.addEventListener('click', (ev) => {
      ev.stopPropagation();
      if (!CUR_USER) { openAuthModal('customer',''); return; }
      if (!CUR_USER.emailVerified && !CUR_PROFILE?.emailVerified) { showToast('Lütfen önce e-postanızı doğrulayın.','err'); return; }
      registerForEvent(b.dataset.id, b, b.dataset.vendorEmail, b.dataset.vendorName, b.dataset.title);
    }));
  }

  // İlk yükleme — yaklaşan etkinlikler
  console.log('PoCHub: allEvents yüklendi, sayı:', allEvents.length);
  renderHomeEventList(allEvents.slice(0,6), 'Yaklaşan Etkinlikler');
  renderCalendar(calYear, calMonth);

  // Ay değişince listeyi güncelle — temiz listener
  const MONTHS_TR = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  
  async function changeMonth(delta) {
    calMonth += delta;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0; calYear++; }
    await renderCalendar(calYear, calMonth);
    const monthEvs = allEvents.filter(e => {
      if (!e.eventDate?.toDate) return false;
      const d = e.eventDate.toDate();
      return d.getFullYear()===calYear && d.getMonth()===calMonth;
    });
    if (monthEvs.length > 0) {
      renderHomeEventList(monthEvs, MONTHS_TR[calMonth]+' '+calYear+' Etkinlikleri');
    } else {
      renderHomeEventList([], MONTHS_TR[calMonth]+' '+calYear+' — Etkinlik Yok');
    }
  }

  el('cal-prev').addEventListener('click', () => changeMonth(-1));
  el('cal-next').addEventListener('click', () => changeMonth(1));
}

async function openEventDetail(eventId) {
  try {
    const snap = await getDoc(doc(db,'public_events',eventId));
    if (!snap.exists()) { showToast('Etkinlik bulunamadı.','err'); return; }
    const e = {...snap.data(), id: snap.id};
    const date = e.eventDate?.toDate ? e.eventDate.toDate().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    const spots = (e.capacity||0) - (e.registeredCount||0);

    const modal = document.createElement('div');
    modal.className = 'modal-bg on';
    modal.innerHTML = `<div class="modal" style="max-width:600px">
      <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:18px">
        <div style="flex:1">
          <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
            <span class="bdg" style="background:#1c1f2a;color:#7c87a0">${e.category||'—'}</span>
            <span class="bdg" style="background:rgba(59,124,255,.12);color:#7db4ff">${e.format||'Online'}</span>
            <span class="bdg" style="background:${e.fee>0?'rgba(59,124,255,.12)':'rgba(34,208,120,.12)'};color:${e.fee>0?'#7db4ff':'#22d078'}">${e.fee>0?'₺'+e.fee:'Ücretsiz'}</span>
          </div>
          <h2 style="font-size:17px;font-weight:700;line-height:1.3">${e.title}</h2>
        </div>
        <button style="background:none;border:none;color:#7c87a0;cursor:pointer;font-size:20px;margin-left:12px;flex-shrink:0" id="close-ev-detail">×</button>
      </div>
      <div class="g3" style="margin-bottom:16px">
        ${[['📅 Tarih',date],['👥 Kapasite',`${e.registeredCount||0}/${e.capacity||0} kayıt`],['📍 Lokasyon',e.location||'—']].map(([l,v])=>`
        <div style="background:#1c1f2a;border-radius:8px;padding:11px">
          <div style="font-size:10.5px;color:#5a6278;margin-bottom:4px">${l}</div>
          <div style="font-size:12.5px;font-weight:600">${v}</div>
        </div>`).join('')}
      </div>
      ${e.description?`<div style="background:#0f1117;border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:13px;margin-bottom:16px;font-size:13px;color:#9ca3af;line-height:1.7">${e.description}</div>`:''}
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px;background:#1c1f2a;border-radius:8px;margin-bottom:14px">
        <div>
          <div style="font-size:12px;color:#7c87a0">Düzenleyen</div>
          <div style="font-size:13px;font-weight:700">${e.vendorName||'—'}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:${spots<=0?12:18}px;font-weight:700;color:${spots<=0?'#ff7070':spots<=5?'#f0a429':'#22d078'}">${spots<=0?'Dolu':spots+' yer kaldı'}</div>
          <div style="background:#0f1117;border-radius:4px;height:4px;width:120px;margin-top:4px"><div style="background:#3b7cff;height:100%;width:${Math.min(100,((e.registeredCount||0)/(e.capacity||1))*100)}%;border-radius:4px"></div></div>
        </div>
      </div>
      <div id="ev-detail-action">
        ${spots<=0?'<button class="btn-g" style="width:100%;padding:11px" disabled>Kontenjan Dolu</button>':
          `<button class="btn-p" id="ev-detail-reg" style="width:100%;padding:12px;font-size:14px">${CUR_USER?'Kayıt Ol':'Giriş Yap & Kayıt Ol'}</button>`}
      </div>
    </div>`;
    document.body.appendChild(modal);
    modal.querySelector('#close-ev-detail').addEventListener('click', () => modal.remove());
    modal.addEventListener('click', (ev) => { if(ev.target===modal) modal.remove(); });
    const regBtn = modal.querySelector('#ev-detail-reg');
    if (regBtn) {
      regBtn.addEventListener('click', () => {
        if (!CUR_USER) { modal.remove(); openAuthModal('customer',''); return; }
        if (!CUR_USER.emailVerified && !CUR_PROFILE?.emailVerified) { showToast('Lütfen önce e-postanızı doğrulayın.','err'); return; }
        registerForEvent(eventId, regBtn, e.vendorEmail, e.vendorName, e.title);
      });
    }
  } catch(err) {
    showToast('Etkinlik yüklenemedi: '+err.message,'err');
  }
}

async function loadEventsList() {
  const listEl = el('events-list');
  if (!listEl) return;
  listEl.innerHTML = '<div class="loading"><div class="spinner"></div>Yükleniyor...</div>';
  try {
    let q = query(collection(db,'public_events'), where('status','==','published'));
    const snap = await getDocs(q);
    let docs = snap.docs.map(d => ({...d.data(), id:d.id}));
    // Client-side sırala (eventDate'e göre)
    docs.sort((a,b) => (a.eventDate?.seconds||0) - (b.eventDate?.seconds||0));

    // Filtrele
    const search = el('ev-search')?.value?.toLowerCase()||'';
    const cat = el('ev-cat')?.value||'';
    const format = el('ev-format')?.value||'';
    const free = el('ev-free')?.checked||false;
    if (search) docs = docs.filter(e => e.title?.toLowerCase().includes(search) || e.productName?.toLowerCase().includes(search));
    if (cat) docs = docs.filter(e => e.category===cat);
    if (format) docs = docs.filter(e => e.format===format);
    if (free) docs = docs.filter(e => !e.fee || e.fee===0);

    if (!docs.length) {
      listEl.innerHTML = '<div class="empty"><div class="empty-icon">📅</div>Kriterlere uygun etkinlik bulunamadı.</div>';
      return;
    }

    listEl.innerHTML = docs.map(e => {
      const date = e.eventDate?.toDate ? e.eventDate.toDate().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) : '—';
      const spots = e.capacity - (e.registeredCount||0);
      return `<div class="card" style="margin-bottom:10px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start">
        <div>
          <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center">
            <span class="bdg" style="background:#1c1f2a;color:#7c87a0">${e.category||'—'}</span>
            <span class="bdg" style="background:rgba(59,124,255,.12);color:#7db4ff">${e.format||'Online'}</span>
            <span class="bdg" style="background:${e.fee>0?'rgba(59,124,255,.12)':'rgba(34,208,120,.12)'};color:${e.fee>0?'#7db4ff':'#22d078'}">${e.fee>0?'₺'+e.fee:'Ücretsiz'}</span>
          </div>
          <div style="font-size:15px;font-weight:700;margin-bottom:5px">${e.title}</div>
          <div style="font-size:12.5px;color:#7c87a0;margin-bottom:5px">${e.vendorName||'—'} · ${e.productName||'—'}</div>
          <div style="font-size:12px;color:#5a6278">📅 ${date}${e.location?' · 📍 '+e.location:''}</div>
          ${e.description ? `<p style="font-size:12.5px;color:#9ca3af;margin-top:8px;line-height:1.6">${e.description}</p>` : ''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:12px;color:${spots<=0?'#ff7070':spots<=5?'#f0a429':'#22d078'};margin-bottom:8px;font-weight:600">${spots<=0?'Dolu':spots+' yer kaldı'}</div>
          <div style="background:#1c1f2a;border-radius:5px;height:4px;width:100px;margin-left:auto;margin-bottom:10px">
            <div style="background:#3b7cff;height:100%;width:${Math.min(100,((e.registeredCount||0)/e.capacity)*100)}%;border-radius:5px"></div>
          </div>
          <button class="btn-p btn-sm ev-reg-btn" data-id="${e.id}" data-title="${e.title}" data-vendor-email="${e.vendorEmail||''}" data-vendor-name="${e.vendorName||''}">${CUR_USER?'Kayıt Ol':'Giriş Yap & Kayıt Ol'}</button>
        </div>
      </div>`;
    }).join('');

    listEl.querySelectorAll('.ev-reg-btn').forEach(b => b.addEventListener('click', () => {
      if (!CUR_USER) { openAuthModal('customer',''); return; }
      registerForEvent(b.dataset.id, b, b.dataset.vendorEmail, b.dataset.vendorName, b.dataset.title);
    }));
  } catch(e) {
    listEl.innerHTML = `<div class="empty">Yükleme hatası: ${e.message}</div>`;
  }
}

async function registerForEvent(eventId, btn, vendorEmail, vendorName, eventTitle) {
  btn.disabled = true;
  btn.textContent = 'Kaydediliyor...';
  try {
    // Zaten kayıtlı mı?
    const regSnap = await getDocs(query(collection(db,'registrations'), where('eventId','==',eventId), where('userId','==',CUR_USER.uid)));
    if (!regSnap.empty) { showToast('Bu etkinliğe zaten kayıtlısınız.','err'); btn.disabled=false; btn.textContent='Kayıtlısınız'; return; }

    await addDoc(collection(db,'registrations'), {
      eventId, userId: CUR_USER.uid,
      userEmail: CUR_USER.email,
      userName: CUR_PROFILE?.displayName||CUR_USER.email,
      userCompany: CUR_PROFILE?.company||'',
      status: 'registered',
      createdAt: serverTimestamp()
    });
    // Kayıt sayısını artır
    const evRef = doc(db,'public_events',eventId);
    const evSnap = await getDoc(evRef);
    if (evSnap.exists()) {
      await updateDoc(evRef, {registeredCount: (evSnap.data().registeredCount||0)+1});
    }
    btn.textContent = '✓ Kayıtlısınız';
    btn.style.background = '#157a46';
    showToast('Etkinliğe başarıyla kayıt oldunuz!');

    // Müşteriye mail
    sendEmail(CUR_USER.email, CUR_PROFILE?.displayName||'', 'Etkinlik Kaydınız Onaylandı',
      `"${eventTitle||eventId}" etkinliğine kaydınız alındı.`,
      `Etkinlik detayları yakında e-postanıza iletilecektir.`);
    // Vendor'a bildirim
    if (vendorEmail) sendEmail(vendorEmail, vendorName||'Vendor',
      'Yeni Etkinlik Kaydı',
      `${CUR_PROFILE?.displayName||CUR_USER.email} (${CUR_PROFILE?.company||''}) etkinliğinize kayıt oldu.`,
      `Etkinlik: ${eventTitle}`);
  } catch(e) {
    showToast('Kayıt sırasında hata: '+e.message,'err');
    btn.disabled = false; btn.textContent = 'Kayıt Ol';
  }
}

async function renderCatalog() {
  const wrap = el('scr-catalog');

async function loadCatalog() {
  const gridEl = el('catalog-grid');
  if (!gridEl) return;
  try {
    const snap = await getDocs(query(collection(db,'products'), where('status','==','active')));
    let prods = snap.docs.map(d => ({...d.data(), id:d.id}));

    const search = el('cat-search')?.value?.toLowerCase()||'';
    const cat = el('cat-category')?.value||'';
    const trFirst = el('cat-tr')?.checked||false;
    if (search) prods = prods.filter(p => p.name?.toLowerCase().includes(search)||p.vendorName?.toLowerCase().includes(search));
    if (cat) prods = prods.filter(p => p.category===cat);
    if (trFirst) prods.sort((a,b) => a.country==='TR'?-1:b.country==='TR'?1:0);

    if (!prods.length) {
      gridEl.innerHTML = '<div class="empty"><div class="empty-icon">📦</div>Ürün bulunamadı.</div>';
      return;
    }
      // Katalog çoklu seçim state
  const catSelectedIds = new Set();
  function updateCatSelUI() {
    const info = document.getElementById('cat-sel-info');
    const num = document.getElementById('cat-sel-num');
    const startBtn = document.getElementById('cat-poc-start');
    if (info) info.style.display = catSelectedIds.size>0?'inline':'none';
    if (num) num.textContent = catSelectedIds.size;
    if (startBtn) startBtn.style.display = catSelectedIds.size>0?'inline-block':'none';
    gridEl.querySelectorAll('.prod-card').forEach(card => {
      const cb = card.querySelector('.prod-select-cb');
      card.style.borderColor = cb?.checked ? '#3b7cff' : 'rgba(255,255,255,.08)';
      card.style.background = cb?.checked ? 'rgba(59,124,255,.04)' : '#0f1117';
    });
  }

  gridEl.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">${
    prods.map(p => `<div class="card prod-card" data-id="${p.id}" style="display:flex;flex-direction:column;transition:all .15s;cursor:default">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px">
        <label style="display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none">
          <input type="checkbox" class="prod-select-cb" data-id="${p.id}" style="width:15px;height:15px;cursor:pointer;flex-shrink:0">
          ${cc(p.country||'TR')}
        </label>
        <span class="bdg" style="background:#1c1f2a;color:#7c87a0">${p.category||'—'}</span>
      </div>
      <div style="font-size:14.5px;font-weight:700;margin-bottom:3px">${p.name}</div>
      <div style="font-size:12px;color:#7c87a0;margin-bottom:8px">${p.vendorName||'—'}</div>
      <p style="font-size:12px;color:#9ca3af;line-height:1.5;flex:1;margin-bottom:12px">${p.description||''}</p>
      ${p.specs?`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">${
        Object.entries(p.specs).slice(0,4).map(([k,v])=>`<span style="background:#1c1f2a;border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:2px 7px;font-size:11px"><span style="color:#7c87a0">${k}:</span> ${v}</span>`).join('')
      }</div>` : ''}
      <button class="btn-p btn-sm poc-req-btn" data-id="${p.id}">
        PoC Talebi Oluştur →
      </button>
    </div>`).join('')
  }</div>`;

  // Checkbox listener
  gridEl.querySelectorAll('.prod-select-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      if (cb.checked) catSelectedIds.add(cb.dataset.id);
      else catSelectedIds.delete(cb.dataset.id);
      updateCatSelUI();
    });
  });

  // "Seçilenlerle PoC Başlat" butonu
  const catPocBtn = document.getElementById('cat-poc-start');
  if (catPocBtn) {
    catPocBtn.replaceWith(catPocBtn.cloneNode(true)); // listener sıfırla
    document.getElementById('cat-poc-start')?.addEventListener('click', () => {
      if (!CUR_USER) { openAuthModal('customer',''); return; }
      if (CUR_PROFILE?.role !== 'customer') { showToast('PoC talebi için müşteri hesabı gerekli.','err'); return; }
      // Seçili ilk ürünün kategorisiyle çoklu modal aç
      const firstProd = prods.find(p => catSelectedIds.has(p.id));
      openMultiVendorPocModal(firstProd?.id, [...catSelectedIds]);
    });
  }

    gridEl.querySelectorAll('.poc-req-btn').forEach(b => b.addEventListener('click', () => {
      if (!CUR_USER) { openAuthModal('customer',''); return; }
      if (CUR_PROFILE?.role !== 'customer') { showToast('PoC talebi oluşturmak için müşteri hesabı gerekli.','err'); return; }
      openMultiVendorPocModal(b.dataset.id);
    }));
  } catch(e) {
    gridEl.innerHTML = `<div class="empty">Yükleme hatası: ${e.message}</div>`;
  }
}

function openEditPocModal(pocId, title, requirements, preferredDates, location) {
  const locLabels = {customer:'Müşteri Lokasyonu',vendor:'Vendor Lokasyonu',online:'Online',hybrid:'Hibrit'};
  const modal = document.createElement('div');
  modal.className = 'modal-bg on';
  modal.innerHTML = `<div class="modal" style="max-width:500px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h3 style="font-size:15px;font-weight:700">PoC Talebi Düzenle</h3>
      <button style="background:none;border:none;color:#7c87a0;cursor:pointer;font-size:18px" id="close-edit-poc">×</button>
    </div>
    <div style="background:rgba(240,164,41,.1);border:1px solid rgba(240,164,41,.2);border-radius:7px;padding:9px 12px;font-size:12px;color:#f0a429;margin-bottom:14px">
      ℹ Sadece bekleyen (Pending) talepler düzenlenebilir. Vendor'a yeni bildirim gönderilir.
    </div>
    <label class="lbl">PoC Başlığı *</label>
    <input class="inp" id="edit-title" value="${title||''}">
    <label class="lbl">Gereksinimler / Notlar</label>
    <textarea class="inp" id="edit-req" rows="3" style="resize:none">${requirements||''}</textarea>
    <label class="lbl">Tercih Edilen Tarih Aralığı</label>
    <input class="inp" id="edit-dates" value="${preferredDates||''}">
    <label class="lbl">PoC Lokasyonu</label>
    <select class="inp" id="edit-loc">
      <option value="customer" ${location==='customer'?'selected':''}>Müşteri Lokasyonu</option>
      <option value="vendor" ${location==='vendor'?'selected':''}>Vendor Lokasyonu</option>
      <option value="online" ${location==='online'?'selected':''}>Online / Uzaktan</option>
      <option value="hybrid" ${location==='hybrid'?'selected':''}>Hibrit</option>
    </select>
    <div id="edit-err" style="margin-top:10px"></div>
    <button class="btn-p" id="edit-submit" style="width:100%;padding:11px;font-size:14px;margin-top:14px">Güncelle</button>
  </div>`;
  document.body.appendChild(modal);
  modal.querySelector('#close-edit-poc').addEventListener('click', () => modal.remove());
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });

  modal.querySelector('#edit-submit').addEventListener('click', async () => {
    const newTitle = modal.querySelector('#edit-title').value.trim();
    if (!newTitle) { modal.querySelector('#edit-err').innerHTML='<div class="alert alert-err">Başlık zorunludur.</div>'; return; }
    const btn = modal.querySelector('#edit-submit');
    btn.disabled=true; btn.textContent='Güncelleniyor...';
    try {
      // Mevcut talebi al (vendor bilgisi için)
      const pocSnap = await getDoc(doc(db,'poc_requests',pocId));
      const pocData = pocSnap.data();

      await updateDoc(doc(db,'poc_requests',pocId), {
        title: newTitle,
        requirements: modal.querySelector('#edit-req').value,
        preferredDates: modal.querySelector('#edit-dates').value,
        location: modal.querySelector('#edit-loc').value,
        updatedAt: serverTimestamp()
      });

      // Vendor'a güncelleme bildirimi
      if (pocData?.vendorEmail) {
        const locLbl = {customer:'Müşteri Lokasyonu',vendor:'Vendor Lokasyonu',online:'Online',hybrid:'Hibrit'};
        sendEmail(pocData.vendorEmail, pocData.vendorName||'', 'PoC Talebi Güncellendi — PoCHub',
          `${CUR_PROFILE?.displayName||CUR_USER.email} PoC talebini güncelledi.`,
          `Ürün: ${pocData.productName}\nYeni Başlık: ${newTitle}\nGereksinimler: ${modal.querySelector('#edit-req').value||'-'}\nLokasyon: ${locLbl[modal.querySelector('#edit-loc').value]}`
        );
      }

      modal.remove();
      showToast('Talep güncellendi!');
      loadCustTab();
    } catch(e) {
      modal.querySelector('#edit-err').innerHTML=`<div class="alert alert-err">${e.message}</div>`;
      btn.disabled=false; btn.textContent='Güncelle';
    }
  });
}

    const btn = modal.querySelector('#poc-submit');
    btn.disabled=true; btn.textContent='Gönderiliyor...';

    const requirements = modal.querySelector('#poc-req')?.value||'';
    const preferredDates = modal.querySelector('#poc-dates')?.value||'';
    const location = modal.querySelector('#poc-location')?.value||'customer';
    const locLabels = {customer:'Müşteri Lokasyonu',vendor:'Vendor Lokasyonu',online:'Online',hybrid:'Hibrit'};

    try {
      // Her vendor için ayrı poc_request oluştur
      const batchResults = [];
      for (const v of selectedVendors) {
        // Çakışma kontrolü
        const activeSnap = await getDocs(query(
          collection(db,'poc_requests'),
          where('vendorId','==',v.vendorId)
        ));

        const docRef = await addDoc(collection(db,'poc_requests'), {
          customerId: CUR_USER.uid,
          customerEmail: CUR_USER.email,
          customerName: CUR_PROFILE?.displayName||CUR_USER.email,
          customerCompany: CUR_PROFILE?.company||'',
          productId: v.productId,
          productName: v.productName,
          vendorId: v.vendorId,
          vendorName: v.vendorName,
          vendorEmail: v.vendorEmail,
          vendorType: v.vendorType,
          title, requirements, preferredDates, location,
          status: 'pending',
          activeVendorCount: activeSnap.size, // bilgi amaçlı
          createdAt: serverTimestamp()
        });
        batchResults.push({...v, docId: docRef.id, hadConflict: activeSnap.size >= 3});

        // Vendor'a mail
        if (v.vendorEmail) {
          sendEmail(v.vendorEmail, v.vendorName, 'Yeni PoC Talebi — PoCHub',
            `${CUR_PROFILE?.displayName||CUR_USER.email} (${CUR_PROFILE?.company||''}) sizinle bir PoC yapmak istiyor.`,
            `Ürün: ${v.productName}\nTalep: ${title}\nGereksinimler: ${requirements||'-'}\nLokasyon: ${locLabels[location]}\nTercih Edilen Tarih: ${preferredDates||'-'}`
          );
        }
      }

      // Müşteriye özet mail
      const vendorList = batchResults.map(v=>`• ${v.productName} (${v.vendorName})`).join('\n');
      sendEmail(CUR_USER.email, CUR_PROFILE?.displayName||'',
        'PoC Talepleriniz Gönderildi — PoCHub',
        `${batchResults.length} vendor'a PoC talebiniz iletildi.`,
        `Talepler:\n${vendorList}\n\nVendorlar en kısa sürede size dönüş yapacaktır.`
      );

      // Çakışma uyarısı varsa göster
      const conflicts = batchResults.filter(v=>v.hadConflict);

      modal.remove();
      showToast(`${batchResults.length} vendor'a PoC talebi gönderildi!`);

      if (conflicts.length > 0) {
        setTimeout(() => {
          showToast(`⚠ ${conflicts.map(v=>v.vendorName).join(', ')} için takvim yoğunluğu var. Dönüş süresi uzayabilir.`, 'err');
        }, 2000);
      }

      // Müşteri panelini yenile
      if (CUR_SCREEN === 'customer') { CUR_CUST_TAB='requests'; renderCustomer(); }

    } catch(e) {
      modal.querySelector('#poc-err').innerHTML=`<div class="alert alert-err">${e.message}</div>`;
      btn.disabled=false; btn.textContent='Talebi Gönder →';
    }
  });
}

async function loadOffersWithComparison(m) {
  m.innerHTML = '<div class="loading"><div class="spinner"></div>Teklifler yükleniyor...</div>';
  try {
    const snap = await getDocs(query(collection(db,'offers'), where('customerId','==',CUR_USER.uid)));
    const offers = snap.docs.map(d=>({...d.data(),id:d.id}));
    offers.sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
    if (!offers.length) { m.innerHTML='<div class="empty"><div class="empty-icon">💰</div>Henüz teklif almadınız.</div>'; return; }

    // pocRequestId bazında grupla
    const grouped = {};
    offers.forEach(o => {
      const key = o.pocRequestId || o.id;
      if (!grouped[key]) grouped[key] = [];
      grouped[key].push(o);
    });

    let html = '<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Teklifler</h2>';

    Object.entries(grouped).forEach(([pocId, pocOffers]) => {
      const hasMultiple = pocOffers.length > 1;
      const minAmount = Math.min(...pocOffers.map(x=>parseFloat(x.amount)||Infinity));

      if (hasMultiple) {
        html += `<div class="card" style="margin-bottom:16px">
          <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:#3b7cff">
            🔄 ${pocOffers.length} Vendor Karşılaştırması
          </div>
          <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px">
            <thead><tr>
              <th style="background:#1c1f2a;padding:9px 12px;text-align:left;color:#5a6278;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px">Vendor</th>
              <th style="background:#1c1f2a;padding:9px 12px;text-align:left;color:#5a6278;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px">Ürün</th>
              <th style="background:#1c1f2a;padding:9px 12px;text-align:right;color:#5a6278;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px">Tutar</th>
              <th style="background:#1c1f2a;padding:9px 12px;text-align:center;color:#5a6278;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px">Kanal Payı</th>
              <th style="background:#1c1f2a;padding:9px 12px;text-align:center;color:#5a6278;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px">Durum</th>
              <th style="background:#1c1f2a;padding:9px 12px;text-align:center;color:#5a6278;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px">İşlem</th>
            </tr></thead>
            <tbody>
              ${pocOffers.map(o => {
                const isLowest = parseFloat(o.amount) === minAmount;
                return `<tr style="border-top:1px solid rgba(255,255,255,.06);background:${isLowest?'rgba(34,208,120,.04)':''}">
                  <td style="padding:10px 12px;font-weight:600">
                    ${o.vendorName||'—'}
                    ${isLowest?'<span class="bdg" style="background:rgba(34,208,120,.12);color:#22d078;margin-left:6px;font-size:10px">En Düşük</span>':''}
                  </td>
                  <td style="padding:10px 12px;color:#7c87a0">${o.productName||'—'}</td>
                  <td style="padding:10px 12px;text-align:right;font-family:monospace;font-weight:700;font-size:14px;color:${isLowest?'#22d078':'#e9ecf3'}">
                    ${(parseFloat(o.amount)||0).toLocaleString('tr-TR')} ${o.currency||'₺'}
                  </td>
                  <td style="padding:10px 12px;text-align:center">${o.hasChannelFee?'<span style="color:#f0a429;font-size:12px">Var</span>':'<span style="color:#22d078;font-size:12px">Yok</span>'}</td>
                  <td style="padding:10px 12px;text-align:center">${statusBadge(o.status)}</td>
                  <td style="padding:10px 12px;text-align:center;white-space:nowrap">
                    ${o.status==='pending'?`
                      <button class="btn-gr btn-sm offer-accept-btn" data-id="${o.id}" data-vemail="${o.vendorEmail||''}" data-vname="${o.vendorName||''}">Kabul</button>
                      <button class="btn-red btn-sm offer-reject-btn" data-id="${o.id}" style="margin-left:4px">Red</button>
                    `:'—'}
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table></div>
        </div>`;
      } else {
        const o = pocOffers[0];
        html += `<div class="card" style="border-color:rgba(59,124,255,.25);margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px">
            <div>
              <div style="font-size:14px;font-weight:700">${o.productName||'—'} — ${o.vendorName||'—'}</div>
              <div style="font-size:11.5px;color:#7c87a0;margin-top:2px">${o.hasChannelFee?'Kanal payı var':'Kanal payı yok'}${o.details?' · '+o.details:''}</div>
            </div>
            ${statusBadge(o.status)}
          </div>
          <div style="font-size:30px;font-weight:700;color:${o.status==='accepted'?'#22d078':'#3b7cff'};letter-spacing:-1.5px;font-family:monospace;margin-bottom:10px">
            ${(parseFloat(o.amount)||0).toLocaleString('tr-TR')} ${o.currency||'₺'}
          </div>

          </div>`:''}
        </div>`;
      }
    });

    m.innerHTML = html;

    m.querySelectorAll('.offer-accept-btn').forEach(b => b.addEventListener('click', async () => {
      if (!confirm('Bu teklifi kabul etmek istiyor musunuz?')) return;
      await updateDoc(doc(db,'offers',b.dataset.id), {status:'accepted'});
      showToast('Teklif kabul edildi!');
      if (b.dataset.vemail) sendEmail(b.dataset.vemail, b.dataset.vname,
        'Teklifiniz Kabul Edildi! — PoCHub',
        `${CUR_PROFILE?.displayName||CUR_USER.email} teklifinizi kabul etti.`, '');
      loadCustTab();
    }));
    m.querySelectorAll('.offer-reject-btn').forEach(b => b.addEventListener('click', async () => {
      await updateDoc(doc(db,'offers',b.dataset.id), {status:'rejected'});
      showToast('Teklif reddedildi.');
      loadCustTab();
    }));
  } catch(e) {
    m.innerHTML = `<div class="empty">Yükleme hatası: ${e.message}</div>`;
  }
}

async function renderVendorCalendar(m) {
  // Tüm vendor verilerini çek
  var pocSnap = await getDocs(query(collection(db,'poc_requests'), where('vendorId','==',CUR_USER.uid)));
  var evSnap2 = await getDocs(query(collection(db,'public_events'), where('vendorId','==',CUR_USER.uid)));

  var pocItems = pocSnap.docs.map(function(d) { return {...d.data(), id:d.id, itemType:'private'}; });
  var evItems2 = evSnap2.docs.map(function(d) { return {...d.data(), id:d.id, itemType:'public'}; });
  var allItems = pocItems.concat(evItems2);
  allItems.sort(function(a,b) {
    var da = a.eventDate || a.createdAt;
    var db2 = b.eventDate || b.createdAt;
    return (da&&da.seconds?da.seconds:0) - (db2&&db2.seconds?db2.seconds:0);
  });

  var today = new Date();
  var calYear = today.getFullYear();
  var calMonth = today.getMonth();
  var calView = 'calendar'; // 'calendar' | 'list'
  var searchQuery = '';

  function getFiltered() {
    var q = searchQuery.toLowerCase();
    if (!q) return allItems;
    return allItems.filter(function(item) {
      return (item.title||'').toLowerCase().includes(q) ||
             (item.productName||'').toLowerCase().includes(q) ||
             (item.customerName||'').toLowerCase().includes(q);
    });
  }

  function renderContent() {
    var filtered = getFiltered();
    var contentEl = document.getElementById('vcal-content');
    if (!contentEl) return;

    if (calView === 'list') {
      renderListView(filtered, contentEl);
    } else {
      renderCalView(filtered, contentEl);
    }
  }

  function renderListView(items, container) {
    if (!items.length) {
      container.innerHTML = '<div class="empty"><div class="empty-icon">📅</div>Kayıt bulunamadı.</div>';
      return;
    }
    var html = '<table style="width:100%;border-collapse:collapse;font-size:12.5px">' +
      '<thead><tr>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;color:#5a6278;font-size:10.5px;text-transform:uppercase">Başlık / Ürün</th>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;color:#5a6278;font-size:10.5px;text-transform:uppercase">Tür</th>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;color:#5a6278;font-size:10.5px;text-transform:uppercase">Müşteri</th>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;color:#5a6278;font-size:10.5px;text-transform:uppercase">Durum</th>' +
      '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;color:#5a6278;font-size:10.5px;text-transform:uppercase">Tarih</th>' +
      '</tr></thead><tbody>';

    items.forEach(function(item) {
      var isPublic = item.itemType === 'public';
      var dateStr = item.eventDate ? fmt(item.eventDate) : item.createdAt ? fmt(item.createdAt) : '—';
      html += '<tr style="border-top:1px solid rgba(255,255,255,.06)">' +
        '<td style="padding:11px 14px"><div style="font-weight:600">' + (item.title||item.productName||'—') + '</div>' +
        (item.productName&&item.itemType==='private'?'<div style="font-size:11px;color:#5a6278">'+item.productName+'</div>':'') + '</td>' +
        '<td style="padding:11px 14px">' + (isPublic ?
          '<span class="bdg" style="background:rgba(34,208,120,.12);color:#22d078">Public</span>' :
          '<span class="bdg" style="background:rgba(59,124,255,.12);color:#7db4ff">Private</span>') + '</td>' +
        '<td style="padding:11px 14px;color:#7c87a0">' + (item.customerName||'—') + '</td>' +
        '<td style="padding:11px 14px">' + statusBadge(item.status) + '</td>' +
        '<td style="padding:11px 14px;color:#7c87a0;font-size:12px">' + dateStr + '</td>' +
        '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function renderCalView(items, container) {
    var MONTHS = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    var DAYS = ['Pt','Sa','Ça','Pe','Cu','Ct','Pz'];

    // O aya ait item'ları gün bazında grupla
    var dayMap = {};
    items.forEach(function(item) {
      var dateField = item.eventDate || item.createdAt;
      if (!dateField || !dateField.toDate) return;
      var d = dateField.toDate();
      if (d.getFullYear()===calYear && d.getMonth()===calMonth) {
        var day = d.getDate();
        if (!dayMap[day]) dayMap[day] = [];
        dayMap[day].push(item);
      }
    });

    var firstDay = new Date(calYear, calMonth, 1).getDay();
    var offset = firstDay===0 ? 6 : firstDay-1;
    var daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

    var html = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px">';
    DAYS.forEach(function(d) {
      html += '<div style="text-align:center;font-size:10px;color:#5a6278;font-weight:700;padding:4px 0">' + d + '</div>';
    });
    for (var i=0;i<offset;i++) html += '<div></div>';
    for (var day=1;day<=daysInMonth;day++) {
      var isToday = today.getFullYear()===calYear && today.getMonth()===calMonth && today.getDate()===day;
      var dayItems = dayMap[day]||[];
      var hasPoc = dayItems.some(function(x){return x.itemType==='private';});
      var hasEv = dayItems.some(function(x){return x.itemType==='public';});
      var bg = isToday ? '#3b7cff' : (hasPoc||hasEv) ? 'rgba(59,124,255,.15)' : 'transparent';
      var border = isToday ? 'none' : (hasPoc||hasEv) ? '1px solid rgba(59,124,255,.3)' : '1px solid rgba(255,255,255,.06)';
      html += '<div class="vcal-day" data-day="' + day + '" style="min-height:52px;border-radius:6px;padding:4px;cursor:' + (dayItems.length?'pointer':'default') + ';background:' + bg + ';border:' + border + '">' +
        '<div style="font-size:11.5px;font-weight:' + (isToday||dayItems.length?'700':'400') + ';color:' + (isToday?'#fff':dayItems.length?'#e9ecf3':'#5a6278') + '">' + day + '</div>';
      if (hasPoc) html += '<div style="width:6px;height:6px;border-radius:50%;background:#7db4ff;margin-top:2px" title="Private PoC"></div>';
      if (hasEv) html += '<div style="width:6px;height:6px;border-radius:50%;background:#22d078;margin-top:2px" title="Public Etkinlik"></div>';
      html += '</div>';
    }
    html += '</div>';

    // Seçili gün detayı
    html += '<div id="vcal-day-detail"></div>';

    container.innerHTML = html;

    // Gün tıklama
    container.querySelectorAll('.vcal-day').forEach(function(dayEl) {
      dayEl.addEventListener('click', function() {
        var day = parseInt(dayEl.dataset.day);
        var dayItems = dayMap[day]||[];
        if (!dayItems.length) return;

        // Önceki seçimi temizle
        container.querySelectorAll('.vcal-day').forEach(function(d) {
          if (!d.classList.contains('today')) d.style.outline='none';
        });
        dayEl.style.outline='2px solid #3b7cff';

        var detailEl = document.getElementById('vcal-day-detail');
        if (!detailEl) return;
        var dHtml = '<div style="margin-top:4px">';
        dayItems.forEach(function(item) {
          var isPublic = item.itemType==='public';
          dHtml += '<div class="card" style="margin-bottom:8px;padding:12px;border-color:' + (isPublic?'rgba(34,208,120,.25)':'rgba(59,124,255,.25)') + '">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">' +
            '<span class="bdg" style="background:' + (isPublic?'rgba(34,208,120,.12)':'rgba(59,124,255,.12)') + ';color:' + (isPublic?'#22d078':'#7db4ff') + '">' + (isPublic?'Public Etkinlik':'Private PoC') + '</span>' +
            statusBadge(item.status) + '</div>' +
            '<div style="font-size:13px;font-weight:700">' + (item.title||item.productName||'—') + '</div>' +
            (item.customerName?'<div style="font-size:12px;color:#7c87a0;margin-top:3px">Müşteri: '+item.customerName+'</div>':'') +
            (item.productName&&isPublic?'<div style="font-size:12px;color:#7c87a0;margin-top:3px">Ürün: '+item.productName+'</div>':'') +
            '</div>';
        });
        dHtml += '</div>';
        detailEl.innerHTML = dHtml;
      });
    });
  }

  // Ana layout
  m.innerHTML = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">' +
    '<h2 style="font-size:18px;font-weight:700">PoC Takvimim</h2>' +
    '<div style="display:flex;gap:8px;align-items:center">' +
    '<input class="inp" id="vcal-search" placeholder="Ürün, müşteri veya başlık ara..." style="width:240px;font-size:12.5px">' +
    '<button id="vcal-toggle-list" class="btn-g btn-sm">📋 Liste</button>' +
    '<button id="vcal-toggle-cal" class="btn-p btn-sm">📅 Takvim</button>' +
    '</div>' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px" id="vcal-nav">' +
    '<button id="vcal-prev" style="background:none;border:none;color:#7c87a0;cursor:pointer;font-size:18px;padding:2px 8px">‹</button>' +
    '<span id="vcal-month-label" style="font-size:13px;font-weight:700;min-width:120px;text-align:center"></span>' +
    '<button id="vcal-next" style="background:none;border:none;color:#7c87a0;cursor:pointer;font-size:18px;padding:2px 8px">›</button>' +
    '</div>' +
    '<div id="vcal-legend" style="display:flex;gap:14px;margin-bottom:12px;font-size:12px;color:#7c87a0">' +
    '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#7db4ff;margin-right:4px"></span>Private PoC</span>' +
    '<span><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#22d078;margin-right:4px"></span>Public Etkinlik</span>' +
    '</div>' +
    '<div id="vcal-content"></div>';

  var MONTHS_TR = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

  function updateMonthLabel() {
    var lbl = document.getElementById('vcal-month-label');
    if (lbl) lbl.textContent = MONTHS_TR[calMonth] + ' ' + calYear;
  }

  function setView(view) {
    calView = view;
    var navEl = document.getElementById('vcal-nav');
    var legEl = document.getElementById('vcal-legend');
    if (navEl) navEl.style.display = view==='calendar' ? 'flex' : 'none';
    if (legEl) legEl.style.display = view==='calendar' ? 'flex' : 'none';
    document.getElementById('vcal-toggle-cal').className = view==='calendar' ? 'btn-p btn-sm' : 'btn-g btn-sm';
    document.getElementById('vcal-toggle-list').className = view==='list' ? 'btn-p btn-sm' : 'btn-g btn-sm';
    updateMonthLabel();
    renderContent();
  }

  m.querySelector('#vcal-prev').addEventListener('click', function() {
    calMonth--; if(calMonth<0){calMonth=11;calYear--;}
    updateMonthLabel(); renderContent();
  });
  m.querySelector('#vcal-next').addEventListener('click', function() {
    calMonth++; if(calMonth>11){calMonth=0;calYear++;}
    updateMonthLabel(); renderContent();
  });
  m.querySelector('#vcal-toggle-list').addEventListener('click', function() { setView('list'); });
  m.querySelector('#vcal-toggle-cal').addEventListener('click', function() { setView('calendar'); });
  m.querySelector('#vcal-search').addEventListener('input', function() {
    searchQuery = this.value;
    renderContent();
  });

  setView('calendar');
}

    '<select class="inp" id="ee-fmt">' +
    '<option value="online"' + (evData.format==='online'?' selected':'') + '>Online</option>' +
    '<option value="onsite"' + (evData.format==='onsite'?' selected':'') + '>Fiziksel</option>' +
    '<option value="hybrid"' + (evData.format==='hybrid'?' selected':'') + '>Hibrit</option>' +
    '</select>' +
    '<div id="ee-loc-online" style="margin-top:8px">' +
    '<label class="lbl">Online Link</label>' +
    '<input class="inp" id="ee-url" value="' + (evData.onlineUrl||'').replace(/"/g,'&quot;') + '" placeholder="https://zoom.us/j/...">' +
    '</div>' +
    '<div id="ee-loc-onsite" style="margin-top:8px">' +
    '<label class="lbl">Fiziksel Adres</label>' +
    '<input class="inp" id="ee-address" value="' + (evData.physicalAddress||'').replace(/"/g,'&quot;') + '" placeholder="Büyükdere Cad. No:127, İstanbul">' +
    '</div>' +
    '<div id="ee-err" style="margin-top:10px"></div>' +
    '<button class="btn-p" id="ee-submit" style="width:100%;padding:11px;font-size:14px;margin-top:14px">Güncelle</button>' +
    '</div>';

  document.body.appendChild(modal);
  modal.querySelector('#close-eedit').addEventListener('click', function() { modal.remove(); });
  modal.addEventListener('click', function(e) { if(e.target===modal) modal.remove(); });

  function updateEeLocFields() {
    var fmt = modal.querySelector('#ee-fmt').value;
    modal.querySelector('#ee-loc-online').style.display = (fmt==='online'||fmt==='hybrid') ? 'block' : 'none';
    modal.querySelector('#ee-loc-onsite').style.display = (fmt==='onsite'||fmt==='hybrid') ? 'block' : 'none';
  }
  modal.querySelector('#ee-fmt').addEventListener('change', updateEeLocFields);
  updateEeLocFields();

  modal.querySelector('#ee-submit').addEventListener('click', async function() {
    var title = modal.querySelector('#ee-title').value.trim();
    var desc = modal.querySelector('#ee-desc').value.trim();
    if (!title || !desc) {
      modal.querySelector('#ee-err').innerHTML = '<div class="alert alert-err">Başlık ve açıklama zorunludur.</div>';
      return;
    }
    var btn = modal.querySelector('#ee-submit');
    btn.disabled=true; btn.textContent='Güncelleniyor...';
    try {
      var dateVal = modal.querySelector('#ee-date').value;
      var timeVal = modal.querySelector('#ee-time').value || '10:00';
      var fmt = modal.querySelector('#ee-fmt').value;
      var urlVal = modal.querySelector('#ee-url').value.trim();
      var addrVal = modal.querySelector('#ee-address').value.trim();
      var locStr = fmt==='online' ? urlVal : fmt==='onsite' ? addrVal : addrVal + ' | ' + urlVal;

      var updateData = {
        title: title, description: desc,
        capacity: parseInt(modal.querySelector('#ee-cap').value)||50,
        fee: parseFloat(modal.querySelector('#ee-fee').value)||0,
        format: fmt, location: locStr,
        onlineUrl: (fmt==='online'||fmt==='hybrid') ? urlVal : '',
        physicalAddress: (fmt==='onsite'||fmt==='hybrid') ? addrVal : '',
        updatedAt: serverTimestamp()
      };
      if (dateVal) {
        updateData.eventDate = Timestamp.fromDate(new Date(dateVal + 'T' + timeVal + ':00'));
      }
      await updateDoc(doc(db,'public_events',evId), updateData);
      modal.remove();
      showToast('Etkinlik güncellendi!');
      loadVendTab();
    } catch(e) {
      modal.querySelector('#ee-err').innerHTML = '<div class="alert alert-err">' + e.message + '</div>';
      btn.disabled=false; btn.textContent='Güncelle';
    }
  });
}

  });

    const psnap = await getDocs(query(collection(db,'products'),

      where('status','==','active')
    ));
    vendorProds = psnap.docs.map(d => ({...d.data(), id:d.id}));

    // İlk yükleme — tüm ürünleri göster
    renderEvProdList(vendorProds, modal);

    var timeVal = modal.querySelector('#ev-time') ? modal.querySelector('#ev-time').value || '10:00' : '10:00';
    var fmt = modal.querySelector('#ev-fmt').value;
    var urlVal = modal.querySelector('#ev-url') ? modal.querySelector('#ev-url').value.trim() : '';
    var addrVal = modal.querySelector('#ev-address') ? modal.querySelector('#ev-address').value.trim() : '';
    var prodName = modal.querySelector('#ev-prod-name-val').value || modal.querySelector('#ev-prod-search').value.trim();
    var errDiv = modal.querySelector('#ev-err');

    var errors = [];
    if (!title) errors.push('Başlık');
    if (!desc) errors.push('Açıklama');
    if (!prodName) errors.push('Ürün');
    if (!dateVal) errors.push('Tarih');
    if ((fmt==='online'||fmt==='hybrid') && !urlVal) errors.push('Online link');
    if ((fmt==='onsite'||fmt==='hybrid') && !addrVal) errors.push('Fiziksel adres');

    if (errors.length) {
      errDiv.innerHTML = '<div class="alert alert-err">Zorunlu alanlar eksik: <b>' + errors.join(', ') + '</b></div>';
      return;
    }
    if ((fmt==='online'||fmt==='hybrid') && urlVal && !urlVal.startsWith('http')) {
      errDiv.innerHTML = '<div class="alert alert-err">Online link http:// veya https:// ile başlamalıdır.</div>';
      return;
    }

    var btn = modal.querySelector('#ev-submit');
    btn.disabled=true; btn.textContent='Yayınlanıyor...';
    try {
      var dateTime = new Date(dateVal + 'T' + timeVal + ':00');
      var locStr = fmt==='online' ? urlVal : fmt==='onsite' ? addrVal : addrVal + ' | Online: ' + urlVal;

      await addDoc(collection(db,'public_events'), {
        vendorId: CUR_USER.uid,
        vendorName: CUR_PROFILE ? (CUR_PROFILE.displayName||CUR_USER.email) : CUR_USER.email,
        vendorEmail: CUR_USER.email,
        title: title, description: desc,
        productName: prodName,
        productId: modal.querySelector('#ev-prod-id').value,
        category: modal.querySelector('#ev-prod-cat-val').value || 'Diğer',
        eventDate: Timestamp.fromDate(dateTime),
        capacity: parseInt(modal.querySelector('#ev-cap').value)||50,
        fee: parseFloat(modal.querySelector('#ev-fee').value)||0,
        format: fmt, location: locStr,
        onlineUrl: (fmt==='online'||fmt==='hybrid') ? urlVal : '',
        physicalAddress: (fmt==='onsite'||fmt==='hybrid') ? addrVal : '',
        registeredCount: 0, status: 'published',
        createdAt: serverTimestamp()
      });
      modal.remove();
      showToast('Etkinlik yayınlandı!');
      if (CUR_VEND_TAB==='events') loadVendTab();
    } catch(e) {
      errDiv.innerHTML = '<div class="alert alert-err">' + e.message + '</div>';
      btn.disabled=false; btn.textContent='Etkinliği Yayınla';
    }
  });
}

function renderAdmin() {
  if (!CUR_USER || CUR_PROFILE?.role !== 'admin') {
    el('scr-admin').innerHTML = `<div class="wrap"><div class="empty"><div class="empty-icon">🔒</div>Admin yetkisi gerekli.</div></div>`;
    return;
  }
  // Sidebar zaten oluşturulmuşsa sadece içeriği güncelle
  if (el('adm-main')) { loadAdmTab(); return; }
  const tabs = [
    ['dashboard','Dashboard'],['users','Kullanıcılar'],['categories','Kategoriler'],
    ['products','Ürün Onayları'],['requests','Tüm PoC Talepleri'],
    ['events','Tüm Etkinlikler'],['offers','Teklifler'],
  ];
  el('scr-admin').innerHTML = `<div class="dash">
    <div class="sbar">
      <div class="role-tag" style="background:rgba(240,164,41,.08);border:1px solid rgba(240,164,41,.18)">
        <span style="color:#f0a429">Admin</span>
        <span style="font-family:monospace;font-size:10px;color:#5a6278">v1.9.1</span>
      </div>
      <div class="slbl">Admin Paneli</div>
      ${tabs.map(([t,l])=>`<button class="si${CUR_ADM_TAB===t?' on':''}" data-t="${t}" id="atab-${t}"><div class="sdot"></div>${l}</button>`).join('')}
    </div>
    <div class="main-content" id="adm-main"></div>
  </div>`;
  tabs.forEach(([t]) => el('atab-'+t)?.addEventListener('click', () => { CUR_ADM_TAB=t; loadAdmTab(); el('scr-admin').querySelectorAll('.si').forEach(b=>b.classList.toggle('on',b.dataset.t===t)); }));
  loadAdmTab();
}

async function loadAdmTab() {
  const m = el('adm-main');
  if (!m) return;
  m.innerHTML = '<div class="loading"><div class="spinner"></div>Yükleniyor...</div>';

  if (CUR_ADM_TAB === 'categories') { await admCategories(m); return; }
  if (CUR_ADM_TAB === 'users') { await admUsers(m); return; }
  if (CUR_ADM_TAB === 'products') { await admProducts(m); return; }
  if (CUR_ADM_TAB === 'requests') { await admRequests(m); return; }

async function admEvents(m) {

  allItems.sort((a,b)=>(a.eventDate?.seconds||a.createdAt?.seconds||0)-(b.eventDate?.seconds||b.createdAt?.seconds||0));

  var today2 = new Date();
  var calYear2 = today2.getFullYear();
  var calMonth2 = today2.getMonth();
  var calView2 = 'calendar';
  var searchQ2 = '';
  var MONTHS_TR2 = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

  function getFiltered2() {
    var q = searchQ2.toLowerCase();
    if (!q) return allItems;
    return allItems.filter(function(item) {
      return (item.title||'').toLowerCase().includes(q)||(item.productName||'').toLowerCase().includes(q)||(item.vendorName||'').toLowerCase().includes(q)||(item.customerName||'').toLowerCase().includes(q);
    });
  }

  function renderListView2(items, container) {
    if (!items.length) { container.innerHTML='<div class="empty"><div class="empty-icon">📅</div>Kayıt bulunamadı.</div>'; return; }
    var html = '<table><thead><tr><th>Başlık</th><th>Vendor</th><th>Tür</th><th>Tarih</th><th>Durum</th><th>İşlem</th></tr></thead><tbody>';
    items.forEach(function(item) {
      var isPublic = item.itemType==='public';
      html += '<tr><td style="font-weight:600">'+(item.title||item.productName||'—')+'<div style="font-size:11px;color:#5a6278">'+(isPublic?item.productName||'':'item.customerName'||'')+'</div></td>' +
        '<td style="color:#7c87a0">'+(item.vendorName||'—')+'</td>' +

        '<td style="color:#7c87a0;font-size:12px">'+fmt(item.eventDate||item.createdAt)+'</td>' +

        '</tr>';
    });

      b.addEventListener('click',async function(){
        if(!confirm('Etkinliği iptal etmek istiyor musunuz?')) return;

        admEvents(m);

    });

  function renderCalView2(items, container) {
    var dayMap = {};
    items.forEach(function(item) {
      var dateField = item.eventDate||item.createdAt;
      if (!dateField||!dateField.toDate) return;
      var d = dateField.toDate();
      if (d.getFullYear()===calYear2&&d.getMonth()===calMonth2) {
        var day = d.getDate();
        if (!dayMap[day]) dayMap[day]=[];
        dayMap[day].push(item);
      }
    });
    var firstDay = new Date(calYear2,calMonth2,1).getDay();
    var offset = firstDay===0?6:firstDay-1;
    var daysInMonth = new Date(calYear2,calMonth2+1,0).getDate();
    var DAYS2=['Pt','Sa','Ça','Pe','Cu','Ct','Pz'];
    var html='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px">';
    DAYS2.forEach(function(d){html+='<div style="text-align:center;font-size:10px;color:#5a6278;font-weight:700;padding:4px 0">'+d+'</div>';});
    for(var i=0;i<offset;i++) html+='<div></div>';
    for(var day=1;day<=daysInMonth;day++){
      var isToday2=today2.getFullYear()===calYear2&&today2.getMonth()===calMonth2&&today2.getDate()===day;
      var dayItems=dayMap[day]||[];
      var hasPoc=dayItems.some(function(x){return x.itemType==='private';});
      var hasEv=dayItems.some(function(x){return x.itemType==='public';});
      var bg=isToday2?'#3b7cff':(hasPoc||hasEv)?'rgba(59,124,255,.15)':'transparent';

            '<div style="display:flex;gap:8px;margin-bottom:5px">'+
            '<span class="bdg" style="background:'+(isPublic?'rgba(34,208,120,.12)':'rgba(59,124,255,.12)')+';color:'+(isPublic?'#22d078':'#7db4ff')+'">'+(isPublic?'Public Etkinlik':'Private PoC')+'</span>'+
            statusBadge(item.status)+'</div>'+
            '<div style="font-size:13px;font-weight:700">'+(item.title||item.productName||'—')+'</div>'+
            '<div style="font-size:12px;color:#7c87a0;margin-top:3px">Vendor: '+(item.vendorName||'—')+'</div>'+
            (item.customerName?'<div style="font-size:12px;color:#7c87a0">Müşteri: '+item.customerName+'</div>':'')+'</div>';
        });
        detailEl.innerHTML=dHtml;
      });
    });
  }

    var filtered=getFiltered2();

  m.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'+
    '<h2 style="font-size:18px;font-weight:700">Tüm Etkinlikler ve PoC Süreci</h2>'+

async function admOffers(m) {
  const snap = await getDocs(collection(db,'offers'));
  var allOffers = snap.docs.map(d=>({...d.data(),id:d.id}));
  allOffers.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  function renderRows(offers) {
    var tbody=m.querySelector('#offers-tbody');
    var count=m.querySelector('#offers-count');
    if(count) count.textContent='('+offers.length+')';
    if(!tbody) return;
    if(!offers.length){tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:24px;color:#5a6278">Sonuç bulunamadı.</td></tr>';return;}
    tbody.innerHTML=offers.map(function(o){
      return '<tr><td style="font-weight:600">'+(o.productName||'—')+'</td>' +
        '<td style="color:#7c87a0">'+(o.vendorName||'—')+'</td>' +
        '<td style="color:#7c87a0">'+(o.customerName||'—')+'</td>' +
        '<td style="font-family:monospace;font-weight:700">'+((o.amount||0).toLocaleString('tr-TR'))+' '+(o.currency||'₺')+'</td>' +
        '<td>'+(o.hasChannelFee?'<span style="color:#f0a429">Var</span>':'<span style="color:#22d078">Yok</span>')+'</td>' +
        '<td>'+statusBadge(o.status)+'</td>' +
        '<td style="color:#7c87a0;font-size:12px">'+fmt(o.createdAt)+'</td></tr>';
    }).join('');
  }

  m.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">'+
    '<h2 style="font-size:18px;font-weight:700">Teklifler <span id="offers-count" style="font-size:13px;color:#7c87a0;font-weight:400"></span></h2>'+
    '<input class="inp" id="offers-search" placeholder="Ürün, vendor veya müşteri ara..." style="width:260px;font-size:12.5px"></div>'+
    '<div style="display:flex;gap:8px;margin-bottom:12px">'+
    '<button class="btn-g btn-sm off-status-filter on" data-status="">Tümü</button>'+
    '<button class="btn-g btn-sm off-status-filter" data-status="pending">Bekleyen</button>'+
    '<button class="btn-g btn-sm off-status-filter" data-status="accepted">Kabul</button>'+
    '<button class="btn-g btn-sm off-status-filter" data-status="rejected">Red</button>'+
    '</div>'+
    '<table><thead><tr><th>Ürün</th><th>Vendor</th><th>Müşteri</th><th>Tutar</th><th>Kanal Payı</th><th>Durum</th><th>Tarih</th></tr></thead><tbody id="offers-tbody"></tbody></table>';

  var statusFilter='';
  function applyFilter(){
    var q=(m.querySelector('#offers-search')?.value||'').toLowerCase();
    var filtered=allOffers.filter(function(o){
      var matchS=!statusFilter||o.status===statusFilter;
      var matchQ=!q||(o.productName||'').toLowerCase().includes(q)||(o.vendorName||'').toLowerCase().includes(q)||(o.customerName||'').toLowerCase().includes(q);
      return matchS&&matchQ;
    });
    renderRows(filtered);
  }
  renderRows(allOffers);
  m.querySelector('#offers-search').addEventListener('input',applyFilter);
  m.querySelectorAll('.off-status-filter').forEach(function(b){
    b.addEventListener('click',function(){
      m.querySelectorAll('.off-status-filter').forEach(function(x){x.className='btn-g btn-sm off-status-filter';});
      b.className='btn-p btn-sm off-status-filter on';
      statusFilter=b.dataset.status;
      applyFilter();
    });
  });
}


async function admCategories(m) {
  try {

    var html = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
