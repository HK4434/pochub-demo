  if (_catCache) return _catCache;

    var cats = snap.docs.map(d=>({...d.data(),id:d.id}));
    cats.sort((a,b)=>(a.order||0)-(b.order||0));

    archived:   ['#1c1f2a',             '#5a6278','Arşiv'],
    draft:      ['#1c1f2a',             '#7c87a0','Taslak'],
    published:  ['rgba(34,208,120,.12)', '#22d078','Yayında'],
  };
  const [bg,col,lbl] = m[s]||['#1c1f2a','#7c87a0',s];
  return `<span class="status-badge" style="background:${bg};color:${col}">${lbl}</span>`;
}

let ACTIVE_CHAT_UNSUB = null;
let ACTIVE_CHAT_POC_ID = null;

function openChatModal(pocId, pocTitle, otherName) {
  // Önceki listener kapat
  if (ACTIVE_CHAT_UNSUB) { ACTIVE_CHAT_UNSUB(); ACTIVE_CHAT_UNSUB=null; }
  ACTIVE_CHAT_POC_ID = pocId;

  const modal = document.createElement('div');
  modal.className = 'modal-bg on';
  modal.id = 'chat-modal';
  modal.innerHTML = `<div class="modal" style="max-width:580px;padding:0;display:flex;flex-direction:column;height:80vh">
    <div style="padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
      <div>
        <div style="font-size:14px;font-weight:700">${pocTitle||'PoC Mesajlaşması'}</div>
        <div style="font-size:12px;color:#7c87a0">${otherName||''} ile</div>
      </div>
      <button id="close-chat" style="background:none;border:none;color:#7c87a0;cursor:pointer;font-size:20px">×</button>
    </div>
    <div id="chat-messages" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px">
      <div class="loading"><div class="spinner"></div>Mesajlar yükleniyor...</div>
    </div>
    <div style="padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;gap:8px;flex-shrink:0">
      <input class="inp" id="chat-input" placeholder="Mesajınızı yazın... (Enter ile gönder)" style="flex:1">
      <button class="btn-p btn-sm" id="chat-send" style="flex-shrink:0">Gönder</button>
    </div>
  </div>`;
  document.body.appendChild(modal);

  modal.querySelector('#close-chat').addEventListener('click', () => {
    if (ACTIVE_CHAT_UNSUB) { ACTIVE_CHAT_UNSUB(); ACTIVE_CHAT_UNSUB=null; }
    modal.remove();
  });
  modal.addEventListener('click', e => {
    if (e.target===modal) {
      if (ACTIVE_CHAT_UNSUB) { ACTIVE_CHAT_UNSUB(); ACTIVE_CHAT_UNSUB=null; }
      modal.remove();
    }
  });

  // Realtime mesaj dinleyici
  const msgsEl = modal.querySelector('#chat-messages');
  const msgQuery = query(
    collection(db, 'poc_messages'),
    where('pocId','==',pocId),
    orderBy('createdAt','asc')
  );

  ACTIVE_CHAT_UNSUB = onSnapshot(msgQuery, snap => {
    if (snap.empty) {
      msgsEl.innerHTML = '<div class="empty" style="padding:32px">Henüz mesaj yok. İlk mesajı gönderin.</div>';
      return;
    }
    msgsEl.innerHTML = snap.docs.map(d => {
      const msg = d.data();
      const isMine = msg.senderId === CUR_USER?.uid;
      const time = msg.createdAt?.toDate ? msg.createdAt.toDate().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}) : '';
      return `<div style="display:flex;flex-direction:column;align-items:${isMine?'flex-end':'flex-start'}">
        <div class="msg-bubble ${isMine?'msg-mine':'msg-other'}">${msg.text}</div>
        <div class="msg-time" style="text-align:${isMine?'right':'left'}">${msg.senderName||''} · ${time}</div>
      </div>`;
    }).join('');
    msgsEl.scrollTop = msgsEl.scrollHeight;
  }, err => {
    // orderBy index hatası — index olmadan dene
    ACTIVE_CHAT_UNSUB2(pocId, msgsEl);
  });

  // Mesaj gönder
  async function sendChatMsg() {
    const input = modal.querySelector('#chat-input');
    const text = input?.value?.trim();
    if (!text) return;
    input.value = '';
    try {
      await addDoc(collection(db,'poc_messages'), {
        pocId,
        senderId: CUR_USER.uid,
        senderName: CUR_PROFILE?.displayName || CUR_USER.email,
        senderRole: CUR_PROFILE?.role || '',
        text,
        createdAt: serverTimestamp()
      });
      // Karşı tarafa Firestore bildirimi
      try {
        var pocSnap2 = await getDoc(doc(db,'poc_requests',pocId));
        if (pocSnap2.exists()) {
          var pd2 = pocSnap2.data();
          var recipientId = CUR_USER.uid === pd2.customerId ? pd2.vendorId : pd2.customerId;
          if (recipientId && recipientId !== CUR_USER.uid) {
            await addDoc(collection(db,'notifications'), {
              userId: recipientId,
              type: 'new_message',
              title: 'Yeni Mesaj',
              body: (CUR_PROFILE?.displayName||CUR_USER.email)+': '+text.substring(0,60)+(text.length>60?'...':''),
              pocId: pocId,
              senderId: CUR_USER.uid,
              senderName: CUR_PROFILE?.displayName||CUR_USER.email,
              read: false,
              createdAt: serverTimestamp()
            });
          }
        }
      } catch(ne) { console.warn('Bildirim:', ne.message); }
    } catch(e) {
      showToast('Mesaj gönderilemedi: '+e.message, 'err');
    }
  }

  modal.querySelector('#chat-send')?.addEventListener('click', sendChatMsg);
  modal.querySelector('#chat-input')?.addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendChatMsg(); }
  });
  setTimeout(() => modal.querySelector('#chat-input')?.focus(), 100);
}

// orderBy olmadan fallback
async function ACTIVE_CHAT_UNSUB2(pocId, msgsEl) {
  try {
    const snap = await getDocs(query(collection(db,'poc_messages'), where('pocId','==',pocId)));
    const msgs = snap.docs.map(d=>d.data()).sort((a,b)=>(a.createdAt?.seconds||0)-(b.createdAt?.seconds||0));
    if (!msgs.length) { msgsEl.innerHTML='<div class="empty" style="padding:32px">Henüz mesaj yok.</div>'; return; }
    msgsEl.innerHTML = msgs.map(msg => {
      const isMine = msg.senderId === CUR_USER?.uid;
      const time = msg.createdAt?.toDate ? msg.createdAt.toDate().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}) : '';
      return `<div style="display:flex;flex-direction:column;align-items:${isMine?'flex-end':'flex-start'}">
        <div class="msg-bubble ${isMine?'msg-mine':'msg-other'}">${msg.text}</div>
        <div class="msg-time">${msg.senderName||''} · ${time}</div>
      </div>`;
    }).join('');
    msgsEl.scrollTop = msgsEl.scrollHeight;
  } catch(e) { msgsEl.innerHTML='<div class="empty">Mesajlar yüklenemedi.</div>'; }
}

function startNotifListener() {
  if (!CUR_USER || !CUR_PROFILE) return;
  if (NOTIF_UNSUB) NOTIF_UNSUB(); // önceki listener'ı kapat

  const role = CUR_PROFILE.role;
  let q;
  if (role === 'customer') {
    q = query(collection(db,'poc_requests'), where('customerId','==',CUR_USER.uid));
  } else if (role === 'vendor') {
    q = query(collection(db,'poc_requests'), where('vendorId','==',CUR_USER.uid), where('status','==','pending'));
  } else {
    // Admin — bekleyen ürün onayları
    q = query(collection(db,'products'), where('status','==','pending'));
  }

  NOTIF_UNSUB = onSnapshot(q, snap => {
    NOTIF_COUNT = snap.size;
    updateNotifBadge();
  });
}

function stopNotifListener() {
  if (NOTIF_UNSUB) { NOTIF_UNSUB(); NOTIF_UNSUB = null; }
  NOTIF_COUNT = 0;
}

  const badge = document.getElementById('notif-badge');

  try {
    var snap = await getDocs(query(collection(db,'notifications'),
      where('userId','==',CUR_USER.uid), where('read','==',false)));
    var count = snap.size;
    if (count > 0) {
      badge.style.display = 'inline';
      badge.textContent = count > 9 ? '9+' : count;
    } else {
      badge.style.display = 'none';
    }
    return;
  } catch(e) {}
  // Fallback — eski mantık
  const badge2 = document.getElementById('notif-badge');
  if (badge) {
    badge.textContent = NOTIF_COUNT > 0 ? NOTIF_COUNT : '';
    badge.style.display = NOTIF_COUNT > 0 ? 'inline' : 'none';
  }
}

    lm.addEventListener('click', e => e.stopPropagation());
    lm.querySelectorAll('.login-opt').forEach(b => {
      b.addEventListener('click', () => {
        lm.style.display = 'none';
        openAuthModal(b.dataset.role, b.dataset.vtype||'');

  }

  el('logo-btn').addEventListener('click', () => go('home'));
}

function go(s) {
  CUR_SCREEN = s;
  buildNav();
  renderScreen(s);
}

function renderScreen(s) {
  document.querySelectorAll('.scr').forEach(x => x.classList.remove('on'));
  const scr = el('scr-'+s);
  if (scr) scr.classList.add('on');
  if (s==='home') renderHome();
  else if (s==='events') renderEvents();
  else if (s==='catalog') renderCatalog();
  else if (s==='customer') renderCustomer();
  else if (s==='vendor') renderVendor();
  else if (s==='admin') renderAdmin();
}

let AUTH_ROLE = '';
let AUTH_VTYPE = '';
let AUTH_MODE = 'login'; // login | register

function openAuthModal(role, vtype) {
  AUTH_ROLE = role;
  AUTH_VTYPE = vtype;
  AUTH_MODE = 'login';
  el('auth-err').innerHTML = '';
  renderAuthForm();
  el('auth-modal').classList.add('on');
}

function closeModal() {
  el('auth-modal').classList.remove('on');
}

function renderAuthForm() {
  const roleLabels = {customer:'Müşteri', vendor: AUTH_VTYPE==='ureticid'?'Üretici':AUTH_VTYPE==='distributor'?'Distribütör':AUTH_VTYPE==='integrator'?'Entegratör':'Vendor', admin:'Admin'};
  el('auth-title').textContent = (AUTH_MODE==='login'?'Giriş Yap':'Kayıt Ol') + ' — ' + (roleLabels[AUTH_ROLE]||AUTH_ROLE);

  let html = '';
  if (AUTH_MODE === 'register') {
    html += `<label class="lbl">Ad Soyad *</label><input class="inp" id="a-name" placeholder="Ad Soyad"><br>`;
    html += `<label class="lbl">Şirket Adı *</label><input class="inp" id="a-company" placeholder="Şirket adı (zorunlu)"><br>`;
    html += `<label class="lbl">Şirket Telefonu *</label><input class="inp" id="a-phone" placeholder="+90 212 xxx xx xx"><br>`;
    html += `<label class="lbl">Şirket Adresi</label><textarea class="inp" id="a-address" rows="2" placeholder="Şirket adresi" style="resize:none"></textarea><br>`;
    html += `<label class="lbl">Vergi No / TC No</label><input class="inp" id="a-taxno" placeholder="Vergi kimlik numarası"><br>`;
    html += `<div style="background:rgba(59,124,255,.08);border:1px solid rgba(59,124,255,.2);border-radius:7px;padding:10px;font-size:12px;color:#7db4ff;margin-bottom:4px">ℹ Kayıt için kurumsal e-posta adresi zorunludur. (Gmail, Hotmail vb. kabul edilmez)</div>`;
  }
  html += `<label class="lbl">E-posta *</label><input class="inp" id="a-email" type="email" placeholder="ornek@sirket.com"><br>`;
  html += `<label class="lbl">Şifre *</label><input class="inp" id="a-pass" type="password" placeholder="En az 6 karakter"><br>`;
  html += `<button class="btn-p" id="a-submit" style="width:100%;padding:11px;font-size:14px;margin-top:16px">${AUTH_MODE==='login'?'Giriş Yap':'Kayıt Ol'}</button>`;
  html += `<div style="text-align:center;margin-top:12px;font-size:12.5px;color:#7c87a0">
    ${AUTH_MODE==='login'?'Hesabın yok mu?':'Zaten hesabın var mı?'}
    <button onclick="toggleAuthMode()" style="background:none;border:none;color:#3b7cff;cursor:pointer;font:inherit;font-size:12.5px">
      ${AUTH_MODE==='login'?'Kayıt Ol':'Giriş Yap'}
    </button>
  </div>`;

  el('auth-form').innerHTML = html;
  el('a-submit').addEventListener('click', handleAuth);
  [el('a-email'), el('a-pass')].forEach(inp => inp?.addEventListener('keydown', e => { if(e.key==='Enter') handleAuth(); }));
}

window.toggleAuthMode = function() {
  AUTH_MODE = AUTH_MODE==='login'?'register':'login';
  el('auth-err').innerHTML = '';
  renderAuthForm();
};

async function handleAuth() {
  const email = el('a-email')?.value?.trim();
  const pass = el('a-pass')?.value;
  const errDiv = el('auth-err');
  if (!email || !pass) { errDiv.innerHTML = '<div class="alert alert-err">E-posta ve şifre zorunludur.</div>'; return; }

  const btn = el('a-submit');
  btn.disabled = true;
  btn.textContent = 'Lütfen bekleyin...';
  errDiv.innerHTML = '';

  try {
    if (AUTH_MODE === 'login') {
      await signInWithEmailAndPassword(auth, email, pass);
      closeModal();
      // Role göre panele yönlendir
      const snap = await getDoc(doc(db, 'users', auth.currentUser.uid));
      const profile = snap.data();
      go(profile?.role === 'customer' ? 'customer' : profile?.role === 'vendor' ? 'vendor' : profile?.role === 'admin' ? 'admin' : 'home');
    } else {
      const name = el('a-name')?.value?.trim() || '';
      const company = el('a-company')?.value?.trim() || '';
      const phone = el('a-phone')?.value?.trim() || '';
      const address = el('a-address')?.value?.trim() || '';
      const taxno = el('a-taxno')?.value?.trim() || '';

      // Şirket e-postası kontrolü
      const freeProviders = ['gmail','hotmail','yahoo','outlook','icloud','yandex','protonmail','live','msn','me.com','googlemail'];
      const emailDomain = email.split('@')[1]?.toLowerCase()||'';
      const isFree = freeProviders.some(p => emailDomain.includes(p));
      if (isFree) {
        errDiv.innerHTML = `<div class="alert alert-err">Lütfen kurumsal e-posta adresinizi girin. (Gmail, Hotmail, Yahoo gibi ücretsiz e-posta adresleri kabul edilmemektedir.)</div>`;
        btn.disabled=false; btn.textContent='Kayıt Ol'; return;
      }
      if (!company) {
        errDiv.innerHTML = `<div class="alert alert-err">Şirket adı zorunludur.</div>`;
        btn.disabled=false; btn.textContent='Kayıt Ol'; return;
      }
      if (!address) {
        errDiv.innerHTML = `<div class="alert alert-err">Şirket adresi zorunludur.</div>`;
        btn.disabled=false; btn.textContent='Kayıt Ol'; return;
      }
      if (!name) {
        errDiv.innerHTML = `<div class="alert alert-err">Ad Soyad zorunludur.</div>`;
        btn.disabled=false; btn.textContent='Kayıt Ol'; return;
      }

      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, 'users', cred.user.uid), {
        email, displayName: name, company, phone, address, taxNo: taxno,
        role: AUTH_ROLE, vendorType: AUTH_VTYPE,
        emailVerified: false,
        createdAt: serverTimestamp()
      });

      // Firebase email doğrulama maili gönder
      await sendEmailVerification(cred.user);

      closeModal();
      showVerificationBanner();
      showToast('Doğrulama e-postası gönderildi. Lütfen e-postanızı kontrol edin.');
    }
  } catch(e) {
    const msgs = {
      'auth/user-not-found': 'Bu e-posta ile kayıtlı hesap bulunamadı.',
      'auth/wrong-password': 'Şifre hatalı.',
      'auth/email-already-in-use': 'Bu e-posta zaten kayıtlı. Giriş yapmayı deneyin.',
      'auth/weak-password': 'Şifre en az 6 karakter olmalıdır.',
      'auth/invalid-email': 'Geçersiz e-posta adresi.',
      'auth/invalid-credential': 'E-posta veya şifre hatalı.',
    };
    errDiv.innerHTML = `<div class="alert alert-err">${msgs[e.code]||e.message}</div>`;
    btn.disabled = false;
    btn.textContent = AUTH_MODE==='login'?'Giriş Yap':'Kayıt Ol';
  }
}

  async function renderCalendar(year, month) {
    const months = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
    el('cal-title').textContent = months[month] + ' ' + year;
    const dows = ['Pt','Sa','Ça','Pe','Cu','Ct','Pz'];
    const firstDay = new Date(year, month, 1).getDay();
    const offset = firstDay === 0 ? 6 : firstDay - 1;
    const daysInMonth = new Date(year, month+1, 0).getDate();

    // O aya ait etkinlik günlerini bul
    const evDays = {};
    allEvents.forEach(e => {
      if (!e.eventDate?.toDate) return;
      const d = e.eventDate.toDate();
      if (d.getFullYear()===year && d.getMonth()===month) {
        const day = d.getDate();
        if (!evDays[day]) evDays[day] = [];
        evDays[day].push(e);
      }
    });

    const todayDate = new Date();
    let html = `<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">`;
    dows.forEach(d => html+=`<div style="font-size:9.5px;color:#5a6278;font-weight:700;padding:2px 0">${d}</div>`);
    // Boş hücreler
    for(let i=0;i<offset;i++) html+=`<div></div>`;
    for(let d=1;d<=daysInMonth;d++){
      const isToday = todayDate.getFullYear()===year && todayDate.getMonth()===month && todayDate.getDate()===d;
      const hasEv = evDays[d] && evDays[d].length > 0;
      const evCount = evDays[d]?.length || 0;
      html+=`<button class="cal-day" data-day="${d}" data-year="${year}" data-month="${month}" title="${hasEv?evCount+' etkinlik':''}"
        style="font-size:11.5px;padding:4px 2px;border-radius:5px;border:${isToday?'2px solid #3b7cff':'none'};cursor:${hasEv?'pointer':'default'};
        background:${isToday?'#3b7cff':hasEv?'rgba(59,124,255,.18)':'transparent'};
        color:${isToday?'#fff':hasEv?'#3b7cff':'#7c87a0'};
        font-weight:${isToday||hasEv?'700':'400'};position:relative">
        ${d}${hasEv&&!isToday?`<div style="width:4px;height:4px;background:#3b7cff;border-radius:50%;margin:1px auto 0"></div>`:''}
      </button>`;
    }
    html+=`</div>`;
    el('cal-grid').innerHTML = html;

    // Takvim günlerine tıklama
    el('cal-grid').querySelectorAll('.cal-day').forEach(b => {
      b.addEventListener('click', () => {
        const day = parseInt(b.dataset.day);

        // O güne ait etkinlikleri listele

          }
        });
        b.style.background = '#3b7cff';
        b.style.color = '#fff';
      });
    });

    // Seçili ayda etkinlik yoksa mesaj
    if (Object.keys(evDays).length === 0) {
      const titleEl = el('home-events-title');
      if (titleEl) titleEl.textContent = months[month]+' '+year+' — Etkinlik Yok';
    }
  }

        <div>

        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:12px;color:${spots<=0?'#ff7070':spots<=5?'#f0a429':'#22d078'};margin-bottom:8px;font-weight:600">${spots<=0?'Dolu':spots+' yer'}</div>
          <button class="btn-p btn-sm ev-detail-btn" data-id="${e.id}" style="margin-bottom:6px;white-space:nowrap">Detay →</button><br>
          <button class="btn-g btn-sm ev-reg-home" data-id="${e.id}" data-title="${(e.title||'').replace(/"/g,'')}" data-vendor-email="${e.vendorEmail||''}" data-vendor-name="${(e.vendorName||'').replace(/"/g,'')}">
            ${CUR_USER?'Kayıt Ol':'Giriş Yap & Kayıt'}
          </button>
        </div>
      </div>`;
    }).join('');

    // Detay butonu
    listEl.querySelectorAll('.ev-detail-btn').forEach(b => b.addEventListener('click', (ev) => {
      ev.stopPropagation();
      openEventDetail(b.dataset.id);
    }));
    listEl.querySelectorAll('.ev-item').forEach(item => item.addEventListener('click', () => {
      openEventDetail(item.dataset.id);
    }));
    listEl.querySelectorAll('.ev-reg-home').forEach(b => b.addEventListener('click', (ev) => {
      ev.stopPropagation();
      if (!CUR_USER) { openAuthModal('customer',''); return; }
      if (!CUR_USER.emailVerified && !CUR_PROFILE?.emailVerified) { showToast('Lütfen önce e-postanızı doğrulayın.','err'); return; }
      registerForEvent(b.dataset.id, b, b.dataset.vendorEmail, b.dataset.vendorName, b.dataset.title);
    }));
  }

  // İlk yükleme — yaklaşan etkinlikler
  console.log('PoCHub: allEvents yüklendi, sayı:', allEvents.length);
  renderHomeEventList(allEvents.slice(0,6), 'Yaklaşan Etkinlikler');
  renderCalendar(calYear, calMonth);

  // Ay değişince listeyi güncelle — temiz listener
  const MONTHS_TR = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  
  async function changeMonth(delta) {
    calMonth += delta;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    if (calMonth > 11) { calMonth = 0; calYear++; }
    await renderCalendar(calYear, calMonth);
    const monthEvs = allEvents.filter(e => {
      if (!e.eventDate?.toDate) return false;
      const d = e.eventDate.toDate();
      return d.getFullYear()===calYear && d.getMonth()===calMonth;
    });
    if (monthEvs.length > 0) {
      renderHomeEventList(monthEvs, MONTHS_TR[calMonth]+' '+calYear+' Etkinlikleri');
    } else {
      renderHomeEventList([], MONTHS_TR[calMonth]+' '+calYear+' — Etkinlik Yok');
    }
  }

  el('cal-prev').addEventListener('click', () => changeMonth(-1));
  el('cal-next').addEventListener('click', () => changeMonth(1));
}

    const e = {...snap.data(), id: snap.id};
    const feeBg = e.fee>0?'rgba(59,124,255,.12)':'rgba(34,208,120,.12)';
    const feeCol = e.fee>0?'#7db4ff':'#22d078';
    const feeLabel = e.fee>0?('₺'+e.fee):'Ücretsiz';
    const date = e.eventDate?.toDate ? e.eventDate.toDate().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';

        </div>

        <div>
          <div style="font-size:12px;color:#7c87a0">Düzenleyen</div>

        </div>
        <div style="text-align:right">
          <div style="font-size:${spots<=0?12:18}px;font-weight:700;color:${spots<=0?'#ff7070':spots<=5?'#f0a429':'#22d078'}">${spots<=0?'Dolu':spots+' yer kaldı'}</div>

async function loadEventsList() {
  const listEl = el('events-list');
  if (!listEl) return;
  listEl.innerHTML = '<div class="loading"><div class="spinner"></div>Yükleniyor...</div>';
  try {
    var nowTs2 = Timestamp.fromDate(new Date());
    let q = query(collection(db,'public_events'), where('status','==','published'), where('eventDate','>=',nowTs2));
    const snap = await getDocs(q);
    let docs = snap.docs.map(d => ({...d.data(), id:d.id}));
    // Client-side sırala (eventDate'e göre)
    docs.sort((a,b) => (a.eventDate?.seconds||0) - (b.eventDate?.seconds||0));

    // Filtrele
    const search = el('ev-search')?.value?.toLowerCase()||'';
    const cat = el('ev-cat')?.value||'';
    const format = el('ev-format')?.value||'';
    const free = el('ev-free')?.checked||false;
    if (search) docs = docs.filter(e => e.title?.toLowerCase().includes(search) || e.productName?.toLowerCase().includes(search));
    if (cat) docs = docs.filter(e => e.category===cat);
    if (format) docs = docs.filter(e => e.format===format);
    const langF = el('ev-lang-filter')?.value||'';
    if (langF) docs = docs.filter(e => e.language===langF);
    if (free) docs = docs.filter(e => !e.fee || e.fee===0);

    if (!docs.length) {
      listEl.innerHTML = '<div class="empty"><div class="empty-icon">📅</div>Kriterlere uygun etkinlik bulunamadı.</div>';
      return;
    }

    listEl.innerHTML = docs.map(e => {
      const date = e.eventDate?.toDate ? e.eventDate.toDate().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}) : '—';
      const spots = e.capacity - (e.registeredCount||0);
      const feeBg = e.fee>0?'rgba(59,124,255,.12)':'rgba(34,208,120,.12)';
      const feeCol = e.fee>0?'#7db4ff':'#22d078';
      const feeLabel = e.fee>0?('₺'+e.fee):'Ücretsiz';
      return `<div class="card" style="margin-bottom:10px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start">
        <div>
          <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center">
            <span class="bdg" style="background:#1c1f2a;color:#7c87a0">${e.category||'—'}</span>
            <span class="bdg" style="background:rgba(59,124,255,.12);color:#7db4ff">${e.format||'Online'}</span>
            <span class="bdg" style="background:${feeBg};color:${feeCol}">${feeLabel}</span>
          </div>
          <div style="font-size:15px;font-weight:700;margin-bottom:5px
            ${e.language?('<span class="bdg" style="background:rgba(139,92,246,.12);color:#c4a8ff">'+langLabel(e.language)+'</span>'):''}">${e.title}</div>
          <div style="font-size:12.5px;color:#7c87a0;margin-bottom:5px">${e.vendorName||'—'} · ${e.productName||'—'}</div>
          <div style="font-size:12px;color:#5a6278">📅 ${date}${e.location?' · 📍 '+e.location:''}</div>
          ${e.description ? `<p style="font-size:12.5px;color:#9ca3af;margin-top:8px;line-height:1.6">${e.description}</p>` : ''}
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:12px;color:${spots<=0?'#ff7070':spots<=5?'#f0a429':'#22d078'};margin-bottom:8px;font-weight:600">${spots<=0?'Dolu':spots+' yer kaldı'}</div>
          <div style="background:#1c1f2a;border-radius:5px;height:4px;width:100px;margin-left:auto;margin-bottom:10px">
            <div style="background:#3b7cff;height:100%;width:${Math.min(100,((e.registeredCount||0)/e.capacity)*100)}%;border-radius:5px"></div>
          </div>
          <button class="btn-p btn-sm ev-reg-btn" data-id="${e.id}" data-title="${e.title}" data-vendor-email="${e.vendorEmail||''}" data-vendor-name="${e.vendorName||''}">${CUR_USER?'Kayıt Ol':'Giriş Yap & Kayıt Ol'}</button>

    listEl.querySelectorAll('.ev-reg-btn').forEach(b => b.addEventListener('click', () => {
      if (!CUR_USER) { openAuthModal('customer',''); return; }
      registerForEvent(b.dataset.id, b, b.dataset.vendorEmail, b.dataset.vendorName, b.dataset.title);
    }));
  } catch(e) {
    listEl.innerHTML = `<div class="empty">Yükleme hatası: ${e.message}</div>`;
  }
}

async function registerForEvent(eventId, btn, vendorEmail, vendorName, eventTitle) {
  btn.disabled = true;
  btn.textContent = 'Kaydediliyor...';
  try {
    // Zaten kayıtlı mı?
    const regSnap = await getDocs(query(collection(db,'registrations'), where('eventId','==',eventId), where('userId','==',CUR_USER.uid)));
    if (!regSnap.empty) { showToast('Bu etkinliğe zaten kayıtlısınız.','err'); btn.disabled=false; btn.textContent='Kayıtlısınız'; return; }

    await addDoc(collection(db,'registrations'), {
      eventId, userId: CUR_USER.uid,
      userEmail: CUR_USER.email,
      userName: CUR_PROFILE?.displayName||CUR_USER.email,
      userCompany: CUR_PROFILE?.company||'',
      status: 'registered',
      createdAt: serverTimestamp()
    });
    // Kayıt sayısını artır
    const evRef = doc(db,'public_events',eventId);
    const evSnap = await getDoc(evRef);
    if (evSnap.exists()) {
      await updateDoc(evRef, {registeredCount: (evSnap.data().registeredCount||0)+1});
    }
    btn.textContent = '✓ Kayıtlısınız';
    btn.style.background = '#157a46';
    showToast('Etkinliğe başarıyla kayıt oldunuz!');

    // Müşteriye mail
    sendEmail(CUR_USER.email, CUR_PROFILE?.displayName||'', 'Etkinlik Kaydınız Onaylandı',
      `"${eventTitle||eventId}" etkinliğine kaydınız alındı.`,
      `Etkinlik detayları yakında e-postanıza iletilecektir.`);
    // Vendor'a bildirim
    if (vendorEmail) sendEmail(vendorEmail, vendorName||'Vendor',
      'Yeni Etkinlik Kaydı',
      `${CUR_PROFILE?.displayName||CUR_USER.email} (${CUR_PROFILE?.company||''}) etkinliğinize kayıt oldu.`,
      `Etkinlik: ${eventTitle}`);
  } catch(e) {
    showToast('Kayıt sırasında hata: '+e.message,'err');
    btn.disabled = false; btn.textContent = 'Kayıt Ol';
  }
}

    if (trFirst) prods.sort((a,b) => a.country==='TR'?-1:b.country==='TR'?1:0);

    if (!prods.length) {
      gridEl.innerHTML = '<div class="empty"><div class="empty-icon">📦</div>Ürün bulunamadı.</div>';

    }
      // Katalog çoklu seçim state
  const catSelectedIds = new Set();

      const cb = card.querySelector('.prod-select-cb');

    });
  }

  gridEl.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px">${
    prods.map(p => `<div class="card prod-card" data-id="${p.id}" style="display:flex;flex-direction:column;transition:all .15s;cursor:default">

      ${p.specs?`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px">${
        Object.entries(p.specs).slice(0,4).map(([k,v])=>`<span style="background:#1c1f2a;border:1px solid rgba(255,255,255,.1);border-radius:4px;padding:2px 7px;font-size:11px"><span style="color:#7c87a0">${k}:</span> ${v}</span>`).join('')

      <button class="btn-p btn-sm poc-req-btn" data-id="${p.id}">
        PoC Talebi Oluştur →
      </button>
    </div>`).join('')
  }</div>`;

  // Checkbox listener
  gridEl.querySelectorAll('.prod-select-cb').forEach(cb => {
    cb.addEventListener('change', () => {
      if (cb.checked) catSelectedIds.add(cb.dataset.id);
      else catSelectedIds.delete(cb.dataset.id);
      updateCatSelUI();
    });
  });

  // "Seçilenlerle PoC Başlat" butonu

    gridEl.querySelectorAll('.poc-req-btn').forEach(b => b.addEventListener('click', () => {

function openEditPocModal(pocId, title, requirements, preferredDates, location) {

  modal.className = 'modal-bg on';
  modal.innerHTML = `<div class="modal" style="max-width:500px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h3 style="font-size:15px;font-weight:700">PoC Talebi Düzenle</h3>

    </div>
    <div style="background:rgba(240,164,41,.1);border:1px solid rgba(240,164,41,.2);border-radius:7px;padding:9px 12px;font-size:12px;color:#f0a429;margin-bottom:14px">
      ℹ Sadece bekleyen (Pending) talepler düzenlenebilir. Vendor'a yeni bildirim gönderilir.

    <label class="lbl">PoC Başlığı *</label>
    <input class="inp" id="edit-title" value="${title||''}">
    <label class="lbl">Gereksinimler / Notlar</label>
    <textarea class="inp" id="edit-req" rows="3" style="resize:none">${requirements||''}</textarea>
    <label class="lbl">Tercih Edilen Tarih Aralığı</label>
    <input class="inp" id="edit-dates" value="${preferredDates||''}">
    <label class="lbl">PoC Lokasyonu</label>
    <select class="inp" id="edit-loc">
      <option value="customer" ${location==='customer'?'selected':''}>Müşteri Lokasyonu</option>
      <option value="vendor" ${location==='vendor'?'selected':''}>Vendor Lokasyonu</option>
      <option value="online" ${location==='online'?'selected':''}>Online / Uzaktan</option>
      <option value="hybrid" ${location==='hybrid'?'selected':''}>Hibrit</option>
    </select>
    <div id="edit-err" style="margin-top:10px"></div>
    <button class="btn-p" id="edit-submit" style="width:100%;padding:11px;font-size:14px;margin-top:14px">Güncelle</button>
  </div>`;
  document.body.appendChild(modal);
  modal.querySelector('#close-edit-poc').addEventListener('click', () => modal.remove());
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });

  modal.querySelector('#edit-submit').addEventListener('click', async () => {
    const newTitle = modal.querySelector('#edit-title').value.trim();
    if (!newTitle) { modal.querySelector('#edit-err').innerHTML='<div class="alert alert-err">Başlık zorunludur.</div>'; return; }
    const btn = modal.querySelector('#edit-submit');
    btn.disabled=true; btn.textContent='Güncelleniyor...';
    try {
      // Mevcut talebi al (vendor bilgisi için)
      const pocSnap = await getDoc(doc(db,'poc_requests',pocId));
      const pocData = pocSnap.data();

      await updateDoc(doc(db,'poc_requests',pocId), {
        title: newTitle,
        requirements: modal.querySelector('#edit-req').value,
        preferredDates: modal.querySelector('#edit-dates').value,
        location: modal.querySelector('#edit-loc').value,
        updatedAt: serverTimestamp()
      });

      // Vendor'a güncelleme bildirimi
      if (pocData?.vendorEmail) {
        const locLbl = {customer:'Müşteri Lokasyonu',vendor:'Vendor Lokasyonu',online:'Online',hybrid:'Hibrit'};
        sendEmail(pocData.vendorEmail, pocData.vendorName||'', 'PoC Talebi Güncellendi — PoCHub',
          `${CUR_PROFILE?.displayName||CUR_USER.email} PoC talebini güncelledi.`,
          `Ürün: ${pocData.productName}\nYeni Başlık: ${newTitle}\nGereksinimler: ${modal.querySelector('#edit-req').value||'-'}\nLokasyon: ${locLbl[modal.querySelector('#edit-loc').value]}`
        );
      }

      modal.remove();
      showToast('Talep güncellendi!');
      loadCustTab();
    } catch(e) {
      modal.querySelector('#edit-err').innerHTML=`<div class="alert alert-err">${e.message}</div>`;
      btn.disabled=false; btn.textContent='Güncelle';
    }
  });
}

/* ── MÜŞTERİ GELEN DAVETLER ── */
async function custInvites(m) {
  const snap = await getDocs(query(collection(db,'poc_invites'),
    where('customerEmail','==',CUR_USER.email),
    where('status','==','pending')
  ));
  var invites = snap.docs.map(d=>({...d.data(),id:d.id}));
  invites.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  // Kabul edilmiş eski davetleri de göster
  const acceptedSnap = await getDocs(query(collection(db,'poc_invites'),
    where('customerEmail','==',CUR_USER.email),
    where('status','in',['accepted','declined'])
  ));
  var pastInvites = acceptedSnap.docs.map(d=>({...d.data(),id:d.id}));
  pastInvites.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  var allInvites = invites.concat(pastInvites);

  var statusLabels = {pending:'Bekliyor',accepted:'Kabul Edildi',declined:'Reddedildi'};
  var statusColors = {pending:'#f0a429',accepted:'#22d078',declined:'#ff7070'};

  m.innerHTML =
    '<div style="margin-bottom:16px">' +
    '<h2 style="font-size:18px;font-weight:700">Gelen PoC Davetleri</h2>' +
    '<div style="font-size:12.5px;color:#7c87a0;margin-top:3px">Vendorların size gönderdiği PoC davetleri. Kabul ettiğinizde otomatik PoC talebi oluşturulur.</div>' +
    '</div>' +
    (invites.length > 0 ?
      '<div style="background:rgba(240,164,41,.08);border:1px solid rgba(240,164,41,.2);border-radius:8px;padding:10px 14px;font-size:12.5px;color:#f0a429;margin-bottom:14px">' +
      '🔔 '+invites.length+' bekleyen davetiniz var' +
      '</div>' : '') +
    (!allInvites.length ?
      '<div class="empty"><div class="empty-icon">📨</div>Henüz davet almadınız.</div>' :
      allInvites.map(function(inv) {
        var sc = statusColors[inv.status]||'#7c87a0';
        var sl = statusLabels[inv.status]||inv.status;
        var isPending = inv.status === 'pending';
        return '<div class="card" style="margin-bottom:12px;border:1px solid rgba(255,255,255,'+(isPending?'.15':'.06')+')">' +
          '<div style="display:flex;align-items:start;justify-content:space-between;gap:12px;margin-bottom:12px">' +
          '<div style="display:flex;gap:12px;align-items:center">' +
          '<div style="width:42px;height:42px;border-radius:50%;background:rgba(59,124,255,.15);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">🏢</div>' +
          '<div>' +
          '<div style="font-size:14px;font-weight:700">'+(inv.vendorName||'—')+'</div>' +
          '<div style="font-size:12px;color:#7c87a0">'+({ureticid:'Üretici',distributor:'Distribütör',integrator:'Entegratör'}[inv.vendorType]||inv.vendorType||'Vendor')+' · '+fmt(inv.createdAt)+'</div>' +
          '</div></div>' +
          '<span class="bdg" style="background:'+sc+'22;color:'+sc+';flex-shrink:0">'+sl+'</span>' +
          '</div>' +
          '<div style="background:#1c1f2a;border-radius:8px;padding:12px;margin-bottom:12px">' +
          '<div style="font-size:11.5px;color:#5a6278;margin-bottom:4px">Davet Edilen Ürün</div>' +
          '<div style="font-size:13.5px;font-weight:700">'+(inv.productName||'—')+'</div>' +
          (inv.productCategory?'<div style="font-size:12px;color:#7c87a0;margin-top:2px">'+inv.productCategory+'</div>':'') +
          '</div>' +
          '<div style="font-size:13px;color:#b0bac9;line-height:1.6;margin-bottom:12px;white-space:pre-wrap">'+(inv.message||'')+'</div>' +
          (isPending ?
            '<div style="display:flex;gap:8px">' +
            '<button class="btn-p" style="flex:1;padding:10px" data-inv-id="'+inv.id+'" data-prod-id="'+(inv.productId||'')+'" data-prod-name="'+(inv.productName||'')+'" data-prod-cat="'+(inv.productCategory||'')+'" data-vendor-id="'+(inv.vendorId||'')+'" data-vendor-name="'+(inv.vendorName||'')+'" data-vendor-email="'+(inv.vendorEmail||'')+'" data-vendor-type="'+(inv.vendorType||'')+'" data-loc="'+(inv.location||'online')+'" data-inv-accept>✅ Kabul Et & PoC Başlat</button>' +
            '<button class="btn-red" style="padding:10px 18px" data-inv-id="'+inv.id+'" data-inv-decline>Reddet</button>' +
            '</div>' :
            (inv.status==='accepted' && inv.pocRequestId ?
              '<button class="btn-g btn-sm" data-poc-id="'+inv.pocRequestId+'" data-inv-view-poc>📋 PoC Sürecini Gör</button>' : '')
          ) +
          '</div>';
      }).join('')
    );

  // Kabul et
  m.querySelectorAll('[data-inv-accept]').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      if (!confirm('Bu daveti kabul edip PoC süreci başlatmak istiyor musunuz?')) return;
      btn.disabled=true; btn.textContent='İşleniyor...';
      try {
        // PoC talebi oluştur
        var pocRef = await addDoc(collection(db,'poc_requests'), {
          customerId:     CUR_USER.uid,
          customerName:   CUR_PROFILE?.displayName||CUR_USER.email,
          customerEmail:  CUR_USER.email,
          customerCompany:CUR_PROFILE?.company||'',
          vendorId:       btn.dataset.vendorId,
          vendorName:     btn.dataset.vendorName,
          vendorEmail:    btn.dataset.vendorEmail,
          vendorType:     btn.dataset.vendorType,
          productId:      btn.dataset.prodId,
          productName:    btn.dataset.prodName,
          category:       btn.dataset.prodCat,
          title:          btn.dataset.prodName+' PoC Talebi',
          requirements:   '',
          location:       btn.dataset.loc,
          status:         'active',
          source:         'invite',
          acceptedAt:     serverTimestamp(),
          createdAt:      serverTimestamp(),
        });

        // Davet kaydını güncelle
        await updateDoc(doc(db,'poc_invites',btn.dataset.invId), {
          status:       'accepted',
          pocRequestId: pocRef.id,
          acceptedAt:   serverTimestamp(),
        });

        // Vendor'a bildirim maili
        if (btn.dataset.vendorEmail) {
          sendEmail(btn.dataset.vendorEmail, btn.dataset.vendorName, 'PoC Daveti Kabul Edildi — PoCHub', (CUR_PROFILE?.displayName||CUR_USER.email)+' davetinizi kabul etti! Urun: '+btn.dataset.prodName, '');
        }

        showToast('Davet kabul edildi! PoC süreci başlatıldı.');
        CUR_CUST_TAB = 'requests';
        loadCustTab();
      } catch(e) {
        showToast('Hata: '+e.message, 'err');
        btn.disabled=false; btn.textContent='✅ Kabul Et & PoC Başlat';
      }
    });
  });

  // Reddet
  m.querySelectorAll('[data-inv-decline]').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      if (!confirm('Bu daveti reddetmek istiyor musunuz?')) return;
      await updateDoc(doc(db,'poc_invites',btn.dataset.invId), {
        status:'declined', declinedAt:serverTimestamp()
      });
      showToast('Davet reddedildi.');
      custInvites(m);
    });
  });

  // PoC görüntüle
  m.querySelectorAll('[data-inv-view-poc]').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      var pocDoc = await getDoc(doc(db,'poc_requests',btn.dataset.pocId));
      if (pocDoc.exists()) openPocTimeline({...pocDoc.data(), id:btn.dataset.pocId});
    });
  });
}

    '</div>' +

    '<select class="inp" id="pam-dur"><option value="60">1 Saat</option><option value="90">1.5 Saat</option><option value="120" selected>2 Saat</option><option value="180">3 Saat</option><option value="240">Tam Gün</option></select>' +
    '<label class="lbl" style="margin-top:12px">Vendor Notu (müşteriye iletilir)</label>' +

  modal.querySelector('#pam-submit').addEventListener('click', async function() {
    var dv = modal.querySelector('#pam-date').value;
    var tv = modal.querySelector('#pam-time').value||'10:00';
    var dur = parseInt(modal.querySelector('#pam-dur').value)||120;
    var note = modal.querySelector('#pam-note').value.trim();
    if (!dv) { modal.querySelector('#pam-err').innerHTML='<div class="alert alert-err">PoC tarihi zorunludur.</div>'; return; }
    var btn = modal.querySelector('#pam-submit');
    btn.disabled=true; btn.textContent='Kaydediliyor...';

        status:'active', acceptedAt:serverTimestamp(),
        scheduledDate:Timestamp.fromDate(sched),

        });

      showToast('PoC kabul edildi! Tarih: '+sched.toLocaleDateString('tr-TR'));
      loadVendTab();
    } catch(e) {
      modal.querySelector('#pam-err').innerHTML='<div class="alert alert-err">'+e.message+'</div>';
      btn.disabled=false; btn.textContent='✅ Kabul Et & Tarihi Onayla';
    }
  });
}

    var reopenLabels = {
      no:'Kalıcı iptal', '1month':'1 ay sonra', '3month':'3 ay sonra',
      '6month':'6 ay sonra', yes:'En kısa sürede'
    };

    try {
      await updateDoc(doc(db,'poc_requests',pocId), {
        status:          'cancelled',
        cancelledAt:     serverTimestamp(),
        cancelReason:    reason,
        cancelCategory:  cat,
        cancelCategoryLabel: catLabels[cat]||cat,
        reopenRequest:   reopen,
        reopenLabel:     reopenLabels[reopen]||reopen,
      });

      // Vendor'a bildirim maili
      if (vendorEmail) {
        sendEmail(vendorEmail, vendorName||'',
          'PoC Talebi İptal Edildi — PoCHub',
          'Müşteri "'+( pocTitle||'PoC')+'" talebini iptal etti. Neden: '+reason+' Kategori: '+( catLabels[cat]||cat)+'. Yeniden görüşme: '+(reopenLabels[reopen]||reopen),
          'pochub.co uzerinden detaylara ulasabilirsiniz.'
        );
      }

      // Vendor panelinde iptal mesajı görünsün diye poc_cancellations kaydı
      await addDoc(collection(db,'poc_messages'), {
        pocId:    pocId,
        senderId: CUR_USER.uid,
        senderName: CUR_PROFILE?.displayName||CUR_USER.email,
        senderRole: 'customer',
        text:     '[İPTAL BİLDİRİMİ] Neden: '+reason+' | Kategori: '+(catLabels[cat]||cat)+' | Yeniden görüşme: '+(reopenLabels[reopen]||reopen),
        type:     'cancellation',
        createdAt: serverTimestamp(),
      });

      modal.remove();
      showToast('PoC talebi iptal edildi.');
      if (typeof onSuccess === 'function') onSuccess();
    } catch(e) {
      modal.querySelector('#pcm-err').innerHTML='<div class="alert alert-err">'+e.message+'</div>';
      submitBtn.disabled=false; submitBtn.textContent='İptal Et';
    }
  });
}


function openPocTimeline(poc) {
  var modal = document.createElement('div');
  modal.className = 'modal-bg on';

  // Adımları tanımla
  var steps = [
    {
      key:'created', icon:'📋', label:'Talep Oluşturuldu',
      sub: poc.productName ? ('"'+poc.productName+'" için talep gönderildi') : 'Talep gönderildi',
      ts: poc.createdAt, done: true
    },
    {
      key:'accepted', icon:'✅', label:'Vendor Kabul Etti',
      sub: poc.vendorName ? (poc.vendorName+' talebinizi inceliyor/kabul etti') : 'Vendor inceliyor',
      ts: poc.acceptedAt||null, done: ['active','offer_sent','completed'].includes(poc.status)
    },
    {
      key:'poc_started', icon:'🔬', label:'Tarih Belirlendi & PoC Başladı',
      sub: poc.scheduledDate?.toDate ?
        '📅 '+poc.scheduledDate.toDate().toLocaleDateString('tr-TR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+
        ' '+poc.scheduledDate.toDate().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})+
        (poc.scheduledDuration?' ('+Math.floor(poc.scheduledDuration/60)+'s '+( poc.scheduledDuration%60?poc.scheduledDuration%60+'dk':'')+')'  : '') :
        (poc.vendorNote ? poc.vendorNote : 'Vendor tarih belirlemedi'),
      ts: poc.scheduledDate||poc.acceptedAt||null,
      done: ['active','offer_sent','completed'].includes(poc.status) && (poc.scheduledDate || poc.acceptedAt)
    },
    {
      key:'offer', icon:'💼', label:'Teklif Gönderildi',
      sub: poc.offerAmount ? ('₺'+poc.offerAmount.toLocaleString('tr-TR')+' teklif alındı') : 'Teklif bekleniyor',
      ts: poc.offerSentAt||null, done: ['offer_sent','completed'].includes(poc.status)
    },
    {
      key:'decision', icon:'🏁', label:'Karar Verildi',
      sub: poc.status==='completed'?'PoC tamamlandı':
           poc.status==='cancelled'?(poc.cancelReason?('İptal: '+poc.cancelReason.substring(0,60)+(poc.cancelReason.length>60?'...':'')):('Talep iptal edildi'+(poc.cancelCategoryLabel?' — '+poc.cancelCategoryLabel:''))):
           'Kararınız bekleniyor',
      ts: poc.completedAt||poc.cancelledAt||null,
      done: ['completed','cancelled'].includes(poc.status)
    },
  ];

  // Aktif adımı bul
  var activeIdx = steps.findIndex(function(s){return !s.done;});
  if (activeIdx === -1) activeIdx = steps.length - 1;

  var statusColors = {
    pending:'#f0a429', active:'#3b7cff', completed:'#22d078',
    cancelled:'#ff7070', rejected:'#ff7070', offer_sent:'#c4a8ff'
  };
  var statusCol = statusColors[poc.status]||'#7c87a0';

  modal.innerHTML =
    '<div class="modal" style="max-width:480px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">' +
    '<div>' +
    '<h3 style="font-size:15px;font-weight:700;margin-bottom:4px">'+(poc.title||poc.productName||'PoC Talebi')+'</h3>' +
    '<span class="bdg" style="background:'+statusCol+'22;color:'+statusCol+'">'+statusBadge(poc.status).replace(/<[^>]+>/g,'')+'</span>' +
    '</div>' +
    '<button id="ptl-close" style="background:none;border:none;color:#7c87a0;cursor:pointer;font-size:20px">×</button>' +
    '</div>' +

    // Vendor bilgisi
    (poc.vendorName ? '<div style="background:#1c1f2a;border-radius:8px;padding:12px 14px;margin-bottom:18px;display:flex;align-items:center;gap:12px">' +
    '<div style="width:36px;height:36px;border-radius:50%;background:rgba(59,124,255,.15);display:flex;align-items:center;justify-content:center;font-size:16px">🏢</div>' +
    '<div><div style="font-size:12px;color:#5a6278">Vendor</div><div style="font-size:13px;font-weight:700">'+(poc.vendorName)+'</div></div>' +
    (poc.vendorType ? '<span class="bdg" style="background:rgba(59,124,255,.12);color:#7db4ff;margin-left:auto">'+({ureticid:'Üretici',distributor:'Distribütör',integrator:'Entegratör'}[poc.vendorType]||poc.vendorType)+'</span>' : '') +
    '</div>' : '') +

    // Timeline
    '<div class="poc-timeline">' +
    steps.map(function(step, i) {
      var isDone = step.done;
      var isActive = i === activeIdx && !isDone;
      var dotClass = isDone ? 'done' : isActive ? 'active' : 'wait';
      var titleColor = isDone ? '#22d078' : isActive ? '#3b7cff' : '#5a6278';
      return '<div class="poc-tl-step">' +
        '<div class="poc-tl-dot '+dotClass+'">'+(isDone?'✓':isActive?'→':step.icon)+'</div>' +
        '<div class="poc-tl-content">' +
        '<div class="poc-tl-title" style="color:'+titleColor+'">'+step.label+'</div>' +
        '<div class="poc-tl-sub">'+step.sub+'</div>' +
        (step.ts ? '<div class="poc-tl-time">'+fmt(step.ts)+'</div>' : '') +
        '</div></div>';
    }).join('') +
    '</div>' +

    // Chat butonu
    (poc.id && poc.vendorId ? '<button class="btn-p" id="ptl-chat" style="width:100%;padding:10px;margin-top:18px">💬 Vendor ile Mesajlaş</button>' : '') +
    '</div>';

  document.body.appendChild(modal);
  modal.querySelector('#ptl-close').addEventListener('click', function(){modal.remove();});
  modal.addEventListener('click', function(e){if(e.target===modal)modal.remove();});
  modal.querySelector('#ptl-chat')?.addEventListener('click', function(){
    modal.remove();
    openChatModal(poc.id, poc.vendorId, poc.vendorName||'Vendor', poc.productName||'PoC');
  });
}

  </div>`;

  document.body.appendChild(modal);
  modal.querySelector('#close-multi-poc').addEventListener('click', () => modal.remove());
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
  modal.querySelector('#poc-back1')?.addEventListener('click', () => {

    modal.querySelector('#poc-step1').style.display='block';

  modal.querySelector('#poc-back2')?.addEventListener('click', () => {

  // Kategorileri yükle
  let allProducts = [];
  let selectedVendors = []; // [{productId, productName, vendorId, vendorName, vendorEmail, vendorType}]
  let selectedCat = '';

  try {
    const snap = await getDocs(query(collection(db,'products'), where('status','==','active')));
    allProducts = snap.docs.map(d => ({...d.data(), id:d.id}));

    const firestoreCats = await getCategories();
    const prodCatNames = new Set(allProducts.map(p=>p.category).filter(Boolean));
    const cats = [...new Set([...firestoreCats.map(function(c){return c.name;}), ...prodCatNames])];
    const catsEl = modal.querySelector('#poc-cats');
    catsEl.innerHTML = cats.map(cat => {
      const count = allProducts.filter(p=>p.category===cat).length;
      return `<button class="cat-sel-btn" data-cat="${cat}" style="background:#1c1f2a;border:1px solid rgba(255,255,255,.1);border-radius:9px;padding:14px;cursor:pointer;font:inherit;color:#e9ecf3;text-align:left;transition:.1s">

        <div style="font-size:11.5px;color:#7c87a0">${count} ürün</div>
      </button>`;
    }).join('');

    catsEl.querySelectorAll('.cat-sel-btn').forEach(b => b.addEventListener('click', () => {
      selectedCat = b.dataset.cat;
      selectedVendors = [];
      showProductStep(allProducts.filter(p=>p.category===selectedCat));
      modal.querySelector('#poc-step1').style.display='none';
      modal.querySelector('#poc-step2').style.display='block';
    }));

    // Pre-select varsa — tek veya çoklu
    if (preSelectProductId || (preSelectedIds && preSelectedIds.length)) {
      const refId = preSelectProductId || preSelectedIds[0];
      const preP = allProducts.find(p=>p.id===refId);
      if (preP) {
        selectedCat = preP.category;
        showProductStep(allProducts.filter(p=>p.category===selectedCat));
        modal.querySelector('#poc-step1').style.display='none';
        modal.querySelector('#poc-step2').style.display='block';
        // Seçili ürünleri işaretle
        setTimeout(() => {
          const idsToSelect = preSelectedIds?.length ? preSelectedIds : [preSelectProductId];
          idsToSelect.forEach(id => {
            const cb = modal.querySelector(`[data-pid="${id}"]`);
            if (cb) { cb.checked=true; }
          });
          updateSelection();
        }, 100);
      }
    }
  } catch(e) {
    modal.querySelector('#poc-cats').innerHTML = `<div class="empty">Yükleme hatası: ${e.message}</div>`;
  }

  function showProductStep(products) {
    const prodsEl = modal.querySelector('#poc-products');
    const vtypeLabels = {ureticid:'Üretici',distributor:'Distribütör',integrator:'Entegratör'};
    const vtypeBg = {ureticid:'rgba(59,124,255,.12)',distributor:'rgba(139,92,246,.12)',integrator:'rgba(240,164,41,.12)'};
    const vtypeCol = {ureticid:'#7db4ff',distributor:'#c4a8ff',integrator:'#f0a429'};

    prodsEl.innerHTML = products.map(p => `
      <label style="display:flex;align-items:center;gap:12px;padding:13px 14px;background:#1c1f2a;border:1px solid rgba(255,255,255,.1);border-radius:9px;cursor:pointer;transition:.1s" class="prod-label">
        <input type="checkbox" class="prod-cb" data-pid="${p.id}" data-pname="${(p.name||'').replace(/"/g,'')}" data-vid="${p.vendorId}" data-vname="${(p.vendorName||'').replace(/"/g,'')}" data-vemail="${p.vendorEmail||''}" data-vtype="${p.vendorType||''}" style="width:16px;height:16px;cursor:pointer;flex-shrink:0">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:13px;font-weight:700">${p.name}</span>
            <span class="bdg" style="background:${vtypeBg[p.vendorType]||'#1c1f2a'};color:${vtypeCol[p.vendorType]||'#7c87a0'}">${vtypeLabels[p.vendorType]||'Vendor'}</span>
          </div>
          <div style="font-size:12px;color:#7c87a0">${p.vendorName||'—'}${p.country?' · '+p.country:''}</div>
          ${p.description?`<div style="font-size:11.5px;color:#5a6278;margin-top:3px;line-height:1.5">${p.description.substring(0,80)}...</div>`:''}
        </div>
        ${p.specs?`<div style="flex-shrink:0;text-align:right">${Object.entries(p.specs).slice(0,2).map(([k,v])=>`<div style="font-size:11px;color:#5a6278">${k}: <b style="color:#7c87a0">${v}</b></div>`).join('')}</div>`:''}
      </label>`).join('');

    prodsEl.querySelectorAll('.prod-cb').forEach(cb => cb.addEventListener('change', updateSelection));
    prodsEl.querySelectorAll('.prod-label').forEach(lbl => {
      lbl.addEventListener('mouseenter', () => lbl.style.borderColor='rgba(59,124,255,.3)');
      lbl.addEventListener('mouseleave', () => lbl.style.borderColor='rgba(255,255,255,.1)');
    });
  }

  function updateSelection() {
    selectedVendors = [];
    modal.querySelectorAll('.prod-cb:checked').forEach(cb => {
      selectedVendors.push({
        productId: cb.dataset.pid,
        productName: cb.dataset.pname,
        vendorId: cb.dataset.vid,
        vendorName: cb.dataset.vname,
        vendorEmail: cb.dataset.vemail,
        vendorType: cb.dataset.vtype,
      });
    });
    const countEl = modal.querySelector('#poc-sel-count');
    if (countEl) countEl.textContent = selectedVendors.length;
    const nextBtn = modal.querySelector('#poc-next2');
    if (nextBtn) nextBtn.disabled = selectedVendors.length === 0;

    // Seçili label'ları vurgula
    modal.querySelectorAll('.prod-label').forEach(lbl => {
      const cb = lbl.querySelector('.prod-cb');
      lbl.style.borderColor = cb?.checked ? '#3b7cff' : 'rgba(255,255,255,.1)';
      lbl.style.background = cb?.checked ? 'rgba(59,124,255,.08)' : '#1c1f2a';
    });
  }

  modal.querySelector('#poc-next2')?.addEventListener('click', () => {
    if (selectedVendors.length === 0) return;
    // Özet göster
    const sumEl = modal.querySelector('#poc-sel-summary');
    const vtypeLabels = {ureticid:'Üretici',distributor:'Distribütör',integrator:'Entegratör'};
    sumEl.innerHTML = `<div style="font-size:11.5px;color:#7c87a0;margin-bottom:8px">Seçilen ${selectedVendors.length} vendor'a talep gönderilecek:</div>`
      + selectedVendors.map(v=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.06)">
          <div style="width:6px;height:6px;border-radius:50%;background:#3b7cff;flex-shrink:0"></div>
          <span style="font-weight:600">${v.productName}</span>
          <span style="color:#7c87a0;font-size:11.5px">— ${v.vendorName}</span>
          <span class="bdg" style="background:rgba(59,124,255,.1);color:#7db4ff;margin-left:auto">${vtypeLabels[v.vendorType]||''}</span>
        </div>`).join('');
    modal.querySelector('#poc-step2').style.display='none';
    modal.querySelector('#poc-step3').style.display='block';
  });

  // Tarih değişince çakışma kontrolü
  modal.querySelector('#poc-date1')?.addEventListener('change', async function() {
    var dateVal = this.value;
    var warnEl = modal.querySelector('#poc-conflict-warn');
    if (!warnEl) return;
    if (!dateVal || !selectedVendors.length) { warnEl.style.display='none'; return; }
    var conflicts = [];
    for (var sv of selectedVendors) {
      try {
        var cSnap = await getDocs(query(collection(db,'poc_requests'), where('vendorId','==',sv.vendorId)));
        cSnap.docs.forEach(function(d) {
          var pd = d.data();
          if (!['pending','active','offer_sent'].includes(pd.status)) return;
          if (pd.preferredDates && pd.preferredDates.includes(dateVal))
            conflicts.push(sv.vendorName+': bu tarihte talep var');
          if (pd.scheduledDate?.toDate && pd.scheduledDate.toDate().toISOString().split('T')[0]===dateVal)
            conflicts.push(sv.vendorName+': '+dateVal+' tarihinde planlanmış PoC');
        });
      } catch(e) {}
    }
    if (conflicts.length) {
      warnEl.style.display='block';
      warnEl.innerHTML='⚠ <b>Çakışma Uyarısı</b><br>'+conflicts.join('<br>')+'<br><span style="font-size:11px">Devam edebilirsiniz — vendor bu uyarıyı görecek.</span>';
    } else { warnEl.style.display='none'; }
  });

  modal.querySelector('#poc-submit')?.addEventListener('click', async () => {
    const title = modal.querySelector('#poc-title')?.value?.trim();
    if (!title) {
      modal.querySelector('#poc-err').innerHTML='<div class="alert alert-err">Başlık zorunludur.</div>';
      return;
    }
    const isVerifiedForPoc = CUR_USER?.emailVerified || CUR_PROFILE?.emailVerified === true;
    if (!isVerifiedForPoc) {
      modal.querySelector('#poc-err').innerHTML='<div class="alert alert-err">PoC talebi oluşturmadan önce e-posta doğrulaması gereklidir.</div>';
      return;
    }

    const btn = modal.querySelector('#poc-submit');
    btn.disabled=true; btn.textContent='Gönderiliyor...';

    const requirements = modal.querySelector('#poc-req')?.value||'';
    const date1 = modal.querySelector('#poc-date1')?.value||'';
    const time1 = modal.querySelector('#poc-time1')?.value||'10:00';
    const date2 = modal.querySelector('#poc-date2')?.value||'';
    const time2 = modal.querySelector('#poc-time2')?.value||'14:00';
    const preferredDates = date1 ? (date1+'T'+time1+(date2?(' / '+date2+'T'+time2):'')) : '';
    const location = modal.querySelector('#poc-location')?.value||'customer';
    const locLabels = {customer:'Müşteri Lokasyonu',vendor:'Vendor Lokasyonu',online:'Online',hybrid:'Hibrit'};

    // Tarih zorunlu validasyon
    if (!date1) {
      errDiv.innerHTML = '<div class="alert alert-err">Tercih edilen tarih ve saat zorunludur.</div>';
      btn.disabled=false; btn.textContent='Talebi Gönder →'; return;
    }
    const preferredDateTime1 = new Date(date1+'T'+time1+':00');
    const preferredDateTime2 = date2 ? new Date(date2+'T'+time2+':00') : null;

    try {
      // Her vendor için ayrı poc_request oluştur
      const batchResults = [];
      for (const v of selectedVendors) {
        // Çakışma kontrolü — aynı gün ±2 saat
        const _pocSnap = await getDocs(query(collection(db,'poc_requests'), where('vendorId','==',v.vendorId)));
        const activeSnap = {size: _pocSnap.docs.filter(d=>['pending','active'].includes(d.data().status)).length};
        // Tarih çakışması kontrolü
        var conflictWarning = '';
        _pocSnap.docs.forEach(function(d) {
          var pd = d.data();
          if (!['pending','active','offer_sent'].includes(pd.status)) return;
          if (!pd.preferredDates) return;
          // Aynı tarihte PoC var mı?
          if (pd.preferredDates.includes(date1)) {
            conflictWarning = '⚠ Bu vendor '+date1+' tarihinde baska bir PoC talep alacak. Vendor uyari gorecek.';
          }
        });

        const docRef = await addDoc(collection(db,'poc_requests'), {
          customerId: CUR_USER.uid,
          customerEmail: CUR_USER.email,
          conflictNote: conflictWarning||'',
          preferredDateTime1: preferredDateTime1 ? Timestamp.fromDate(preferredDateTime1) : null,
          preferredDateTime2: preferredDateTime2 ? Timestamp.fromDate(preferredDateTime2) : null,
          customerName: CUR_PROFILE?.displayName||CUR_USER.email,
          customerCompany: CUR_PROFILE?.company||'',
          productId: v.productId,
          productName: v.productName,
          vendorId: v.vendorId,
          vendorName: v.vendorName,
          vendorEmail: v.vendorEmail,
          vendorType: v.vendorType,
          title, requirements, preferredDates, location,
          status: 'pending',
          activeVendorCount: activeSnap.size, // bilgi amaçlı
          createdAt: serverTimestamp()
        });
        batchResults.push({...v, docId: docRef.id, hadConflict: activeSnap.size >= 3});

        // Vendor'a mail
        if (v.vendorEmail) {
          sendEmail(v.vendorEmail, v.vendorName, 'Yeni PoC Talebi — PoCHub',
            `${CUR_PROFILE?.displayName||CUR_USER.email} (${CUR_PROFILE?.company||''}) sizinle bir PoC yapmak istiyor.`,
            `Ürün: ${v.productName}\nTalep: ${title}\nGereksinimler: ${requirements||'-'}\nLokasyon: ${locLabels[location]}\nTercih Edilen Tarih: ${preferredDates||'-'}`
          );
        }
      }

      // Müşteriye özet mail
      const vendorList = batchResults.map(v=>`• ${v.productName} (${v.vendorName})`).join('\n');
      sendEmail(CUR_USER.email, CUR_PROFILE?.displayName||'',
        'PoC Talepleriniz Gönderildi — PoCHub',
        `${batchResults.length} vendor'a PoC talebiniz iletildi.`,
        `Talepler:\n${vendorList}\n\nVendorlar en kısa sürede size dönüş yapacaktır.`
      );

      // Çakışma uyarısı varsa göster
      const conflicts = batchResults.filter(v=>v.hadConflict);

      modal.remove();
      showToast(`${batchResults.length} vendor'a PoC talebi gönderildi!`);

      if (conflicts.length > 0) {
        setTimeout(() => {
          showToast(`⚠ ${conflicts.map(v=>v.vendorName).join(', ')} için takvim yoğunluğu var. Dönüş süresi uzayabilir.`, 'err');
        }, 2000);
      }

      // Müşteri panelini yenile
      if (CUR_SCREEN === 'customer') { CUR_CUST_TAB='requests'; renderCustomer(); }

    } catch(e) {
      modal.querySelector('#poc-err').innerHTML=`<div class="alert alert-err">${e.message}</div>`;
      btn.disabled=false; btn.textContent='Talebi Gönder →';
    }
  });
}

       {v:evs.filter(e=>e.status==='published').length,l:'Aktif Etkinlik',c:'#3b7cff'},{v:prods.filter(p=>p.status==='active').length,l:'Onaylı Ürün',c:'#3b7cff'},
       {v:offs.filter(o=>o.status==='accepted').length,l:'Kabul Teklif',c:'#22d078'},{v:prods.filter(p=>p.status==='pending').length,l:'Onay Bekleyen',c:'#f0a429'},
       {v:evs.reduce((s,e)=>s+(e.registeredCount||0),0),l:'Toplam Katılımcı',c:'#e9ecf3'},{v:offs.length,l:'Toplam Teklif',c:'#e9ecf3'}]
      .map(s=>'<div class="stat-card"><div style="font-size:26px;font-weight:700;color:'+s.c+';font-family:monospace">'+s.v+'</div><div style="font-size:11px;color:#7c87a0;margin-top:3px">'+s.l+'</div></div>').join('')+

  }
  if (CUR_VEND_TAB === 'requests') {

    if (snap.empty) { m.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>Henüz PoC talebi yok.<br><small style="color:#5a6278">Müşteriler katalogdan ürünlerinize talep oluşturunca burada görünür.</small></div>'; return; }
    m.innerHTML = `<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">PoC Talepleri</h2>
    ${snap.docs.map(d=>{const r={...d.data(),id:d.id};
      const locLabels={customer:'Müşteri Lok.',vendor:'Vendor Lok.',online:'Online',hybrid:'Hibrit'};
      return `<div class="card" style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:10px">
          <div>
            <div style="font-size:14px;font-weight:700">${r.title}</div>

        ${r.preferredDateTime1?`<div style="background:rgba(240,164,41,.08);border:1px solid rgba(240,164,41,.2);border-radius:7px;padding:10px;font-size:12px;margin-bottom:10px">

          <div>📅 ${r.preferredDateTime1.toDate().toLocaleDateString('tr-TR',{weekday:'short',day:'numeric',month:'long'})} ${r.preferredDateTime1.toDate().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})}</div>
          ${r.preferredDateTime2?`<div style="color:#7c87a0;margin-top:2px">2. Tercih: ${r.preferredDateTime2.toDate().toLocaleDateString('tr-TR',{weekday:'short',day:'numeric',month:'long'})} ${r.preferredDateTime2.toDate().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})}</div>`:''}
          ${r.conflictNote?`<div style="color:#f0a429;margin-top:4px;font-size:11px">${r.conflictNote}</div>`:''}

        ${r.requirements?`<div style="background:#1c1f2a;border-radius:7px;padding:10px;font-size:12.5px;color:#9ca3af;margin-bottom:10px">${r.requirements}</div>`:''}
        ${r.status==='cancelled'&&r.cancelReason?`<div style="background:rgba(255,112,112,.08);border:1px solid rgba(255,112,112,.2);border-radius:8px;padding:11px 14px;margin-bottom:10px">

        </div>`:''}
        ${r.preferredDates?`<div style="font-size:12px;color:#7c87a0;margin-bottom:10px">📅 Tercih: ${r.preferredDates}</div>`:''}
        ${r.status==='pending'?`<div style="display:flex;gap:8px;flex-wrap:wrap">

          <button class="btn-g btn-sm vend-chat-btn" data-id="${d.id}" data-title="${(r.title||'').replace(/"/g,'')}" data-cname="${r.customerName||''}" style="color:#22d078;border-color:rgba(34,208,120,.3)">💬 Mesaj</button>
          <button class="btn-red btn-sm reject-poc" data-id="${d.id}" data-cemail="${r.customerEmail||''}" data-cname="${r.customerName||''}">Reddet</button>

    m.querySelectorAll('.poc-vend-detail').forEach(function(b) {

      await updateDoc(doc(db,'poc_requests',b.dataset.id), {status:'rejected', rejectedAt:serverTimestamp()});
      showToast('Talep reddedildi.');
      if(b.dataset.cemail) sendEmail(b.dataset.cemail, b.dataset.cname, 'PoC Talebi Hakkında — PoCHub',

    m.querySelectorAll('.send-offer-btn').forEach(b => b.addEventListener('click', () => {
      openSendOfferModal(b.dataset.id, b.dataset.cid, b.dataset.cemail, b.dataset.cname, b.dataset.pname);

    m.querySelectorAll('.vend-chat-btn').forEach(b => b.addEventListener('click', () => {
      openChatModal(b.dataset.id, b.dataset.title, b.dataset.cname);

  }

  else if (CUR_VEND_TAB === 'calendar') {
    const [pocSnap, evSnap] = await Promise.all([
      getDocs(query(collection(db,'poc_requests'), where('vendorId','==',CUR_USER.uid))),
      getDocs(query(collection(db,'public_events'), where('vendorId','==',CUR_USER.uid))),
    ]);
    const pocItems = pocSnap.docs.map(d=>({...d.data(),id:d.id,type:'private'}));
    const evItems = evSnap.docs.map(d=>({...d.data(),id:d.id,type:'public'}));
    const all = [...pocItems,...evItems].sort((a,b)=>{
      const da = a.eventDate||a.createdAt;
      const db2 = b.eventDate||b.createdAt;
      return (da?.seconds||0)-(db2?.seconds||0);
    });
    m.innerHTML = `<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">PoC Takvimi</h2>
    ${!all.length?'<div class="empty"><div class="empty-icon">📅</div>Takvimde kayıt yok.</div>':
    `<table><thead><tr><th>Başlık</th><th>Tür</th><th>Müşteri / Ürün</th><th>Durum</th><th>Tarih</th></tr></thead><tbody>
    ${all.map(e=>`<tr>
      <td style="font-weight:600">${e.title||e.productName||'—'}</td>
      <td>${e.type==='public'?'<span class="bdg" style="background:rgba(34,208,120,.12);color:#22d078">Public</span>':'<span class="bdg" style="background:rgba(59,124,255,.12);color:#7db4ff">Private</span>'}</td>
      <td style="color:#7c87a0">${e.customerName||e.productName||'—'}</td>
      <td>${statusBadge(e.status)}</td>
      <td style="color:#7c87a0;font-size:12px">${fmt(e.eventDate||e.createdAt)}</td>
    </tr>`).join('')}
    </tbody></table>`}`;
  }

  else if (CUR_VEND_TAB === 'products') {
    const snap = await getDocs(query(collection(db,'products'), where('vendorId','==',CUR_USER.uid)));
    m.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:18px;font-weight:700">Ürünlerim</h2>
      <button class="btn-p btn-sm" id="v-add-prod2">+ Ürün Ekle</button>
    </div>
    ${snap.empty?'<div class="empty"><div class="empty-icon">📦</div>Henüz ürün eklemediniz.</div>':
    `<table><thead><tr><th>Ürün Adı</th><th>Kategori</th><th>Menşei</th><th>Durum</th><th>Eklenme</th><th>İşlem</th></tr></thead><tbody>
    ${snap.docs.map(d=>{const p={...d.data(),id:d.id};
      return `<tr>
        <td style="font-weight:600">${p.name}</td>
        <td style="color:#7c87a0">${p.category||'—'}</td>
        <td>${cc(p.country||'TR')}</td>
        <td>${statusBadge(p.status)}</td>
        <td style="color:#7c87a0;font-size:12px">${fmt(p.createdAt)}</td>
        <td><button class="btn-g btn-sm ep-edit" data-id="${d.id}" data-name="${p.name||''}" data-cat="${p.category||''}" data-country="${p.country||'TR'}" data-desc="${(p.description||'').substring(0,80)}" data-sup="${p.supportModel||'inhouse'}" style="margin-right:4px">Düzenle</button><button class="btn-red btn-sm ep-del" data-id="${d.id}" data-name="${p.name||''}">Sil</button></td>
      </tr>`;
    }).join('')}
    </tbody></table>`}`;
    el('v-add-prod2')?.addEventListener('click', openAddProductModal);
    m.querySelectorAll('.ep-edit').forEach(function(b){b.addEventListener('click',function(){openEditProd(b.dataset.id,b.dataset.name,b.dataset.cat,b.dataset.country,b.dataset.desc,b.dataset.sup);});});
    m.querySelectorAll('.ep-del').forEach(function(b){b.addEventListener('click',async function(){if(!confirm('"'+b.dataset.name+'" silinsin mi?')) return;try{await deleteDoc(doc(db,'products',b.dataset.id));showToast('Silindi.');loadVendTab();}catch(e){showToast('Hata: '+e.message,'err');}});});
  }

  else if (CUR_VEND_TAB === 'events') {
    const snap = await getDocs(query(collection(db,'public_events'), where('vendorId','==',CUR_USER.uid)));
    m.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2 style="font-size:18px;font-weight:700">Etkinliklerim</h2>
      <button class="btn-p btn-sm" id="v-add-ev2">+ Etkinlik Oluştur</button>
    </div>
    ${snap.empty?'<div class="empty"><div class="empty-icon">🎯</div>Henüz etkinlik oluşturmadınız.</div>':
    `<table><thead><tr><th>Başlık</th><th>Tarih</th><th>Format</th><th>Kayıtlı</th><th>Durum</th></tr></thead><tbody>
    ${snap.docs.map(d=>{const e={...d.data(),id:d.id};
      return `<tr><td style="font-weight:600">${e.title}</td><td style="color:#7c87a0;font-size:12px">${fmt(e.eventDate)}</td><td style="color:#7c87a0">${e.format||'—'}</td><td style="color:#7c87a0">${e.registeredCount||0} / ${e.capacity||0}</td><td>${statusBadge(e.status)}</td></tr>`;
    }).join('')}
    </tbody></table>`}`;
    el('v-add-ev2')?.addEventListener('click', openNewEventModal);
  }

  else if (CUR_VEND_TAB === 'offers-sent') {
    const snap = await getDocs(query(collection(db,'offers'), where('vendorId','==',CUR_USER.uid)));
    m.innerHTML = `<h2 style="font-size:18px;font-weight:700;margin-bottom:16px">Gönderilen Teklifler</h2>
    ${snap.empty?'<div class="empty"><div class="empty-icon">💰</div>Henüz teklif göndermediniz.</div>':
    `<table><thead><tr><th>Ürün</th><th>Müşteri</th><th>Tutar</th><th>Kanal Payı</th><th>Durum</th><th>Tarih</th></tr></thead><tbody>
    ${snap.docs.map(d=>{const o={...d.data(),id:d.id};
      return `<tr><td style="font-weight:600">${o.productName||'—'}</td><td style="color:#7c87a0">${o.customerName||'—'}</td>
      <td style="font-family:monospace;font-weight:600">${o.amount?.toLocaleString('tr-TR')} ${o.currency||'₺'}</td>
      <td>${o.hasChannelFee?'<span style="color:#f0a429">Var</span>':'<span style="color:#22d078">Yok</span>'}</td>
      <td>${statusBadge(o.status)}</td><td style="color:#7c87a0;font-size:12px">${fmt(o.createdAt)}</td></tr>`;
    }).join('')}
    </tbody></table>`}`;
  }
}

function openSendOfferModal(pocId, customerId, customerEmail, customerName, productName, vendorType) {
  var vtype = vendorType || CUR_PROFILE?.vendorType || '';
  var vtypeLabels = {ureticid:'Üretici',distributor:'Distribütör',integrator:'Entegratör'};
  var vtypeLabel = vtypeLabels[vtype] || 'Vendor';

  var modal = document.createElement('div');
  modal.className = 'modal-bg on';
  modal.innerHTML =
    '<div class="modal" style="max-width:520px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">' +
    '<h3 style="font-size:15px;font-weight:700">Teklif Gönder</h3>' +
    '<button id="of-close" style="background:none;border:none;color:#7c87a0;cursor:pointer;font-size:18px">×</button>' +
    '</div>' +

    // Müşteri + ürün bilgisi
    '<div style="background:#1c1f2a;border-radius:8px;padding:12px 14px;margin-bottom:16px;display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
    '<div><div style="font-size:11px;color:#5a6278">Müşteri</div><div style="font-size:13px;font-weight:600">'+(customerName||customerEmail)+'</div></div>' +
    '<div><div style="font-size:11px;color:#5a6278">Ürün</div><div style="font-size:13px;font-weight:600">'+(productName||'—')+'</div></div>' +
    '</div>' +

    // Teklif tipi — kanal yapısı
    '<label class="lbl">Teklif Tipi *</label>' +
    '<select class="inp" id="of-type">' +
    '<option value="distributor">Distribütör Teklifi</option>' +
    '<option value="integrator">Entegratör Teklifi</option>' +
    '<option value="direct">Doğrudan Üretici Teklifi</option>' +
    '<option value="enterprise">Enterprise Anlaşma Kapsamı</option>' +
    '</select>' +

    // Faturalama
    '<label class="lbl">Faturalama *</label>' +
    '<select class="inp" id="of-billing">' +
    '<option value="local_distributor">Türkiye Distribütörü Üzerinden</option>' +
    '<option value="local_integrator">Entegratör Üzerinden</option>' +
    '<option value="direct_vendor">Doğrudan Üretici</option>' +
    '<option value="local_reseller">Yetkili Bayi Üzerinden</option>' +
    '</select>' +

    // Tutar + Para birimi
    '<div class="g2">' +
    '<div><label class="lbl">Teklif Tutarı *</label><input class="inp" id="of-amount" type="number" min="0" placeholder="0"></div>' +
    '<div><label class="lbl">Para Birimi</label>' +
    '<select class="inp" id="of-currency">' +
    '<option value="TRY">₺ TRY</option>' +
    '<option value="USD">$ USD</option>' +
    '<option value="EUR">€ EUR</option>' +
    '</select></div>' +
    '</div>' +

    // Geçerlilik + Kanal payı
    '<div class="g2">' +
    '<div><label class="lbl">Geçerlilik Süresi</label>' +
    '<select class="inp" id="of-validity">' +
    '<option value="30">30 Gün</option>' +
    '<option value="60">60 Gün</option>' +
    '<option value="90">90 Gün</option>' +
    '<option value="0">Süresiz</option>' +
    '</select></div>' +
    '<div><label class="lbl">Kanal Payı</label>' +
    '<select class="inp" id="of-channel">' +
    '<option value="no">Yok</option>' +
    '<option value="yes">Var</option>' +
    '</select></div>' +
    '</div>' +

    // Teslimat & Kurulum
    '<label class="lbl">Teslimat & Kurulum</label>' +
    '<select class="inp" id="of-delivery">' +
    '<option value="included">Kurulum Dahil</option>' +
    '<option value="excluded">Kurulum Hariç</option>' +
    '<option value="optional">Opsiyonel (Ücretli)</option>' +
    '</select>' +

    // BTK / Sertifikasyon
    '<label class="lbl">BTK / Sertifikasyon Notu</label>' +
    '<input class="inp" id="of-cert" placeholder="Örn: BTK onaylı, CC EAL4+, FIPS 140-2...">' +

    // Garanti
    '<label class="lbl">Garanti</label>' +
    '<input class="inp" id="of-warranty" placeholder="Örn: 3 yıl yerinde garanti">' +

    // Teknik destek
    '<label class="lbl">Teknik Destek</label>' +
    '<select class="inp" id="of-support">' +
    '<option value="8x5">8x5 (İş Günleri)</option>' +
    '<option value="7x24">7x24</option>' +
    '<option value="nbd">Next Business Day</option>' +
    '<option value="none">Yok</option>' +
    '</select>' +

    // Notlar
    '<label class="lbl">Ek Notlar / Açıklama</label>' +
    '<textarea class="inp" id="of-notes" rows="3" style="resize:none" placeholder="Lisans modeli, ödeme planı, özel koşullar..."></textarea>' +

    '<div id="of-err" style="margin-top:10px"></div>' +
    '<button class="btn-p" id="of-submit" style="width:100%;padding:12px;font-size:14px;margin-top:14px">Teklifi Gönder</button>' +
    '</div>';

  document.body.appendChild(modal);
  modal.querySelector('#of-close').addEventListener('click', function(){modal.remove();});
  modal.addEventListener('click', function(e){if(e.target===modal)modal.remove();});

  // Teklif tipi değişince faturalama önerisini güncelle
  modal.querySelector('#of-type').addEventListener('change', function() {
    var billing = modal.querySelector('#of-billing');
    var type = this.value;
    if (type==='direct') billing.value='direct_vendor';
    else if (type==='integrator') billing.value='local_integrator';
    else if (type==='enterprise') billing.value='direct_vendor';
    else billing.value='local_distributor';
  });

  // Vendor tipine göre varsayılan seç
  if (vtype==='ureticid') {
    modal.querySelector('#of-type').value='direct';
    modal.querySelector('#of-billing').value='direct_vendor';
  } else if (vtype==='integrator') {
    modal.querySelector('#of-type').value='integrator';
    modal.querySelector('#of-billing').value='local_integrator';
  }

  modal.querySelector('#of-submit').addEventListener('click', async function() {
    var amount = parseFloat(modal.querySelector('#of-amount').value)||0;
    var errDiv = modal.querySelector('#of-err');
    if (amount <= 0) { errDiv.innerHTML='<div class="alert alert-err">Geçerli bir tutar girin.</div>'; return; }

    var btn = modal.querySelector('#of-submit');
    btn.disabled=true; btn.textContent='Gönderiliyor...';

    var offerType = modal.querySelector('#of-type').value;
    var billingModel = modal.querySelector('#of-billing').value;
    var currency = modal.querySelector('#of-currency').value;
    var validity = parseInt(modal.querySelector('#of-validity').value)||30;
    var hasChannelFee = modal.querySelector('#of-channel').value==='yes';
    var delivery = modal.querySelector('#of-delivery').value;
    var cert = modal.querySelector('#of-cert').value.trim();
    var warranty = modal.querySelector('#of-warranty').value.trim();
    var supportLevel = modal.querySelector('#of-support').value;
    var notes = modal.querySelector('#of-notes').value.trim();

    var currencySymbols = {TRY:'₺',USD:'$',EUR:'€'};
    var validityDate = validity > 0 ? new Date(Date.now() + validity*24*60*60*1000) : null;

    var offerTypeLabels = {
      distributor:'Distribütör Teklifi', integrator:'Entegratör Teklifi',
      direct:'Doğrudan Üretici Teklifi', enterprise:'Enterprise Anlaşma'
    };
    var billingLabels = {
      local_distributor:'Türkiye Distribütörü', local_integrator:'Entegratör',
      direct_vendor:'Doğrudan Üretici', local_reseller:'Yetkili Bayi'
    };

    try {
      await addDoc(collection(db,'offers'), {
        pocId:         pocId,
        customerId:    customerId,
        customerEmail: customerEmail,
        customerName:  customerName,
        vendorId:      CUR_USER.uid,
        vendorName:    CUR_PROFILE?.displayName||CUR_USER.email,
        vendorEmail:   CUR_USER.email,
        vendorType:    vtype,
        productName:   productName,
        // Yeni gelişmiş alanlar
        offerType:     offerType,
        offerTypeLabel:offerTypeLabels[offerType]||offerType,
        billingModel:  billingModel,
        billingLabel:  billingLabels[billingModel]||billingModel,
        amount:        amount,
        currency:      currency,
        currencySymbol:currencySymbols[currency]||'₺',
        hasChannelFee: hasChannelFee,
        validityDays:  validity,
        validUntil:    validityDate ? Timestamp.fromDate(validityDate) : null,
        delivery:      delivery,
        certification: cert,
        warranty:      warranty,
        supportLevel:  supportLevel,
        notes:         notes,
        status:        'pending',
        createdAt:     serverTimestamp(),
      });

      // Müşteriye bildirim
      if (customerEmail) {
        sendEmail(customerEmail, customerName,
          'Yeni PoC Teklifi Aldınız — PoCHub',
          (CUR_PROFILE?.displayName||CUR_USER.email)+' size '+productName+' icin teklif gonderdi. Tutar: '+currencySymbols[currency]+amount.toLocaleString('tr-TR'),
          'pochub.co uzerinden teklifinizi inceleyebilirsiniz.'
        );
      }

      // PoC durumunu offer_sent yap
      await updateDoc(doc(db,'poc_requests',pocId), {
        status: 'offer_sent',
        offerSentAt: serverTimestamp(),
      });

      modal.remove();
      showToast('Teklif gönderildi!');
      loadVendTab();
    } catch(e) {
      errDiv.innerHTML='<div class="alert alert-err">'+e.message+'</div>';
