    html += '<table style="width:100%;border-collapse:collapse;font-size:13px"><thead><tr>';
    html += '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;font-size:10.5px;text-transform:uppercase;color:#5a6278">Kategori</th>';
    html += '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;font-size:10.5px;text-transform:uppercase;color:#5a6278">Sıra</th>';
    html += '<th style="background:#1c1f2a;padding:9px 14px;text-align:left;font-size:10.5px;text-transform:uppercase;color:#5a6278">Açıklama</th>';
    html += '<th style="background:#1c1f2a;padding:9px 14px;text-align:center;font-size:10.5px;text-transform:uppercase;color:#5a6278">İşlem</th>';
    html += '</tr></thead><tbody>';

    if (cats.length === 0) {
      html += '<tr><td colspan="4" style="text-align:center;padding:32px;color:#5a6278">Henüz kategori yok. + Yeni Kategori ile ekleyin.</td></tr>';
    } else {
      cats.forEach(function(cat) {
        html += '<tr style="border-top:1px solid rgba(255,255,255,.06)">';
        html += '<td style="padding:11px 14px;font-weight:700">' + cat.name + '</td>';
        html += '<td style="padding:11px 14px;color:#7c87a0;font-family:monospace">' + (cat.order||0) + '</td>';
        html += '<td style="padding:11px 14px;color:#7c87a0;font-size:12px">' + (cat.description||'—') + '</td>';
        html += '<td style="padding:11px 14px;text-align:center;white-space:nowrap">';
        html += '<button class="btn-g btn-sm edit-cat-btn" style="margin-right:6px"';
        html += ' data-id="' + cat.id + '" data-name="' + cat.name + '"';
        html += ' data-order="' + (cat.order||0) + '" data-desc="' + (cat.description||'') + '">Düzenle</button>';
        html += '<button class="btn-red btn-sm del-cat-btn"';
        html += ' data-id="' + cat.id + '" data-name="' + cat.name + '">Sil</button>';
        html += '</td></tr>';
      });
    }
    html += '</tbody></table></div>';

    m.innerHTML = html;

    m.querySelector('#add-cat-btn').addEventListener('click', function() { openCatModal(null); });
    m.querySelectorAll('.edit-cat-btn').forEach(function(b) {
      b.addEventListener('click', function() {
        openCatModal({id:b.dataset.id, name:b.dataset.name, order:parseInt(b.dataset.order)||0, description:b.dataset.desc});
      });
    });
    m.querySelectorAll('.del-cat-btn').forEach(function(b) {
      b.addEventListener('click', async function() {
        if (!confirm('"' + b.dataset.name + '" kategorisini silmek istiyor musunuz?')) return;
        await deleteDoc(doc(db,'categories',b.dataset.id));
        showToast('Kategori silindi.');
        loadAdmTab();
      });
    });
  } catch(e) {
    m.innerHTML = '<div class="empty">Yükleme hatası: ' + e.message + '</div>';
  }
}

function openCatModal(existing) {
  const isEdit = !!existing;
  const modal = document.createElement('div');
  modal.className = 'modal-bg on';
  modal.innerHTML = `<div class="modal" style="max-width:420px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h3 style="font-size:15px;font-weight:700">${isEdit?'Kategori Düzenle':'Yeni Kategori'}</h3>
      <button style="background:none;border:none;color:#7c87a0;cursor:pointer;font-size:18px" id="close-cat-modal">×</button>
    </div>
    <label class="lbl">Kategori Adı *</label>
    <input class="inp" id="cat-name" value="${existing?.name||''}" placeholder="Örn: Firewall">
    <label class="lbl">Sıra (küçük = önce gösterilir)</label>
    <input class="inp" id="cat-order" type="number" value="${existing?.order||0}">
    <label class="lbl">Açıklama</label>
    <input class="inp" id="cat-desc" value="${existing?.description||''}" placeholder="Kısa açıklama (opsiyonel)">
    <div id="cat-err" style="margin-top:10px"></div>
    <button class="btn-p" id="cat-submit" style="width:100%;padding:11px;font-size:14px;margin-top:14px">${isEdit?'Güncelle':'Ekle'}</button>
  </div>`;
  document.body.appendChild(modal);
  modal.querySelector('#close-cat-modal').addEventListener('click', () => modal.remove());
  modal.addEventListener('click', e => { if(e.target===modal) modal.remove(); });
  modal.querySelector('#cat-submit').addEventListener('click', async () => {
    const name = modal.querySelector('#cat-name').value.trim();
    if (!name) { modal.querySelector('#cat-err').innerHTML='<div class="alert alert-err">Kategori adı zorunludur.</div>'; return; }
    const btn = modal.querySelector('#cat-submit');
    btn.disabled=true; btn.textContent=isEdit?'Güncelleniyor...':'Ekleniyor...';
    try {
      const data = { name, order: parseInt(modal.querySelector('#cat-order').value)||0, description: modal.querySelector('#cat-desc').value, updatedAt: serverTimestamp() };
      if (isEdit) { await updateDoc(doc(db,'categories',existing.id), data); showToast('Kategori güncellendi!'); }
      else { data.createdAt = serverTimestamp(); await addDoc(collection(db,'categories'), data); showToast('Kategori eklendi!'); }
      modal.remove(); loadAdmTab();
    } catch(e) {
      modal.querySelector('#cat-err').innerHTML=`<div class="alert alert-err">${e.message}</div>`;
      btn.disabled=false; btn.textContent=isEdit?'Güncelle':'Ekle';
    }
  });
}
