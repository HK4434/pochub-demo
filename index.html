<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoCHub.co — v1.1</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07080d;color:#e9ecf3;font-family:system-ui,-apple-system,sans-serif;font-size:13px;line-height:1.5}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:2px}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:48px;
  border-bottom:1px solid rgba(255,255,255,.08);background:#07080d;
  position:sticky;top:0;z-index:100;gap:8px;flex-wrap:wrap}
.logo{font-size:15px;font-weight:700;color:#e9ecf3;flex-shrink:0}
.logo b{color:#3b7cff}
.ntabs{display:flex;gap:2px;flex-wrap:wrap}
.nt{background:none;border:none;color:#5a6278;font:inherit;font-size:12px;
  padding:5px 10px;border-radius:6px;cursor:pointer;transition:.1s}
.nt:hover,.nt.on{background:rgba(59,124,255,.12);color:#3b7cff;font-weight:600}
.navr{display:flex;gap:6px}
.login-opt{display:block;width:100%;text-align:left;background:none;border:none;color:#c8cdd8;font:inherit;font-size:12.5px;padding:7px 10px;border-radius:6px;cursor:pointer}
.login-opt:hover{background:rgba(59,124,255,.1);color:#3b7cff}
.admin-opt{color:#f0a429 !important}
.admin-opt:hover{background:rgba(240,164,41,.1) !important;color:#f0a429 !important}
.role-badge{display:inline-flex;align-items:center;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;margin-left:6px}

/* SCREENS */
.scr{display:none}
.scr.on{display:block}

/* SHARED */
.wrap{max-width:1100px;margin:0 auto;padding:22px}
.card{background:#0f1117;border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:16px}
.inp{width:100%;background:#1c1f2a;border:1px solid rgba(255,255,255,.15);color:#e9ecf3;
  border-radius:8px;padding:8px 12px;font:inherit;font-size:13px;outline:none}
.inp:focus{border-color:#3b7cff}
.btn-p{background:#3b7cff;color:#fff;border:none;border-radius:8px;
  padding:9px 18px;font:inherit;font-size:13px;font-weight:600;cursor:pointer}
.btn-p:hover{background:#2460e0}
.btn-g{background:#1c1f2a;border:1px solid rgba(255,255,255,.15);color:#c8cdd8;border-radius:8px;
  padding:9px 18px;font:inherit;font-size:13px;font-weight:500;cursor:pointer}
.btn-g:hover{border-color:rgba(255,255,255,.3);color:#e9ecf3}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-gr{background:#1a9e5a;color:#fff;border:none;border-radius:8px;
  padding:9px 18px;font:inherit;font-size:13px;font-weight:600;cursor:pointer}
.btn-gr:hover{background:#157a46}
.btn-red{background:rgba(255,77,77,.15);border:1px solid rgba(255,77,77,.3);color:#ff7070;
  border-radius:8px;padding:9px 18px;font:inherit;font-size:13px;font-weight:600;cursor:pointer}
.bdg{display:inline-flex;align-items:center;border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.lbl{display:block;font-size:12px;color:#7c87a0;font-weight:500;margin-bottom:5px}
.dash{display:grid;grid-template-columns:185px 1fr;min-height:calc(100vh - 48px)}
.sbar{background:#0f1117;border-right:1px solid rgba(255,255,255,.08);padding:12px 8px}
.slbl{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#5a6278;
  padding:0 8px;margin-bottom:6px;font-weight:700}
.si{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:6px;border:none;
  font:inherit;font-size:12px;width:100%;text-align:left;margin-bottom:2px;
  background:none;color:#7c87a0;cursor:pointer;transition:.1s}
.si:hover{background:#1c1f2a;color:#e9ecf3}
.si.on{background:rgba(59,124,255,.1);color:#3b7cff;font-weight:600}
.sdot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.main{padding:22px;overflow-y:auto}
</style>
</head>
<body>

<nav>
  <div class="logo">Poc<b>Hub</b>.co</div>
  <div class="ntabs" id="ntabs">
    <button class="nt on" data-s="home">Ana Sayfa</button>

        <div style="font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#5a6278;padding:5px 10px 4px;font-weight:700">Müşteri</div>

        <div style="border-top:1px solid rgba(255,255,255,.07);margin:4px 0"></div>

        <button class="login-opt" data-role="vendor" data-sub="distributor">Distribütör</button>

        <button class="login-opt admin-opt" data-role="admin" data-sub="">Admin Paneli</button>

</nav>

<!-- CUSTOMER -->
<div class="scr" id="scr-customer">
  <div class="dash">
    <div class="sbar">
      <div class="slbl">Müşteri Paneli</div>
      <div style="margin:0 8px 8px;padding:5px 8px;background:rgba(34,208,120,.08);border:1px solid rgba(34,208,120,.18);border-radius:6px;font-size:11px;color:#3effa0;font-weight:600">Müşteri</div>

      <div class="slbl">Vendor Paneli</div>
      <div id="vendor-role-tag" style="margin:0 8px 8px;padding:5px 8px;background:rgba(59,124,255,.08);border:1px solid rgba(59,124,255,.18);border-radius:6px;font-size:11px;color:#7db4ff;font-weight:600">Üretici</div>
      <button class="si on" data-d="vendor" data-t="poc"><div class="sdot"></div>PoC Talepleri</button>

      <button class="si" data-d="vendor" data-t="add"><div class="sdot"></div>+ Yeni Ürün</button>

</div>

<!-- ADMIN -->
<div class="scr" id="scr-admin">
  <div class="dash">
    <div class="sbar">
      <div class="slbl">Admin Paneli</div>
      <div style="margin:0 8px 8px;padding:5px 8px;background:rgba(240,164,41,.08);border:1px solid rgba(240,164,41,.18);border-radius:6px;font-size:11px;color:#f0a429;font-weight:600;display:flex;justify-content:space-between;align-items:center"><span>Sistem Yöneticisi</span><span style="font-family:monospace;font-size:10px;color:#5a6278">v1.1</span></div>
      <button class="si on" data-d="admin" data-t="metrics"><div class="sdot"></div>Dashboard</button>

      <button class="si" data-d="admin" data-t="audit"><div class="sdot"></div>Denetim Logu</button>
    </div>
    <div class="main" id="admin-main"></div>
  </div>
</div>

<div class="scr" id="scr-payment"></div>

<script>
/* ── VERİ ── */
var EVTS=[
  {id:1,title:'FortiGate 100F — Canlı Demo & Teknik Değerlendirme',cat:'Firewall',country:'TR',vendor:'Fortinet TR',product:'FortiGate 100F',day:15,mon:'Nis',time:'10:00',spots:32,cap:50,fee:0,featured:true},
  {id:2,title:'Palo Alto PA-450 Next-Gen Firewall Tanıtımı',cat:'Firewall',country:'US',vendor:'Palo Alto Networks',product:'PA-450',day:18,mon:'Nis',time:'14:00',spots:3,cap:40,fee:0,featured:false},

  {id:6,title:'Dell EMC PowerStore Kurumsal Depolama',cat:'Storage',country:'DE',vendor:'Dell EMC DACH',product:'PowerStore 500T',day:28,mon:'Nis',time:'13:00',spots:12,cap:30,fee:150,featured:false},
  {id:7,title:'Veeam Backup v12 — Yeni Özellikler',cat:'Yedekleme',country:'US',vendor:'Veeam Software',product:'VBR v12',day:3,mon:'May',time:'14:00',spots:75,cap:200,fee:0,featured:false},
  {id:8,title:'SonicWall NSA 3700 — MSSP Odaklı Demo',cat:'Firewall',country:'DE',vendor:'SonicWall',product:'NSA 3700',day:30,mon:'Nis',time:'10:00',spots:20,cap:50,fee:0,featured:false}
];
var PRODS=[
  {id:1,name:'FortiGate 100F',vendor:'Fortinet TR',country:'TR',cat:'Firewall',desc:'1000 kullanıcıya kadar NGFW. SSL inspection, IPS, ATP.',specs:{'Throughput':'10 Gbps','Maks. Kullanıcı':'1000','SSL':'✓','VPN':'✓','HA':'✓','Destek':'7/24 TR'}},
  {id:2,name:'Palo Alto PA-450',vendor:'Palo Alto',country:'US',cat:'Firewall',desc:'ML tabanlı NGFW. Zero-day koruma, WildFire entegrasyonu.',specs:{'Throughput':'5.2 Gbps','Maks. Kullanıcı':'500','SSL':'✓','VPN':'✓','HA':'✓','Destek':'İngilizce'}},
  {id:3,name:'NetArmor FW-500',vendor:'NetArmor A.Ş.',country:'TR',cat:'Firewall',desc:'Yerli üretim kurumsal güvenlik duvarı.',specs:{'Throughput':'4 Gbps','Maks. Kullanıcı':'800','SSL':'✓','VPN':'✓','HA':'✓','Destek':'7/24 TR'}},
  {id:4,name:'Cisco Firepower 1120',vendor:'Cisco',country:'US',cat:'Firewall',desc:'Kurumsal NGFW. Talos tehdit istihbaratı.',specs:{'Throughput':'1.5 Gbps','Maks. Kullanıcı':'750','SSL':'✓','VPN':'✓','HA':'Ops.','Destek':'EN/TR'}}
];

/* ── DURUM ── */
var ST={
  screen:'home',
  catF:'',countryF:'',freeF:false,spotsF:false,viewMode:'list',trFirst:false,
  registered:{},eventReg:false,
  custTab:'list',vendTab:'poc',admTab:'metrics',
  chk1:false,chk2:false,tmrVal:5,tmrDone:false,tmrInt:null,approved:false,
  offerAccepted:false,infoSent:false,
  vendOfferSent:false,vendInfoSent:false,vendAddDone:false,
  feeType:'no',supportSel:0,specs:[],
  admAction:'timeout',admReason:'',admDone:false,
  pendItems:['FortiAnalyzer 300F','HPE StoreOnce 3620','Darktrace Enterprise','Netdata Storage v2'],
  pendVend:['Fortinet TR','HPE Türkiye','Darktrace UK','Netdata A.Ş.'],
  pendCnt:['TR','TR','GB','TR'],pendCat:['Log Yönetimi','Yedekleme','AI Güvenlik','Storage'],
  msgs:[
    {mine:false,txt:'Merhaba, FortiGate 100F PoC talebinizi aldık.',t:'09:42'},
    {mine:true,txt:'Teşekkürler. HA konfigürasyonu mümkün mü?',t:'09:45'},
    {mine:false,txt:'Aktif-pasif HA destekleniyor. Demo ortamında gösterebiliriz.',t:'09:47'}
  ],
  payDone:false
};

/* ── YARDIMCILAR ── */
function el(id){return document.getElementById(id);}
function cc(c){var m={TR:'rgba(34,208,120,.12)|#3effa0',US:'rgba(59,124,255,.12)|#7db4ff',DE:'rgba(240,164,41,.12)|#ffc55a',GB:'rgba(139,92,246,.12)|#c4a8ff'};var p=(m[c]||'#1c1f2a|#7c87a0').split('|');return '<span class="bdg" style="background:'+p[0]+';color:'+p[1]+'">'+c+'</span>';}
function sb(bg,c,t){return '<span class="bdg" style="background:'+bg+';color:'+c+'">'+t+'</span>';}
function feeBdg(e){return e.fee===0?sb('rgba(34,208,120,.12)','#22d078','Ücretsiz'):sb('rgba(59,124,255,.12)','#7db4ff','₺'+e.fee);}
function spotBdg(e){return e.spots===0?sb('rgba(255,77,77,.12)','#ff4d4d','Dolu'):e.spots<5?sb('rgba(240,164,41,.12)','#f0a429',e.spots+' yer'):sb('rgba(34,208,120,.12)','#22d078',e.spots+' yer');}

/* ── NAVİGASYON ── */
function go(s){
  ST.screen=s;
  document.querySelectorAll('.scr').forEach(function(x){x.classList.remove('on');});
  var scr=el('scr-'+s);
  if(scr){scr.classList.add('on');}
  document.querySelectorAll('.nt').forEach(function(b){
    b.classList.toggle('on',b.getAttribute('data-s')===s);
  });
  render(s);
}

function render(s){
  if(s==='home'){renderHome();}
  else if(s==='event'){renderEvent();}
  else if(s==='catalog'){renderCatalog();}
  else if(s==='compare'){renderCompare();}
  else if(s==='customer'){renderCustomerTab(ST.custTab);}
  else if(s==='vendor'){renderVendorTab(ST.vendTab);}
  else if(s==='admin'){renderAdminTab(ST.admTab);}
  else if(s==='payment'){renderPayment();}
}

/* ── HOME ── */
function renderHome(){
  var evDays={};
  EVTS.forEach(function(e){evDays[e.day]=true;});
  var list=filterEvts();

  var html='<div class="wrap">';
  // Banner
  html+='<div class="card" style="background:linear-gradient(135deg,rgba(59,124,255,.1),rgba(139,92,246,.06));border-color:rgba(59,124,255,.22);display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:16px;padding:22px 26px">';
  html+='<div><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#3b7cff;font-weight:700;margin-bottom:8px">Kurumsal IT Alım Platformu</div>';
  html+='<h1 style="font-size:clamp(17px,2.5vw,24px);font-weight:700;letter-spacing:-.5px;line-height:1.2;margin-bottom:8px">Public Demo Etkinlikleri, Özel PoC Süreçleri —<br>Kurumsal IT Alımında Bilgi Asimetrisine Son</h1>';
  html+='<p style="color:#7c87a0;font-size:13px;max-width:460px;line-height:1.6">Vendor\'ların düzenlediği canlı ürün demolarını takip edin. Filtreleyin, kayıt olun, kararınızı verin.</p></div>';
  html+='<div style="display:flex;flex-direction:column;gap:8px">';
  html+='<button class="btn-p" data-s="catalog">Kataloğu İncele →</button>';
  html+='<button class="btn-g btn-sm" data-s="event">Etkinlik Detayı Gör</button></div></div>';

  // Stats
  html+='<div class="g4" style="margin-bottom:16px">';
  [{v:47,l:'Yaklaşan Etkinlik',c:'#3b7cff'},{v:12,l:'Bu Hafta',c:'#22d078'},{v:284,l:'Kayıtlı Kurum',c:'#e9ecf3'},{v:3,l:'Bugün Başlıyor',c:'#f0a429'}].forEach(function(m){
    html+='<div class="card" style="padding:13px 15px"><div style="font-size:26px;font-weight:700;letter-spacing:-1px;font-family:monospace;color:'+m.c+'">'+m.v+'</div><div style="font-size:11px;color:#7c87a0;margin-top:2px">'+m.l+'</div></div>';
  });
  html+='</div>';

  // Grid
  html+='<div style="display:grid;grid-template-columns:1fr 290px;gap:16px;align-items:start">';

  // Sol: filtreler + liste
  html+='<div>';
  html+='<div class="card" style="padding:10px 12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px">';
  html+='<input class="inp" id="h-srch" placeholder="Etkinlik veya ürün ara..." style="flex:1;min-width:150px;padding:6px 10px;font-size:12.5px" oninput="filterEvtsRerender()">';
  html+='<select class="inp" id="h-cat" style="width:auto;padding:6px 8px;font-size:12px" onchange="ST.catF=this.value;filterEvtsRerender()">';
  html+='<option value="">Tüm Kategoriler</option><option value="Firewall">Firewall</option><option value="Yedekleme">Yedekleme</option><option value="Storage">Storage</option></select>';
  html+='<select class="inp" id="h-cnt" style="width:auto;padding:6px 8px;font-size:12px" onchange="ST.countryF=this.value;filterEvtsRerender()">';
  html+='<option value="">Tüm Ülkeler</option><option value="TR">TR</option><option value="US">US</option><option value="DE">DE</option></select>';
  html+='<button class="btn-g btn-sm" id="btn-free" onclick="toggleFreeF()" style="'+(ST.freeF?'background:rgba(59,124,255,.15);border-color:#3b7cff;color:#3b7cff':'')+'">Ücretsiz</button>';
  html+='<button class="btn-g btn-sm" id="btn-spots" onclick="toggleSpotsF()" style="'+(ST.spotsF?'background:rgba(59,124,255,.15);border-color:#3b7cff;color:#3b7cff':'')+'">Yer Var</button>';
  html+='</div>';
  html+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">';
  html+='<span style="font-size:12px;color:#7c87a0">'+list.length+' etkinlik</span>';
  html+='<div style="display:flex;gap:5px">';
  html+='<button class="btn-g btn-sm" onclick="ST.viewMode=\'list\';renderHome()" style="font-size:11px;padding:4px 9px;'+(ST.viewMode==='list'?'background:rgba(59,124,255,.15);border-color:#3b7cff;color:#3b7cff':'')+'">≡ Liste</button>';
  html+='<button class="btn-g btn-sm" onclick="ST.viewMode=\'grid\';renderHome()" style="font-size:11px;padding:4px 9px;'+(ST.viewMode==='grid'?'background:rgba(59,124,255,.15);border-color:#3b7cff;color:#3b7cff':'')+'">⊞ Grid</button>';
  html+='</div></div>';
  html+='<div id="ev-list">'+evHtml(list)+'</div></div>';

  // Sağ
  html+='<div style="display:flex;flex-direction:column;gap:12px">';

  // Takvim
  html+='<div class="card" style="padding:14px">';
  html+='<div style="font-size:13px;font-weight:700;margin-bottom:10px">Nisan 2026</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">';
  ['Pt','Sa','Ça','Pe','Cu','Ct','Pz'].forEach(function(d){html+='<div style="font-size:9.5px;color:#5a6278;font-weight:700;padding:2px 0">'+d+'</div>';});
  html+='<div></div>';
  for(var d=1;d<=30;d++){
    var isT=d===15,hasE=evDays[d];
    html+='<button onclick="filterByDay('+d+')" style="font-size:11.5px;padding:4px 2px;border-radius:5px;border:none;cursor:pointer;background:'+(isT?'#3b7cff':hasE?'rgba(59,124,255,.14)':'transparent')+';color:'+(isT?'#fff':hasE?'#3b7cff':'#7c87a0')+';font-weight:'+(isT||hasE?'700':'400')+'">'+d+'</button>';
  }
  html+='</div></div>';

  // Kategoriler

function filterEvts(){
  var q=(el('h-srch')||{}).value||'';
  return EVTS.filter(function(e){
    if(q&&e.title.toLowerCase().indexOf(q.toLowerCase())<0&&e.product.toLowerCase().indexOf(q.toLowerCase())<0)return false;
    if(ST.catF&&e.cat!==ST.catF)return false;
    if(ST.countryF&&e.country!==ST.countryF)return false;
    if(ST.freeF&&e.fee>0)return false;
    if(ST.spotsF&&e.spots===0)return false;
    return true;
  });
}

function filterEvtsRerender(){
  var list=filterEvts();
  var cnt=el('ev-list');
  if(cnt)cnt.innerHTML=evHtml(list);
  bindEvCards();
}

function filterByDay(d){
  var evs=EVTS.filter(function(e){return e.day===d;});
  if(evs.length>0){go('event');}
}

function filterByCat(c){
  ST.catF=ST.catF===c?'':c;
  renderHome();
}

function toggleFreeF(){ST.freeF=!ST.freeF;renderHome();}
function toggleSpotsF(){ST.spotsF=!ST.spotsF;renderHome();}

function evHtml(list){
  if(!list.length)return '<div style="text-align:center;padding:40px;color:#5a6278">Etkinlik bulunamadı.</div>';
  if(ST.viewMode==='grid'){
    var h='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px">';
    list.forEach(function(e){h+=evGrid(e);});
    return h+'</div>';
  }
  return list.map(evList).join('');
}

function bindEvCards(){
  document.querySelectorAll('.ev-card').forEach(function(c){

function bindCustomer(root){
  bindNav(root);
  // Chat
  var sb2=el('send-btn');
  if(sb2){sb2.addEventListener('click',sendMsg);}
  var ci=el('chat-in');
  if(ci){ci.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});}
  var ms=el('msgs');
  if(ms)ms.scrollTop=ms.scrollHeight;
  // PoC list rows
  document.querySelectorAll('.poc-row').forEach(function(b){
    b.addEventListener('click',function(){
      var t=b.getAttribute('data-tab');
      if(t){renderCustomerTab(t);}
    });
  });
  // Approval
  document.querySelectorAll('.appr-chk').forEach(function(b){
    b.addEventListener('click',function(){
      var c=b.getAttribute('data-c');
      ST[c]=!ST[c];
      clearInterval(ST.tmrInt);ST.tmrDone=false;ST.tmrVal=5;
      if(ST.chk1&&ST.chk2){
        ST.tmrInt=setInterval(function(){
          ST.tmrVal--;
          var tt=el('tmr-txt');
          if(tt)tt.textContent='Onaylamak için '+ST.tmrVal+' saniye bekleyin...';
          var ab=el('appr-btn');
          if(ST.tmrVal<=0){clearInterval(ST.tmrInt);ST.tmrDone=true;renderCustomerTab('appr');}
        },1000);
      }
      renderCustomerTab('appr');
    });
  });
  var ab=el('appr-btn');
  if(ab){ab.addEventListener('click',function(){if(ST.tmrDone){ST.approved=true;renderCustomerTab('appr');}});}
  // Offers
  var ok=el('offer-ok');
  if(ok){ok.addEventListener('click',function(){ST.offerAccepted=true;renderCustomerTab('offers');})}
  // Info send
  var isb=el('info-send');
  if(isb){isb.addEventListener('click',function(){var a=el('info-ans');if(a&&a.value.trim()){ST.infoSent=true;renderCustomerTab('info');}});}
  // İptal
  var ip=el('poc-iptal');
  if(ip){ip.addEventListener('click',function(){if(confirm('Bu PoC sürecini iptal etmek istediğinize emin misiniz?')){ST.pocCancelled=true;renderCustomerTab('chat');}});}
  var er=el('poc-ertele');
  if(er){er.addEventListener('click',function(){alert('PoC erteleme talebi gönderildi.');});}
}

function sendMsg(){
  var inp=el('chat-in');
  if(!inp||!inp.value.trim())return;
  ST.msgs.push({mine:true,txt:inp.value,t:'Şimdi'});
  inp.value='';
  renderCustomerTab('chat');
  var ms=el('msgs');if(ms)ms.scrollTop=ms.scrollHeight;
  setTimeout(function(){
    ST.msgs.push({mine:false,txt:'Teşekkürler, en kısa sürede bilgi vereceğiz.',t:'Şimdi'});
    renderCustomerTab('chat');
    var ms2=el('msgs');if(ms2)ms2.scrollTop=ms2.scrollHeight;
  },900);
}

  bindVendor(m);
}

  (root||document).querySelectorAll('[data-s]').forEach(function(b){
    if(b.tagName==='BUTTON'||b.tagName==='A'){
      b.addEventListener('click',function(e){
        e.preventDefault();
        var s=b.getAttribute('data-s');
        if(s)go(s);
      });
    }
  });
  // data-d sidebar butonları
  (root||document).querySelectorAll('[data-d]').forEach(function(b){
    b.addEventListener('click',function(){
      var d=b.getAttribute('data-d');
      var t=b.getAttribute('data-t');
      if(d==='customer')renderCustomerTab(t);
      else if(d==='vendor')renderVendorTab(t);
      else if(d==='admin')renderAdminTab(t);
    });
  });
}

/* ── BAŞLAT ── */
/* ── GİRİŞ MENÜSÜ ── */
var ST_role='';
var ST_sub='';

var VENDOR_SUBLABEL={'ureticid':'Üretici','distributor':'Distribütör','integrator':'Entegratör'};

function toggleLoginMenu(){
  var m=el('login-menu');
  if(m){m.style.display=m.style.display==='none'?'block':'none';}
}

function loginAs(role,sub){
  ST_role=role;
  ST_sub=sub||'';
  var m=el('login-menu');
  if(m)m.style.display='none';
  var btn=el('login-btn');
  var labels={customer:'Müşteri',admin:'Admin'};
  var label=role==='vendor'?(VENDOR_SUBLABEL[sub]||'Vendor'):labels[role]||role;
  if(btn){
    btn.textContent=label+' ✓';
    btn.style.background='rgba(59,124,255,.12)';
    btn.style.borderColor='#3b7cff';
    btn.style.color='#3b7cff';
    if(role==='admin'){btn.style.background='rgba(240,164,41,.12)';btn.style.borderColor='#f0a429';btn.style.color='#f0a429';}
    if(role==='customer'){btn.style.background='rgba(34,208,120,.1)';btn.style.borderColor='#22d078';btn.style.color='#22d078';}
  }
  // Vendor sidebar rol etiketi güncelle
  var vrt=el('vendor-role-tag');
  if(vrt&&role==='vendor'){vrt.textContent=VENDOR_SUBLABEL[sub]||'Vendor';}
  go(role==='customer'?'customer':role==='vendor'?'vendor':'admin');
}

// Menü dışına tıklanınca kapat
document.addEventListener('click',function(e){
  var menu=el('login-menu');
  var btn=el('login-btn');
  if(menu&&menu.style.display==='block'){
    if(!menu.contains(e.target)&&e.target!==btn){
      menu.style.display='none';
    }
  }
});

window.addEventListener('DOMContentLoaded',function(){
  bindNav(document);
  // Login menu button
  var lb=el('login-btn');
  if(lb){lb.addEventListener('click',function(e){e.stopPropagation();toggleLoginMenu();});}
  // Login opt butonları
  document.querySelectorAll('.login-opt').forEach(function(b){
    b.addEventListener('click',function(e){
      e.stopPropagation();
      loginAs(b.getAttribute('data-role'),b.getAttribute('data-sub'));
    });
  });
  renderHome();
  renderCustomerTab('list');
  renderVendorTab('poc');
  renderAdminTab('metrics');
  renderPayment();
  bindEvCards();
});
</script>
</body>
